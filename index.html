    /* ── geometry ─────────────────────────────────────────────── */
    function pip(px, py, pts) {
      let inside = false;
      for (let i=0, j=pts.length-1; i<pts.length; j=i++) {
        const [xi,yi]=pts[i],[xj,yj]=pts[j];
        if ((yi>py)!==(yj>py) && px<((xj-xi)*(py-yi))/(yj-yi)+xi) inside=!inside;
      }
      return inside;
    }
    const parsePoly = str => str.split(" ").map(p=>p.split(",").map(Number));
    function rectInPoly(x,y,w,h,str) {
      const pts=parsePoly(str);
      return pip(x,y,pts)&&pip(x+w,y,pts)&&pip(x,y+h,pts)&&pip(x+w,y+h,pts);
    }
    const overlaps = (a,b) => a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;

    function calcMetrics(towers) {
      const units = towers.reduce((s,t)=>s+t.units,0);
      const area  = towers.reduce((s,t)=>s+t.area, 0);
      const base  = towers.reduce((s,t)=>s+(t.w*t.h)/100,0);
      const occ   = Math.min(99,Math.round(base/LOT*100));
      const ca    = Math.round(area/LOT*10)/10;
      return {units,area,occ,ca};
    }

    function scaleTower(tower, factor) {
      const w=Math.max(30,Math.round(tower.w*factor));
      const h=Math.max(20,Math.round(tower.h*factor));
      return {
        ...tower,
        x:tower.x+(tower.w-w)/2,
        y:tower.y+(tower.h-h)/2,
        w,h,
        units:Math.max(1,Math.round(tower.units*factor*factor)),
        area:Math.max(1,Math.round(tower.area*factor*factor)),
      };
    }

    /* ── geometry extra ───────────────────────────────────────── */
    const M_TO_SVG = 13.06; // 1m ≈ 13.06 SVG units (847m² = 144400 SVG²)

    function insetPoly(pts, d) {
      const n = pts.length;
      function inNorm(a, b) {
        const dx=b[0]-a[0], dy=b[1]-a[1], len=Math.sqrt(dx*dx+dy*dy);
        return [-dy/len, dx/len]; // CCW rotation = inward for CW polygon in SVG Y-down
      }
      const norms = pts.map((p,i)=>inNorm(p,pts[(i+1)%n]));
      function offPt(i, end) {
        const pi=pts[end?((i+1)%n):i];
        return [pi[0]+norms[i][0]*d, pi[1]+norms[i][1]*d];
      }
      function xsect(a,b,c,e) {
        const dx1=b[0]-a[0],dy1=b[1]-a[1],dx2=e[0]-c[0],dy2=e[1]-c[1];
        const den=dx1*dy2-dy1*dx2;
        if(Math.abs(den)<0.001) return [(b[0]+c[0])/2,(b[1]+c[1])/2];
        const t=((c[0]-a[0])*dy2-(c[1]-a[1])*dx2)/den;
        return [a[0]+t*dx1, a[1]+t*dy1];
      }
      return pts.map((_,i)=>{
        const prev=(i-1+n)%n;
        return xsect(offPt(prev,false),offPt(prev,true),offPt(i,false),offPt(i,true));
      });
    }

    /* ── FlipValue ────────────────────────────────────────────── */
    function FlipValue({val,suffix="",size=20}) {
      const [disp,setDisp]=useState(val);
      const [anim,setAnim]=useState(false);
      const prev=useRef(val);
      useEffect(()=>{
        if(prev.current!==val){
          setAnim(true);
          const t=setTimeout(()=>{setDisp(val);setAnim(false);},160);
          prev.current=val;
          return ()=>clearTimeout(t);
        }
      },[val]);
      return (
        <span style={{fontFamily:"'Sora',sans-serif",fontSize:size,fontWeight:700,color:"#fff",display:"inline-block",transform:anim?"translateY(-4px)":"translateY(0)",opacity:anim?0:1,transition:"transform 0.15s ease,opacity 0.15s ease"}}>
          {typeof disp==="number"?disp.toLocaleString("pt-BR"):disp}{suffix}
        </span>
      );
    }

    /* ── MetricBar ────────────────────────────────────────────── */
    function MetricBar({val,max,warn,danger}) {
      const pct=max?Math.min(100,val/max*100):100;
      const color=!max?C.green2:val>=(danger||Infinity)?C.red:val>=(warn||Infinity)?C.yellow:C.green2;
      return (
        <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:2,marginTop:5}}>
          <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width 0.35s ease,background 0.35s ease"}}/>
        </div>
      );
    }

            <div style={{width:32,height:36,borderRadius:5,background:`${ec}1a`,border:`1px solid ${ec}44`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontFamily:"monospace",fontSize:8,fontWeight:800,color:ec,textTransform:"uppercase",letterSpacing:"0.06em"}}>{msg.ext}</span>

    /* ── SetbackOverlay ───────────────────────────────────────── */
    function SetbackOverlay() {
      const terrain = parsePoly(TERRAIN);
      const inner = insetPoly(terrain, 20);
      const outerPath = terrain.map(p=>p.join(" ")).join(" L ");
      const innerPath = inner.map(p=>p.map(v=>v.toFixed(1)).join(" ")).join(" L ");
      const innerPts  = inner.map(p=>p.map(v=>v.toFixed(1)).join(",")).join(" ");
      return (
        <g style={{pointerEvents:"none"}}>
          <path d={`M ${outerPath} Z M ${innerPath} Z`} fillRule="evenodd" fill="rgba(255,188,0,0.09)"/>
          <polygon points={innerPts} fill="none" stroke="rgba(255,188,0,0.6)" strokeWidth="1" strokeDasharray="5,4"/>
          <text x={322} y={36} textAnchor="middle" fill="rgba(255,188,0,0.9)" fontSize={9} fontFamily="'Inter',sans-serif">Recuo frontal · 5m</text>
          <text x={574} y={242} textAnchor="middle" fill="rgba(255,188,0,0.9)" fontSize={9} fontFamily="'Inter',sans-serif" transform="rotate(76,574,242)">Lateral · 1.5m</text>
          <text x={305} y={414} textAnchor="middle" fill="rgba(255,188,0,0.9)" fontSize={9} fontFamily="'Inter',sans-serif">Fundos · 3m</text>
          <text x={64} y={218} textAnchor="middle" fill="rgba(255,188,0,0.9)" fontSize={9} fontFamily="'Inter',sans-serif" transform="rotate(-68,64,218)">Lateral · 1.5m</text>
        </g>
      );
    }

    /* ── DistanceRuler ────────────────────────────────────────── */
    function DistanceRuler({tower, towers}) {
      const BBOX = {l:80,r:560,t:40,b:400};
      const dl = {stroke:"rgba(51,224,161,0.5)",strokeWidth:"0.8",strokeDasharray:"4,3"};
      const tl = {stroke:"rgba(51,224,161,0.65)",strokeWidth:"1"};
      const cx = tower.x+tower.w/2, cy = tower.y+tower.h/2;
      const fm = d => (d/M_TO_SVG).toFixed(1)+"m";

      function DLab({x,y,text}) {
        const w=Math.max(22,text.length*5.4);
        return <g>
          <rect x={x-w/2} y={y-9} width={w+4} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
          <text x={x} y={y} textAnchor="middle" fill={C.green2} fontSize={9} fontFamily="'Inter',sans-serif">{text}</text>
        </g>;
      }
      function SLab({x,y,text}) {
        const w=Math.max(22,text.length*5.4);
        return <g>
          <rect x={x+5} y={y-9} width={w+4} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
          <text x={x+8} y={y} textAnchor="start" fill={C.green2} fontSize={9} fontFamily="'Inter',sans-serif">{text}</text>
        </g>;
      }

      return (
        <g style={{pointerEvents:"none"}}>
          {/* terrain edge lines */}
          <line x1={BBOX.l} y1={cy} x2={tower.x} y2={cy} {...dl}/>
          <line x1={BBOX.l} y1={cy-5} x2={BBOX.l} y2={cy+5} {...tl}/>
          <DLab x={(BBOX.l+tower.x)/2} y={cy-2} text={fm(tower.x-BBOX.l)}/>

          <line x1={tower.x+tower.w} y1={cy} x2={BBOX.r} y2={cy} {...dl}/>
          <line x1={BBOX.r} y1={cy-5} x2={BBOX.r} y2={cy+5} {...tl}/>
          <DLab x={(tower.x+tower.w+BBOX.r)/2} y={cy-2} text={fm(BBOX.r-tower.x-tower.w)}/>

          <line x1={cx} y1={BBOX.t} x2={cx} y2={tower.y} {...dl}/>
          <line x1={cx-5} y1={BBOX.t} x2={cx+5} y2={BBOX.t} {...tl}/>
          <SLab x={cx} y={(BBOX.t+tower.y)/2} text={fm(tower.y-BBOX.t)}/>

          <line x1={cx} y1={tower.y+tower.h} x2={cx} y2={BBOX.b} {...dl}/>
          <line x1={cx-5} y1={BBOX.b} x2={cx+5} y2={BBOX.b} {...tl}/>
          <SLab x={cx} y={(tower.y+tower.h+BBOX.b)/2} text={fm(BBOX.b-tower.y-tower.h)}/>

          {/* inter-tower gaps */}
          {towers.filter(o=>o.id!==tower.id).map(o=>{
            const yOvl=tower.y<o.y+o.h&&tower.y+tower.h>o.y;
            const xOvl=tower.x<o.x+o.w&&tower.x+tower.w>o.x;
            if(yOvl){
              const lx=tower.x+tower.w<o.x?tower.x+tower.w:o.x+o.w;
              const rx=tower.x+tower.w<o.x?o.x:tower.x;
              if(rx-lx<=0)return null;
              const my=(Math.max(tower.y,o.y)+Math.min(tower.y+tower.h,o.y+o.h))/2;
              return <g key={o.id}>
                <line x1={lx} y1={my} x2={rx} y2={my} stroke={C.yellow} strokeWidth="0.8" strokeDasharray="4,3"/>
                <line x1={lx} y1={my-4} x2={lx} y2={my+4} stroke={C.yellow} strokeWidth="1"/>
                <line x1={rx} y1={my-4} x2={rx} y2={my+4} stroke={C.yellow} strokeWidth="1"/>
                <rect x={(lx+rx)/2-13} y={my-9} width={26} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
                <text x={(lx+rx)/2} y={my} textAnchor="middle" fill={C.yellow} fontSize={9} fontFamily="'Inter',sans-serif">{(Math.max(0,rx-lx)/M_TO_SVG).toFixed(1)}m</text>
              </g>;
            }
            if(xOvl){
              const ty=tower.y+tower.h<o.y?tower.y+tower.h:o.y+o.h;
              const by=tower.y+tower.h<o.y?o.y:tower.y;
              if(by-ty<=0)return null;
              const mx=(Math.max(tower.x,o.x)+Math.min(tower.x+tower.w,o.x+o.w))/2;
              return <g key={o.id}>
                <line x1={mx} y1={ty} x2={mx} y2={by} stroke={C.yellow} strokeWidth="0.8" strokeDasharray="4,3"/>
                <line x1={mx-4} y1={ty} x2={mx+4} y2={ty} stroke={C.yellow} strokeWidth="1"/>
                <line x1={mx-4} y1={by} x2={mx+4} y2={by} stroke={C.yellow} strokeWidth="1"/>
                <rect x={mx+5} y={(ty+by)/2-6} width={26} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
                <text x={mx+8} y={(ty+by)/2+4} textAnchor="start" fill={C.yellow} fontSize={9} fontFamily="'Inter',sans-serif">{(Math.max(0,by-ty)/M_TO_SVG).toFixed(1)}m</text>
              </g>;
            }
            return null;
          })}
        </g>
      );
    }

    /* ── Tower3D ──────────────────────────────────────────────── */
    function Tower3D({tower,selected,onSelect}) {
      const height=Math.min(78,18+tower.floors*2.8);
      const dx=-height*0.34,dy=-height*0.55;
      const x=tower.x,y=tower.y,w=tower.w,h=tower.h;
      const top=`${x},${y} ${x+w},${y} ${x+w+dx},${y+dy} ${x+dx},${y+dy}`;
      const left=`${x},${y} ${x+dx},${y+dy} ${x+dx},${y+h+dy} ${x},${y+h}`;
      const right=`${x+w},${y} ${x+w+dx},${y+dy} ${x+w+dx},${y+h+dy} ${x+w},${y+h}`;
      return (
        <g onClick={e=>{e.stopPropagation();onSelect(tower.id);}} style={{cursor:"pointer"}}>
          <ellipse cx={x+w/2+5} cy={y+h+8} rx={w*0.68} ry={h*0.24} fill="rgba(0,0,0,0.35)"/>
          <polygon points={left} fill={selected?"#176e55":"#26394a"} stroke={selected?C.green2:"#526171"} strokeWidth={selected?2:1.2}/>
          <polygon points={right} fill={selected?"#0d5942":"#1d2d3b"} stroke={selected?C.green2:"#526171"} strokeWidth={selected?2:1.2}/>
          <polygon points={top} fill={selected?"#28b982":"#486078"} stroke={selected?C.green2:"#718096"} strokeWidth={selected?2:1.2}/>
          {[0.25,0.5,0.75].map(p=><line key={p} x1={x+dx*p} y1={y+dy*p} x2={x+w+dx*p} y2={y+dy*p} stroke="rgba(255,255,255,0.08)" strokeWidth="0.8"/>)}
          <text x={x+w/2+dx/2} y={y+dy/2+4} textAnchor="middle" fill="#fff" fontSize={13} fontWeight="700" fontFamily="'Sora',sans-serif">{tower.id}</text>
          <text x={x+w/2+dx/2} y={y+dy/2+17} textAnchor="middle" fill="rgba(255,255,255,0.58)" fontSize={8} fontFamily="'Inter',sans-serif">{tower.floors} pav.</text>
        </g>
      );
    }

    /* ── ComparePanel — 2.2 ──────────────────────────────────── */
    function ComparePanel({versions, currentVersion, onClose}) {
      const VERS = ["Versão 01","Versão 02","Versão 03"];
      const [left,  setLeft]  = useState(currentVersion);
      const [right, setRight] = useState(VERS.find(v=>v!==currentVersion)||"Versão 02");

      const tL = versions[left]  || [];
      const tR = versions[right] || [];
      const mL = calcMetrics(tL);
      const mR = calcMetrics(tR);

      function MiniCanvas({towers}) {
        return (
          <svg viewBox="0 0 640 440" style={{width:"100%",display:"block"}}>
            <polygon points={TERRAIN} fill="rgba(1,173,110,0.06)" stroke="rgba(1,173,110,0.35)" strokeWidth="1.5" strokeDasharray="6,4"/>
            {towers.map(t=>(
              <g key={t.id}>
                <rect x={t.x+3} y={t.y+5} width={t.w} height={t.h} rx={4} fill="rgba(0,0,0,0.3)" style={{filter:"blur(4px)"}}/>
                <rect x={t.x} y={t.y} width={t.w} height={t.h} rx={4} fill="#2d3748" stroke="#526171" strokeWidth={1.5}/>
                <text x={t.x+t.w/2} y={t.y+t.h/2+5} textAnchor="middle" fill="#fff" fontSize={13} fontWeight="bold" fontFamily="'Sora',sans-serif">{t.id}</text>
              </g>
            ))}
          </svg>
        );
      }

      const METRICS = [
        {label:"Torres",   lv:tL.length, rv:tR.length, fmt:v=>`${v}`,                          higher:true},
        {label:"Unidades", lv:mL.units,  rv:mR.units,  fmt:v=>v.toLocaleString("pt-BR"),        higher:true},
        {label:"Área m²",  lv:mL.area,   rv:mR.area,   fmt:v=>v.toLocaleString("pt-BR"),        higher:true},
        {label:"CA",       lv:mL.ca,     rv:mR.ca,     fmt:v=>`${v}`,                           higher:false, limit:12},
        {label:"TO %",     lv:mL.occ,    rv:mR.occ,    fmt:v=>`${v}%`,                          higher:false, limit:50},
      ];

      return (
        <div style={{position:"absolute",inset:0,zIndex:100,background:C.ink2,display:"flex",flexDirection:"column",animation:"fadeIn 0.18s ease"}}>
          {/* header */}
          <div style={{display:"flex",alignItems:"center",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
            <span style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,color:"#fff"}}>Comparar Versões</span>
            <div style={{flex:1}}/>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:C.gray2,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon.X s={12}/>
            </button>
          </div>

          {/* two mini-canvases */}
          <div style={{display:"flex",flex:1,gap:12,padding:"14px 20px 12px",overflow:"hidden",minHeight:0}}>
            {[{ver:left,setVer:setLeft,tw:tL,m:mL,accent:"rgba(51,224,161,0.2)"},{ver:right,setVer:setRight,tw:tR,m:mR,accent:"rgba(86,79,255,0.2)"}].map(({ver,setVer,tw,m,accent},si)=>(
              <div key={si} style={{flex:1,display:"flex",flexDirection:"column",gap:8,minHeight:0}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                  <select value={ver} onChange={e=>setVer(e.target.value)}
                    style={{background:"rgba(32,38,47,0.95)",border:`1px solid ${accent}`,color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,borderRadius:6,padding:"4px 10px",cursor:"pointer",outline:"none"}}>
                    {VERS.map(v=><option key={v} value={v} style={{background:C.card}}>{v}</option>)}
                  </select>
                  <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray}}>
                    {tw.length} torres · {m.units} un · CA <span style={{color:m.ca>=12?C.yellow:"#fff",fontWeight:600}}>{m.ca}</span>
                  </span>
                </div>
                <div style={{flex:1,border:`1px solid ${accent}`,borderRadius:10,overflow:"hidden",background:C.ink2,minHeight:0}}>
                  <MiniCanvas towers={tw}/>
                </div>
              </div>
            ))}
          </div>

          {/* metrics delta strip */}
          <div style={{flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(17,21,29,0.7)",padding:"12px 20px"}}>
            <div style={{display:"flex",justifyContent:"center",gap:0}}>
              {METRICS.map(({label,lv,rv,fmt,higher,limit},mi)=>{
                const diff = rv-lv;
                const overLimit = limit && rv>=limit;
                const col = diff===0 ? C.gray
                  : higher
                    ? (diff>0 ? C.green2 : C.red)
                    : (diff>0 ? (overLimit?C.red:C.yellow) : C.green2);
                const arrow = diff>0?"↑":diff<0?"↓":"";
                return (
                  <div key={label} style={{flex:1,textAlign:"center",padding:"0 8px",borderLeft:mi>0?"1px solid rgba(255,255,255,0.05)":"none"}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,marginBottom:3}}>{label}</div>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,color:"#fff"}}>{fmt(lv)}</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:700,color:col,margin:"3px 0",minHeight:16}}>
                      {diff===0?"—":`${diff>0?"+":""}${fmt(Math.round(Math.abs(diff)*10)/10)} ${arrow}`}
                    </div>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,color:"#fff"}}>{fmt(rv)}</div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:8,textAlign:"center",fontFamily:"'Inter',sans-serif",fontSize:10,color:"rgba(113,128,150,0.5)"}}>
              {left} → {right}
            </div>
          </div>
        </div>
      );
    }

    /* ── IdleScreen ───────────────────────────────────────────── */
    function IdleScreen({onSend,leaving,attachedFile,onAttachFile,onRemoveFile}) {
      const [val,setVal]=useState("");
      const ref=useRef(null);
      useEffect(()=>{ const t=setTimeout(()=>ref.current?.focus(),600); return ()=>clearTimeout(t); },[]);

      const FILE_EXT_COLOR = {dwg:"#7B68EE",ifc:C.green,dxf:C.yellow,kmz:"#E05252",rvt:"#00B4D8",nwc:"#FF8C42"};

      const SUGGESTIONS = [
        "Lote de 600m² no Brooklin, quero explorar densidade máxima",
        "Terreno irregular 900m² — três alternativas de implantação",
        "Studio 44m² vs 1 dorm 52m² — qual maximiza CA 12?",
      ];

      function send(text) {
        const msg = text || val;
        if (!msg.trim() && !attachedFile) return;
        onSend(msg || "");
      }

      const canSend = val.trim() || attachedFile;

      return (
        <div style={{
          position:"absolute",inset:0,
          background:C.ink2,
          display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",
          zIndex:50,
          opacity: leaving ? 0 : 1,
          transform: leaving ? "scale(1.02)" : "scale(1)",
          transition: leaving ? "opacity 0.5s ease, transform 0.5s ease" : "none",
          pointerEvents: leaving ? "none" : "auto",
        }}>
          {/* logo */}
          <div style={{animation:"fadeUp 0.5s ease 0.1s both"}}>
            <ArqgenLogo height={40}/>
          </div>

          {/* badge */}
          <div style={{marginTop:12,animation:"fadeUp 0.5s ease 0.2s both"}}>
            <span style={{background:"rgba(86,79,255,0.18)",border:"1px solid rgba(86,79,255,0.35)",color:"rgba(203,200,255,0.9)",fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,letterSpacing:"0.04em"}}>Next · Protótipo V0</span>
          </div>

          {/* tagline */}
          <div style={{marginTop:24,textAlign:"center",animation:"fadeUp 0.5s ease 0.3s both"}}>
            <h1 style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:700,color:"#fff",letterSpacing:"-0.03em",lineHeight:1.2,marginBottom:6}}>
              Do terreno à decisão,<br/>em segundos.
            </h1>
            <p style={{fontFamily:"'Inter',sans-serif",fontSize:13,color:C.gray,maxWidth:380,lineHeight:1.55,margin:"0 auto"}}>
              Comece anexando o arquivo do projeto ou descrevendo o que quer explorar.
            </p>
          </div>

          {/* file zone */}
          <div style={{marginTop:24,width:"min(600px,82vw)",animation:"fadeUp 0.5s ease 0.35s both"}}>
            {attachedFile ? (
              <div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(32,38,47,0.85)",border:"1px solid rgba(51,224,161,0.3)",borderRadius:12,padding:"10px 14px"}}>
                <div style={{width:34,height:38,borderRadius:6,background:`${FILE_EXT_COLOR[attachedFile.ext]||C.gray}1a`,border:`1px solid ${FILE_EXT_COLOR[attachedFile.ext]||C.gray}44`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontFamily:"monospace",fontSize:8,fontWeight:800,color:FILE_EXT_COLOR[attachedFile.ext]||C.gray,textTransform:"uppercase",letterSpacing:"0.06em"}}>{attachedFile.ext}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:12,color:"#fff",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{attachedFile.name}</div>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray,marginTop:1}}>{attachedFile.size} · {attachedFile.meta}</div>
                </div>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,color:C.green2,flexShrink:0}}>✓ Pronto</span>
                <button onClick={onRemoveFile} style={{background:"none",border:"none",color:C.gray,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
              </div>
            ) : (
              <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:7,border:"1.5px dashed rgba(255,255,255,0.1)",borderRadius:12,padding:"18px 20px",cursor:"pointer",transition:"all 0.2s ease"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(1,173,110,0.4)";e.currentTarget.style.background="rgba(1,173,110,0.04)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";e.currentTarget.style.background="transparent";}}
              >
                <Icon.Paperclip s={20} c={C.gray}/>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:13,color:C.gray2}}>Arraste ou selecione o arquivo do projeto</span>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray,opacity:0.65}}>DWG · IFC · DXF · KMZ · RVT · NWC</span>
                <input type="file" accept=".dwg,.ifc,.dxf,.kmz,.rvt,.nwc" style={{display:"none"}}
                  onChange={e=>e.target.files[0]&&onAttachFile(e.target.files[0])}/>
              </label>
            )}
          </div>

          {/* divider */}
          <div style={{width:"min(600px,82vw)",display:"flex",alignItems:"center",gap:12,margin:"14px 0 0",animation:"fadeUp 0.5s ease 0.38s both"}}>
            <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:"rgba(113,128,150,0.45)"}}>ou descreva o projeto</span>
            <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
          </div>

          {/* input */}
          <div style={{marginTop:14,width:"min(600px,82vw)",animation:"fadeUp 0.5s ease 0.42s both"}}>
            <div style={{background:"rgba(32,38,47,0.8)",backdropFilter:"blur(16px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"8px 8px 8px 18px",display:"flex",alignItems:"flex-end",gap:8,transition:"border-color 0.2s ease"}}
              onFocusCapture={e=>e.currentTarget.style.borderColor="rgba(1,173,110,0.45)"}
              onBlurCapture={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.1)"}
            >
              <textarea
                ref={ref}
                rows={2}
                value={val}
                onChange={e=>setVal(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
                placeholder="Descreva o projeto ou o terreno que quer avaliar…"
                style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:14,resize:"none",lineHeight:1.6,padding:"6px 0"}}
              />
              <button onClick={()=>send()} style={{width:40,height:40,borderRadius:"50%",background:canSend?C.green:"rgba(255,255,255,0.07)",border:`1px solid ${canSend?"transparent":"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all 0.2s ease",marginBottom:2}}>
                <Icon.Send s={15} c="#fff"/>
              </button>
            </div>
            <p style={{textAlign:"center",marginTop:8,fontFamily:"'Inter',sans-serif",fontSize:11,color:"rgba(113,128,150,0.5)"}}>
              Enter para enviar · Shift+Enter para nova linha
            </p>
          </div>

          {/* suggestion chips */}
          <div style={{marginTop:16,display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",maxWidth:620,padding:"0 16px",animation:"fadeUp 0.5s ease 0.5s both"}}>
            {SUGGESTIONS.map((s,i)=>(
              <button key={i} onClick={()=>send(s)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"6px 14px",fontFamily:"'Inter',sans-serif",fontSize:12,color:C.gray,cursor:"pointer",transition:"all 0.15s ease",whiteSpace:"nowrap"}}
                onMouseEnter={e=>{e.target.style.background="rgba(1,173,110,0.1)";e.target.style.borderColor="rgba(1,173,110,0.3)";e.target.style.color=C.green2;}}
                onMouseLeave={e=>{e.target.style.background="rgba(255,255,255,0.04)";e.target.style.borderColor="rgba(255,255,255,0.08)";e.target.style.color=C.gray;}}
              >{s}</button>
            ))}
          </div>
        </div>
      );
    }

    /* ── ChatPanel — 3 estados: mini | medium | full ─────────── */
    function ChatPanel({msgs,typing,input,setInput,onSend,size,setSize,attachedFile,onAttachFile,onRemoveFile,onAction}) {
      const scrollRef=useRef(null);
      const chatFileRef=useRef(null);
      useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[msgs,typing,size]);

      const W = 320;

      if (size==="mini") return (
        <div style={{position:"absolute",bottom:16,right:16,zIndex:25,animation:"fadeIn 0.2s ease"}}>
          <button onClick={()=>setSize("medium")}
            style={{width:46,height:46,borderRadius:"50%",background:"rgba(32,38,47,0.95)",backdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.4)",transition:"all 0.15s ease",position:"relative"}}
          >
            <Icon.Msg s={16} c={C.green2}/>
            <div style={{position:"absolute",top:10,right:10,width:7,height:7,borderRadius:"50%",background:C.green,border:"2px solid #20262f"}}/>
          </button>
        </div>
      );

      const Header = () => (
        <div style={{display:"flex",alignItems:"center",padding:"8px 10px 8px 14px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
          <Icon.Msg s={12} c={C.green2}/>
          <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,color:C.gray2,marginLeft:6,flex:1}}>Conversa</span>
          <div style={{display:"flex",gap:2}}>
            {[
              {id:"mini",   icon:<Icon.Minus  s={11} c={size==="mini"  ?C.green2:C.gray}/>, title:"Minimizar"},
              {id:"medium", icon:<Icon.Square s={11} c={size==="medium"?C.green2:C.gray}/>, title:"Médio"},
              {id:"full",   icon:<Icon.Expand s={11} c={size==="full"  ?C.green2:C.gray}/>, title:"Expandir"},
            ].map(({id,icon,title})=>(
              <button key={id} onClick={()=>setSize(id)} title={title}
                style={{width:24,height:24,borderRadius:5,background:size===id?"rgba(1,173,110,0.12)":"transparent",border:`1px solid ${size===id?"rgba(1,173,110,0.3)":"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.12s ease"}}
              >{icon}</button>
            ))}
          </div>
        </div>
      );

      const InputBar = () => (
        <div style={{flexShrink:0}}>
          {attachedFile && (
            <div style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px 0",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
              <span style={{background:"rgba(1,173,110,0.12)",border:"1px solid rgba(51,224,161,0.25)",borderRadius:4,padding:"1px 6px",fontFamily:"monospace",fontSize:9,fontWeight:700,color:C.green2,textTransform:"uppercase",flexShrink:0}}>{attachedFile.ext}</span>
              <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray2,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{attachedFile.name}</span>
              <button onClick={onRemoveFile} style={{background:"none",border:"none",color:C.gray,cursor:"pointer",fontSize:15,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
            </div>
          )}
          <div style={{display:"flex",alignItems:"flex-end",gap:6,padding:"8px 8px 8px 10px"}}>
            <button onClick={()=>chatFileRef.current?.click()} title="Anexar arquivo"
              style={{width:26,height:26,borderRadius:5,background:"none",border:"none",color:attachedFile?C.green2:C.gray,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"color 0.15s ease",padding:0}}>
              <Icon.Paperclip s={13} c={attachedFile?C.green2:C.gray}/>
            </button>
            <input ref={chatFileRef} type="file" accept=".dwg,.ifc,.dxf,.kmz,.rvt,.nwc" style={{display:"none"}}
              onChange={e=>e.target.files[0]&&onAttachFile(e.target.files[0])}/>
            <textarea rows={1} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();onSend();}}}
              placeholder="Descreva o que quer ajustar…"
              style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:12,resize:"none",lineHeight:1.5,padding:"4px 0",maxHeight:72}}
            />
            <button onClick={onSend} style={{width:30,height:30,borderRadius:"50%",background:(input.trim()||attachedFile)?C.green:"rgba(255,255,255,0.08)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"background 0.15s ease"}}>
              <Icon.Send s={13} c="#fff"/>
            </button>
          </div>
        </div>
      );

      if (size==="medium") {
        const lastMsg = msgs[msgs.length-1];
        return (
          <div style={{position:"absolute",bottom:16,right:16,width:W,zIndex:25,background:"rgba(22,28,38,0.96)",backdropFilter:"blur(14px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,boxShadow:"0 8px 40px rgba(0,0,0,0.45)",display:"flex",flexDirection:"column",animation:"slideUp 0.2s ease",overflow:"hidden"}}>
            <Header/>
            {lastMsg && (
              <div style={{padding:"10px 14px 4px",flexShrink:0}}>
                <Bubble msg={lastMsg} idx={0} onAttachFile={onAttachFile} onAction={onAction}/>
                {typing && <div style={{marginBottom:6}}><div style={{background:"rgba(1,173,110,0.1)",border:"1px solid rgba(51,224,161,0.15)",borderRadius:"2px 12px 12px 12px",display:"inline-block"}}><TypingDots/></div></div>}
              </div>
            )}
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}/>
            <InputBar/>
          </div>
        );
      }

      return (
        <div style={{position:"absolute",bottom:16,right:16,width:W,zIndex:25,background:"rgba(22,28,38,0.96)",backdropFilter:"blur(14px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,boxShadow:"0 8px 40px rgba(0,0,0,0.45)",display:"flex",flexDirection:"column",animation:"slideUp 0.2s ease",overflow:"hidden",maxHeight:"calc(100vh - 120px)"}}>
          <Header/>
          <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"12px 14px 4px"}}>
            {msgs.map((msg,i)=><Bubble key={msg.id||i} msg={msg} idx={i} onAttachFile={onAttachFile} onAction={onAction}/>)}
            {typing && <div style={{marginBottom:8}}><div style={{background:"rgba(1,173,110,0.1)",border:"1px solid rgba(51,224,161,0.15)",borderRadius:"2px 12px 12px 12px",display:"inline-block"}}><TypingDots/></div></div>}
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}/>
          <InputBar/>
        </div>
      );
    }

    /* ── Main ─────────────────────────────────────────────────── */
    function ArqgenNext() {
      const [towers,      setTowers]      = useState(INIT_TOWERS);
      const [sel,         setSel]         = useState(null);
      const [zoom,        setZoom]        = useState(100);
      const [version,     setVersion]     = useState("Versão 01");
      const [view,        setView]        = useState("2D");
      const [msgs,        setMsgs]        = useState(HISTORY);
      const [input,       setInput]       = useState("");
      const [typing,      setTyping]      = useState(false);
      const [mounted,     setMounted]     = useState(false);
      const [shakeId,     setShakeId]     = useState(null);
      const [hoverId,     setHoverId]     = useState(null);
      const [mode,        setMode]        = useState("idle");
      const [leaving,     setLeaving]     = useState(false);
      const [chatSize,    setChatSize]    = useState("medium"); // "mini"|"medium"|"full"
      const [metricsOpen,  setMetricsOpen]  = useState(true);
      const [showSetbacks, setShowSetbacks] = useState(false);
      const [versions,     setVersions]     = useState(VERSIONS_INIT);
      const [transitioning,setTransitioning]= useState(false);
      const [comparing,    setComparing]    = useState(false);
      const [attachedFile, setAttachedFile] = useState(null);
      const [exportOpen,   setExportOpen]   = useState(false);
      const [presenting,   setPresenting]   = useState(false);

      const appRef   = useRef(null);
      const svgRef   = useRef(null);
      const dragging = useRef(null);
      const resizing = useRef(null);

      useEffect(()=>{ const t=setTimeout(()=>setMounted(true),100); return ()=>clearTimeout(t); },[]);
      useEffect(()=>{
        const sync=()=>{ if(!document.fullscreenElement)setPresenting(false); };
        document.addEventListener("fullscreenchange",sync);
        return()=>document.removeEventListener("fullscreenchange",sync);
      },[]);

      const m = useMemo(()=>calcMetrics(towers),[towers]);

      function svgPt(e) {
        const svg=svgRef.current; const p=svg.createSVGPoint();
        p.x=e.clientX; p.y=e.clientY;
        return p.matrixTransform(svg.getScreenCTM().inverse());
      }

      function towerState(t) {
        if (!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)) return "conflict";
        if (towers.some(o=>o.id!==t.id&&overlaps(t,o))) return "overlap";
        return sel===t.id?"selected":"normal";
      }

      function onTowerDown(e,id) {
        e.stopPropagation(); setSel(id);
        const t=towers.find(t=>t.id===id); const p=svgPt(e);
        dragging.current={id,ox:p.x-t.x,oy:p.y-t.y,orig:{x:t.x,y:t.y}};
      }

      function onHandleDown(e,id,corner) {
        e.stopPropagation();
        const t=towers.find(t=>t.id===id); const p=svgPt(e);
        resizing.current={id,corner,sp:p,ow:t.w,oh:t.h,ox:t.x,oy:t.y};
      }

      const onMove=useCallback(e=>{
        if(dragging.current){
          const{id,ox,oy}=dragging.current; const p=svgPt(e);
          setTowers(prev=>prev.map(t=>t.id===id?{...t,x:p.x-ox,y:p.y-oy}:t));
        }
        if(resizing.current){
          const{id,corner,sp,ow,oh,ox,oy}=resizing.current; const p=svgPt(e);
          const dx=p.x-sp.x,dy=p.y-sp.y;
          setTowers(prev=>prev.map(t=>{
            if(t.id!==id)return t;
            let{x,y,w,h}={x:ox,y:oy,w:ow,h:oh};
            if(corner.includes("e"))w=Math.max(30,ow+dx);
            if(corner.includes("s"))h=Math.max(20,oh+dy);
            if(corner.includes("w")){x=ox+dx;w=Math.max(30,ow-dx);}
            if(corner.includes("n")){y=oy+dy;h=Math.max(20,oh-dy);}
            const r=(w*h)/(ow*oh);
            return{...t,x,y,w,h,units:Math.round(t.units*r),area:Math.round(t.area*r)};
          }));
        }
      },[]);

      const onUp=useCallback(()=>{
        if(dragging.current){
          const{id,orig}=dragging.current;
          setTowers(prev=>{
            const t=prev.find(t=>t.id===id);
            if(!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)){
              setShakeId(id); setTimeout(()=>setShakeId(null),400);
              return prev.map(tt=>tt.id===id?{...tt,x:orig.x,y:orig.y}:tt);
            }
            return prev;
          });
          dragging.current=null;
        }
        resizing.current=null;
      },[]);

      function attachFile(file) {
        const ext=(file.name.split(".").pop()||"file").toLowerCase();
        const size=file.size<1024*1024
          ? `${Math.max(1,Math.round(file.size/1024))} KB`
          : `${(file.size/(1024*1024)).toFixed(1)} MB`;
        setAttachedFile({name:file.name,ext,size,meta:"Arquivo do projeto"});
      }

      function contextualReply(text,tower,currentTowers) {
        const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const lower=text.toLowerCase();
        if(!tower){
          const totals=calcMetrics(currentTowers);
          return {id:`reply-${Date.now()}`,role:"agent",time:now,text:`O estudo está com ${currentTowers.length} torres, ${totals.units} unidades e CA ${totals.ca}. Selecione uma torre no canvas para eu propor um ajuste específico com prévia antes/depois.`};
        }

        let type="reduce",label=`Reduzir Torre ${tower.id} em 20%`,after=scaleTower(tower,0.8);
        if(/remov|exclu|apagar/.test(lower)){
          type="remove"; label=`Remover Torre ${tower.id}`; after=null;
        } else if(/aument|mais|ampli|pavimento/.test(lower)){
          const factor=(tower.floors+2)/tower.floors;
          type="increase"; label=`Adicionar 2 pavimentos à Torre ${tower.id}`;
          after={...tower,floors:tower.floors+2,units:Math.round(tower.units*factor),area:Math.round(tower.area*factor)};
        }

        const nextTowers=type==="remove"
          ? currentTowers.filter(t=>t.id!==tower.id)
          : currentTowers.map(t=>t.id===tower.id?after:t);
        const beforeM=calcMetrics(currentTowers),afterM=calcMetrics(nextTowers);
        return {
          id:`skill-${Date.now()}`,role:"skill",time:now,
          fn:type==="remove"?"remover_torre()":type==="increase"?"aumentar_pavimentos()":"reduzir_projecao()",
          sub:`Torre ${tower.id} · prévia calculada`,
          text:type==="remove"
            ? `A remoção da Torre ${tower.id} reduz o CA para ${afterM.ca} e libera sua área de projeção.`
            : `A Torre ${tower.id} está com ${tower.floors} pavimentos e ${tower.units} unidades. Preparei um ajuste coerente com seu pedido.`,
          preview:[
            {label:"Unidades",before:beforeM.units,after:afterM.units,good:type==="increase"},
            {label:"Área total",before:`${beforeM.area.toLocaleString("pt-BR")} m²`,after:`${afterM.area.toLocaleString("pt-BR")} m²`,good:type!=="increase"},
            {label:"CA",before:beforeM.ca,after:afterM.ca,good:afterM.ca<=beforeM.ca},
          ],
          action:{id:`action-${Date.now()}`,type,targetId:tower.id,label,after},
        };
      }

      function sendMessage(text) {
        const msg=(text||input||"").trim();
        if(!msg && !attachedFile)return;
        const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const selected=towers.find(t=>t.id===sel);
        const currentTowers=towers.map(t=>({...t}));
        setMsgs(m=>[
          ...m,
          ...(attachedFile?[{role:"file",...attachedFile,time:now}]:[]),
          ...(msg?[{role:"user",text:msg,time:now}]:[]),
        ]);
        setInput("");
        setAttachedFile(null);
        // transition: fade idle out, then show canvas
        setLeaving(true);
        setTimeout(()=>{ setMode("active"); setLeaving(false); setChatSize("medium"); },500);
        setTyping(true);
        setTimeout(()=>{
          setTyping(false);
          setMsgs(m=>[...m,contextualReply(msg,selected,currentTowers)]);
        },1700);
      }

      function applyChatAction(message) {
        const action=message.action;
        if(!action||action.applied)return;
        if(action.type==="remove"){
          setTowers(prev=>prev.filter(t=>t.id!==action.targetId));
          setSel(null);
        } else {
          setTowers(prev=>prev.map(t=>t.id===action.targetId?{...action.after}:t));
          setSel(action.targetId);
        }
        setMsgs(prev=>prev.map(m=>m.id===message.id?{...m,action:{...m.action,applied:true}}:m));
      }

      function switchVersion(newVer) {
        if (newVer === version) return;
        const newTowers = versions[newVer];
        setVersions(v=>({...v, [version]: towers})); // salva estado atual
        setTransitioning(true);
        setTimeout(()=>{
          setTowers(newTowers);
          setVersion(newVer);
          setSel(null);
          setTimeout(()=>setTransitioning(false), 180);
        }, 200);
      }

      function addTower() {
        const ids=["A","B","C","D","E","F"];
        if(towers.length>=6) return;
        const newId=ids.find(id=>!towers.some(t=>t.id===id));
        const t={id:newId,x:240,y:185,w:60,h:44,floors:10,units:40,area:1760,type:"Studio 44m²"};
        setTowers(prev=>[...prev,t]);
        setSel(newId);
      }

      function adjustTower(id) {
        setTowers(prev=>prev.map(t=>t.id===id?scaleTower(t,0.8):t));
      }

      function removeTower(id) {
        setTowers(prev=>prev.filter(t=>t.id!==id));
        setSel(null);
      }

      async function enterPresentation() {
        setSel(null);
        setChatSize("mini");
        setPresenting(true);
        try {
          if(appRef.current?.requestFullscreen) await appRef.current.requestFullscreen();
        } catch(e) {}
      }

      async function exitPresentation() {
        setPresenting(false);
        try {
          if(document.fullscreenElement) await document.exitFullscreen();
        } catch(e) {}
      }

      function downloadReport() {
        const reportMetrics=calcMetrics(towers);
        const rows=towers.map(t=>`<tr><td>Torre ${t.id}</td><td>${t.floors}</td><td>${t.units}</td><td>${t.area.toLocaleString("pt-BR")} m²</td><td>${t.type}</td></tr>`).join("");
        const html=`<!doctype html><html lang="pt-BR"><meta charset="utf-8"><title>Relatório Arqgen · ${version}</title><style>body{font-family:Arial,sans-serif;color:#1A202C;margin:40px}h1{margin-bottom:4px}.sub{color:#718096}.kpis{display:flex;gap:12px;margin:28px 0}.kpi{border:1px solid #E2E8F0;border-radius:8px;padding:14px 18px}.kpi b{display:block;font-size:22px;color:#01AD6E}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid #E2E8F0}th{font-size:12px;color:#718096}.note{margin-top:28px;padding:14px;background:#F0FFF8;color:#276749;border-radius:8px}</style><body><h1>Estudo de viabilidade</h1><div class="sub">Lote Brooklin · 847 m² · ${version}</div><div class="kpis"><div class="kpi"><b>${towers.length}</b>Torres</div><div class="kpi"><b>${reportMetrics.units}</b>Unidades</div><div class="kpi"><b>${reportMetrics.ca}</b>CA</div><div class="kpi"><b>${reportMetrics.occ}%</b>Taxa de ocupação</div></div><table><thead><tr><th>Torre</th><th>Pavimentos</th><th>Unidades</th><th>Área</th><th>Tipologia</th></tr></thead><tbody>${rows}</tbody></table><div class="note">Relatório demonstrativo gerado pelo Arqgen Next V0. Dados urbanísticos simulados.</div></body></html>`;
        const blob=new Blob([html],{type:"text/html;charset=utf-8"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;a.download=`arqgen-${version.toLowerCase().replaceAll(" ","-")}.html`;
        document.body.appendChild(a);a.click();a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),500);
      }

      function panelPos(t) {
        const svg=svgRef.current; if(!svg)return{px:0,py:0};
        const cr=svg.closest("[data-canvas]").getBoundingClientRect();
        const p=svg.createSVGPoint();
        p.x=t.x+t.w;p.y=t.y;
        const screen=p.matrixTransform(svg.getScreenCTM());
        let px=screen.x-cr.left+12;
        let py=screen.y-cr.top;
        if(px+190>cr.width){
          p.x=t.x;
          const left=p.matrixTransform(svg.getScreenCTM());
          px=left.x-cr.left-200;
        }
        if(py+220>cr.height)py=cr.height-224;
        return{px:Math.max(4,px),py:Math.max(52,py)};
      }

      const selTower=towers.find(t=>t.id===sel);
      const zoomFactor=zoom/100;
      const viewW=640/zoomFactor,viewH=440/zoomFactor;
      const canvasViewBox=`${(640-viewW)/2} ${(440-viewH)/2} ${viewW} ${viewH}`;
      const ib={background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:C.gray2,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0};

      return (
        <div ref={appRef} tabIndex={-1} onKeyDown={e=>{if(e.key==="Escape"){setSel(null);setExportOpen(false);}}}
          style={{width:"100vw",height:"100vh",background:C.ink2,display:"flex",flexDirection:"column",overflow:"hidden",opacity:mounted?1:0,transition:"opacity 0.5s ease",fontFamily:"'Inter',sans-serif"}}
        >
          {/* TOPBAR */}
          {!presenting && <div style={{height:48,flexShrink:0,background:"rgba(17,21,29,0.9)",backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",padding:"0 18px",gap:16,position:"relative",zIndex:60}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <ArqgenLogo height={20}/>
              <span style={{background:C.purple,color:"#fff",fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,letterSpacing:"0.04em",lineHeight:1,flexShrink:0}}>Next</span>
            </div>
            <div style={{flex:1,textAlign:"center",fontSize:12,color:C.gray,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>
              {mode==="active"?"Estudo · Lote Brooklin 847m²":""}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              {mode==="active"&&<button onClick={enterPresentation} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"1px solid rgba(255,255,255,0.12)",color:C.gray2,borderRadius:6,padding:"4px 11px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}><Icon.Present s={12}/> Apresentar</button>}
              {mode==="active"&&<button onClick={()=>setExportOpen(true)} style={{background:"none",border:`1px solid ${C.green}`,color:C.green,borderRadius:6,padding:"4px 13px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>Exportar</button>}
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#564FFF,#01AD6E)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>S</div>
            </div>
          </div>}

          {/* BODY */}
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>

            {/* CANVAS (always mounted, visible only in active mode) */}
            <div data-canvas style={{position:"absolute",inset:0,background:C.ink2,cursor:"crosshair",opacity:mode==="active"?1:0,transition:"opacity 0.6s ease 0.2s",pointerEvents:mode==="active"?"auto":"none"}}>
              {/* canvas controls */}
              {!presenting && <div style={{position:"absolute",top:0,left:0,right:0,height:42,zIndex:10,background:"rgba(17,21,29,0.82)",backdropFilter:"blur(8px)",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",padding:"0 14px",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:C.green,flexShrink:0}}/>
                  <select value={version} onChange={e=>switchVersion(e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:12,borderRadius:5,padding:"2px 6px",cursor:"pointer",outline:"none"}}>
                    {["Versão 01","Versão 02","Versão 03"].map(v=><option key={v} value={v} style={{background:C.card}}>{v}</option>)}
                  </select>
                </div>
                {/* + Torre — 1.4 */}
                <button onClick={addTower} disabled={towers.length>=6}
                  style={{display:"flex",alignItems:"center",gap:5,background:"rgba(1,173,110,0.12)",border:"1px solid rgba(1,173,110,0.35)",borderRadius:6,color:towers.length>=6?C.gray:C.green2,fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,padding:"3px 10px",cursor:towers.length>=6?"not-allowed":"pointer",flexShrink:0,whiteSpace:"nowrap",transition:"all 0.15s ease"}}
                >
                  <Icon.Plus s={11} c={towers.length>=6?C.gray:C.green2}/> Torre
                </button>
                <div style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center",gap:6}}>
                  <button onClick={()=>setZoom(z=>Math.max(50,z-10))} style={ib}><Icon.ZoomOut/></button>
                  <button onClick={()=>setZoom(100)} title="Restaurar zoom" style={{background:"none",border:"none",fontSize:11,color:C.gray,minWidth:38,textAlign:"center",cursor:"pointer"}}>{zoom}%</button>
                  <button onClick={()=>setZoom(z=>Math.min(200,z+10))} style={ib}><Icon.ZoomIn/></button>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  {/* Recuos toggle — 1.1 */}
                  <button onClick={()=>setShowSetbacks(v=>!v)}
                    style={{display:"flex",alignItems:"center",gap:5,background:showSetbacks?"rgba(255,188,0,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${showSetbacks?"rgba(255,188,0,0.45)":"rgba(255,255,255,0.1)"}`,borderRadius:6,color:showSetbacks?C.yellow:C.gray,fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,padding:"3px 10px",cursor:"pointer",flexShrink:0,transition:"all 0.15s ease"}}
                  >
                    <Icon.Ruler s={11} c={showSetbacks?C.yellow:C.gray}/> Recuos
                  </button>
                  <div style={{display:"flex",background:"rgba(255,255,255,0.05)",borderRadius:6,overflow:"hidden"}}>
                    {["2D","3D"].map(v=><button key={v} onClick={()=>setView(v)} style={{background:view===v?C.green:"transparent",border:"none",color:view===v?"#fff":C.gray,fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,padding:"4px 11px",cursor:"pointer",transition:"all 0.15s ease"}}>{v}</button>)}
                  </div>
                  <button onClick={()=>setComparing(true)} style={{background:comparing?"rgba(86,79,255,0.15)":"none",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Inter',sans-serif",whiteSpace:"nowrap",transition:"background 0.15s ease"}}>Comparar versões</button>
                </div>
              </div>}

              {/* metrics HUD */}
              {!presenting && <MetricsHUD m={m} open={metricsOpen} onToggle={()=>setMetricsOpen(o=>!o)} towerCount={towers.length}/>}
              {presenting && <PresentationHUD m={m} towerCount={towers.length} version={version} onExit={exitPresentation}/>}

              {/* SVG */}
              <svg ref={svgRef} width="100%" height="100%" viewBox={canvasViewBox} style={{position:"absolute",top:0,left:0,userSelect:"none",opacity:transitioning?0:1,transition:"opacity 0.2s ease"}}
                onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
                onClick={()=>{if(!dragging.current)setSel(null);}}
              >
                <defs>
                  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth="1"/>
                  </pattern>
                </defs>
                <rect width="640" height="440" fill="url(#g)"/>
                <polygon points={TERRAIN} fill="rgba(1,173,110,0.055)" stroke="rgba(1,173,110,0.38)" strokeWidth="1.5" strokeDasharray="6,4"/>
                <text x="315" y="232" textAnchor="middle" fill={C.gray} fontSize="11" fontFamily="'Inter',sans-serif" opacity="0.7">847 m²</text>
                <text x="602" y="70" textAnchor="middle" fill={C.gray} fontSize="11" fontFamily="'Inter',sans-serif" opacity="0.7">N ↑</text>

                {showSetbacks && view==="2D" && <SetbackOverlay/>}

                {view==="2D" && towers.map(t=>(
                  <rect key={`sh-${t.id}`} x={t.x+4} y={t.y+6} width={t.w} height={t.h} rx={4}
                    fill="rgba(0,0,0,0.32)" style={{filter:"blur(5px)"}}/>
                ))}

                {view==="2D" && towers.map((t,i)=>{
                  const st=towerState(t);
                  const isSel=sel===t.id,isHov=hoverId===t.id&&!isSel,isShk=shakeId===t.id;
                  const fill=st==="conflict"?"rgba(253,72,72,0.2)":st==="overlap"?"rgba(255,188,0,0.12)":isSel?"rgba(1,173,110,0.3)":isHov?"rgba(52,67,87,0.9)":"#344357";
                  const stroke=st==="conflict"?C.red:st==="overlap"?C.yellow:isSel?C.green2:isHov?"#8899aa":"#526171";
                  const sw=isSel?2:isHov?1.8:1.5;
                  return (
                    <g key={t.id} className={isShk?"shake":isSel?"pulse-t":""}
                      style={{cursor:dragging.current?.id===t.id?"grabbing":"grab",transition:"all 0.12s ease"}}
                      onMouseDown={e=>onTowerDown(e,t.id)}
                      onMouseEnter={()=>setHoverId(t.id)}
                      onMouseLeave={()=>setHoverId(null)}
                      onClick={e=>{e.stopPropagation();setSel(t.id);}}
                    >
                      <rect x={t.x} y={t.y} width={t.w} height={t.h} rx={4} fill={fill} stroke={stroke} strokeWidth={sw}
                        style={{filter:isSel?"drop-shadow(0 0 8px rgba(51,224,161,0.4))":isHov?"drop-shadow(0 0 4px rgba(255,255,255,0.1))":"none",transition:"all 0.12s ease"}}
                      />
                      <text x={t.x+t.w/2} y={t.y+t.h/2+(isHov||isSel?-4:5)} textAnchor="middle" fill="#fff" fontSize={13} fontWeight="bold" fontFamily="'Sora',sans-serif" style={{pointerEvents:"none",transition:"all 0.12s ease"}}>{t.id}</text>
                      {(isHov||isSel)&&<text x={t.x+t.w/2} y={t.y+t.h/2+9} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize={9} fontFamily="'Inter',sans-serif" style={{pointerEvents:"none"}}>{t.floors}pav · {t.units}un</text>}
                      {st==="overlap"&&<>
                        <rect x={t.x+t.w/2-27} y={t.y-19} width={54} height={16} rx={4} fill={C.yellow}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#000" fontSize={9} fontWeight="bold" fontFamily="'Inter',sans-serif">Conflito</text>
                      </>}
                      {isSel&&[["nw",t.x-4,t.y-4],["ne",t.x+t.w-4,t.y-4],["sw",t.x-4,t.y+t.h-4],["se",t.x+t.w-4,t.y+t.h-4]].map(([corner,hx,hy])=>(
                        <rect key={corner} x={hx} y={hy} width={8} height={8} rx={1} fill="#fff" stroke={C.green2} strokeWidth={1}
                          style={{cursor:`${corner}-resize`}}
                          onMouseDown={e=>{e.stopPropagation();onHandleDown(e,t.id,corner);}}
                        />
                      ))}
                    </g>
                  );
                })}

                {view==="3D" && towers.map(t=>(
                  <Tower3D key={t.id} tower={t} selected={sel===t.id} onSelect={setSel}/>
                ))}

                {view==="2D" && selTower && <DistanceRuler tower={selTower} towers={towers}/>}
              </svg>

              {!presenting&&selTower&&(()=>{ const{px,py}=panelPos(selTower); return <TowerPanel tower={selTower} px={px} py={py} onClose={()=>setSel(null)} onAdjust={()=>adjustTower(selTower.id)} onRemove={()=>removeTower(selTower.id)}/>; })()}

              {/* floating chat */}
              {!presenting && <ChatPanel msgs={msgs} typing={typing} input={input} setInput={setInput}
                onSend={()=>sendMessage()} size={chatSize} setSize={setChatSize}
                attachedFile={attachedFile} onAttachFile={attachFile}
                onRemoveFile={()=>setAttachedFile(null)}
                onAction={applyChatAction}
              />}

              {/* compare panel — 2.2 */}
              {!presenting&&comparing && <ComparePanel
                versions={{...versions,[version]:towers}}
                currentVersion={version}
                onClose={()=>setComparing(false)}
              />}
            </div>

            {/* IDLE SCREEN */}
            {mode==="idle" && <IdleScreen
              onSend={sendMessage} leaving={leaving}
              attachedFile={attachedFile} onAttachFile={attachFile}
              onRemoveFile={()=>setAttachedFile(null)}
            />}
          </div>
          {exportOpen && <ExportModal towers={towers} version={version} onClose={()=>setExportOpen(false)} onDownload={downloadReport}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ArqgenNext/>);
  </script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const src = document.getElementById('app-src').textContent;
      try {
        const compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        (new Function(compiled))();
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#FD4848;padding:20px;font-size:12px;white-space:pre-wrap">' + e.message + '</pre>';
      }
    });
  </script>
</body>
</html>
