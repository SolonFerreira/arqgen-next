      }

      const selTower=towers.find(t=>t.id===sel);
      const zoomFactor=zoom/100;
      const viewW=640/zoomFactor,viewH=440/zoomFactor;
      const canvasViewBox=`${(640-viewW)/2+pan.x} ${(440-viewH)/2+pan.y} ${viewW} ${viewH}`;
      const compact=viewportWidth<820;
      const ib={background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:C.gray2,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0};

      return (
        <div ref={appRef} tabIndex={-1} onKeyDown={e=>{if(e.key==="Escape"){setSel(null);setExportOpen(false);}}}
          style={{width:"100vw",height:"100vh",background:C.ink2,display:"flex",flexDirection:"column",overflow:"hidden",opacity:mounted?1:0,transition:"opacity 0.5s ease",fontFamily:"'Inter',sans-serif"}}
        >
          {/* TOPBAR */}
          {!presenting && <div style={{height:48,flexShrink:0,background:"rgba(17,21,29,0.9)",backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",padding:"0 18px",gap:16,position:"relative",zIndex:60}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <ArqgenLogo height={20}/>
              <span style={{background:C.purple,color:"#fff",fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,letterSpacing:"0.04em",lineHeight:1,flexShrink:0}}>Next</span>
            </div>
            <div style={{flex:1,textAlign:"center",fontSize:12,color:C.gray,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0,display:compact?"none":"block"}}>
              {mode==="active"?"Estudo · Lote Brooklin 847m²":""}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              {mode==="active"&&<button onClick={enterPresentation} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"1px solid rgba(255,255,255,0.12)",color:C.gray2,borderRadius:6,padding:"4px 11px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}><Icon.Present s={12}/>{!compact&&" Apresentar"}</button>}
              {mode==="active"&&<button onClick={()=>setExportOpen(true)} style={{background:"none",border:`1px solid ${C.green}`,color:C.green,borderRadius:6,padding:"4px 13px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>Exportar</button>}
              {!compact&&<div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#564FFF,#01AD6E)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>S</div>}
            </div>
          </div>}

          {/* BODY */}
          <div style={{flex:1,position:"relative",overflow:"hidden",display:"flex"}}>

            {/* CANVAS (always mounted, visible only in active mode) */}
            <div data-canvas style={{flex:1,position:"relative",background:C.ink2,cursor:"crosshair",opacity:mode==="active"?1:0,transition:"opacity 0.6s ease 0.2s",pointerEvents:mode==="active"?"auto":"none",overflow:"hidden"}}>
              {/* canvas controls */}
              {!presenting && <div style={{position:"absolute",top:0,left:0,right:0,height:42,zIndex:10,background:"rgba(17,21,29,0.82)",backdropFilter:"blur(8px)",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",padding:"0 14px",gap:10,overflowX:"auto",overflowY:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:status.dot,flexShrink:0,transition:"background 0.4s ease",boxShadow:`0 0 5px ${status.dot}99`}}/>
                  <select value={version} onChange={e=>switchVersion(e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:12,borderRadius:5,padding:"2px 6px",cursor:"pointer",outline:"none"}}>
                    {["Versão 01","Versão 02","Versão 03"].map(v=><option key={v} value={v} style={{background:C.card}}>{scenarioName(v)} · {scenarioRevision(v)}</option>)}
                  </select>
                </div>
                <div style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center",gap:6,minWidth:118}}>
                  <button onClick={()=>changeZoom(zoom-10)} style={ib}><Icon.ZoomOut/></button>
                  <button onClick={()=>{setZoom(100);setPan({x:0,y:0});}} title="Restaurar zoom" style={{background:"none",border:"none",fontSize:11,color:C.gray,minWidth:38,textAlign:"center",cursor:"pointer"}}>{zoom}%</button>
                  <button onClick={()=>changeZoom(zoom+10)} style={ib}><Icon.ZoomIn/></button>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  {/* Recuos toggle — 1.1 */}
                  <button onClick={()=>setShowSetbacks(v=>!v)}
                    style={{display:"flex",alignItems:"center",gap:5,background:showSetbacks?"rgba(255,188,0,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${showSetbacks?"rgba(255,188,0,0.45)":"rgba(255,255,255,0.1)"}`,borderRadius:6,color:showSetbacks?C.yellow:C.gray,fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,padding:"3px 10px",cursor:"pointer",flexShrink:0,transition:"all 0.15s ease"}}
                  >
                    <Icon.Ruler s={11} c={showSetbacks?C.yellow:C.gray}/> Recuos
                  </button>
                  <div style={{display:"flex",background:"rgba(255,255,255,0.05)",borderRadius:6,overflow:"hidden"}}>
                    {["2D","3D"].map(v=><button key={v} onClick={()=>setView(v)} style={{background:view===v?C.green:"transparent",border:"none",color:view===v?"#fff":C.gray,fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,padding:"4px 11px",cursor:"pointer",transition:"all 0.15s ease"}}>{v}</button>)}
                  </div>
                  <button onClick={()=>setComparing(true)} style={{background:comparing?"rgba(86,79,255,0.15)":"none",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Inter',sans-serif",whiteSpace:"nowrap",transition:"background 0.15s ease"}}>Comparar estratégias</button>
                </div>
              </div>}

              {/* version banner */}
              {!presenting&&(
                <div style={{position:"absolute",top:42,left:0,right:0,height:28,zIndex:9,background:"rgba(10,13,20,0.9)",backdropFilter:"blur(6px)",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",padding:"0 14px",gap:10}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:status.dot,flexShrink:0,boxShadow:`0 0 5px ${status.dot}80`}}/>
                  <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:600,color:status.color}}>{scenarioName(version)} · {scenarioRevision(version)} · {status.label}</span>
                  <div style={{width:1,height:14,background:"rgba(255,255,255,0.07)"}}/>
                  <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray}}>
                    {m?.valid?`${safeValue(towers.length)} torres · ${safeValue(m.units)} un. · CA ${safeValue(m.ca,{digits:1})} / 12 · TO ${safeValue(m.occ,{digits:1})}%`:"Calculando indicadores..."}
                  </span>
                  <div style={{flex:1}}/>
                  {decision&&decision.strategy===version&&(
                    <span style={{display:"flex",alignItems:"center",gap:5,fontFamily:"'Inter',sans-serif",fontSize:10,flexShrink:0}}>
                      <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:decisionStale?C.yellow:C.green2,boxShadow:`0 0 5px ${decisionStale?C.yellow:C.green2}`,flexShrink:0}}/>
                      <span style={{color:decisionStale?C.yellow:C.green2}}>
                        {decisionStale?"Decisão desatualizada":"Decisão · "+decision.time}
                      </span>
                      {!decisionStale&&decision.pending&&decision.pending.length>0&&(
                        <span style={{background:"rgba(255,188,0,0.15)",border:"1px solid rgba(255,188,0,0.3)",borderRadius:10,color:C.yellow,padding:"0 5px",fontSize:9,fontWeight:600}}>
                          {decision.pending.length} pendência{decision.pending.length>1?"s":""}
                        </span>
                      )}
                    </span>
                  )}
                  <span style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:"rgba(113,128,150,0.55)"}}>{status.detail}</span>
                </div>
              )}
              {presenting && <PresentationHUD m={m} towerCount={towers.length} version={version} onExit={exitPresentation}/>}
              {!presenting&&mode==="active"&&<InsightsRail towers={towers} m={m}/>}

              {/* SVG */}
              <svg ref={svgRef} width="100%" height="100%" viewBox={canvasViewBox} style={{position:"absolute",top:0,left:0,userSelect:"none",opacity:transitioning?0:1,transition:"opacity 0.2s ease",cursor:panning.current?"grabbing":zoom>100?"grab":"crosshair"}}
                onMouseDown={onCanvasDown} onWheel={onWheel}
                onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
                onClick={()=>{if(!dragging.current)setSel(null);}}
              >
                <defs>
                  <pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse">
                    <path d="M32 0L0 0 0 32" fill="none" stroke="rgba(255,255,255,0.022)" strokeWidth="0.5"/>
                  </pattern>
                  <radialGradient id="terrain-fill" cx="50%" cy="50%" r="58%">
                    <stop offset="0%" stopColor="rgba(1,173,110,0.13)"/>
                    <stop offset="100%" stopColor="rgba(1,173,110,0.04)"/>
                  </radialGradient>
                  <filter id="lot-glow">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                </defs>
                <rect data-pan-bg="true" x="-320" y="-220" width="1280" height="880" fill="url(#g)"/>
                <polygon points={TERRAIN} fill="url(#terrain-fill)" stroke="none"/>
                <polygon points={TERRAIN} fill="none" stroke="rgba(1,173,110,0.55)" strokeWidth="1.5" filter="url(#lot-glow)"/>
                <text x="315" y="232" textAnchor="middle" fill={C.gray} fontSize="10" fontFamily="'Inter',sans-serif" fontWeight="500" opacity="0.5">847 m²</text>
                <g transform="translate(592,62)">
                  <circle cx="0" cy="0" r="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" strokeWidth="0.8"/>
                  <text x="0" y="-3" textAnchor="middle" fill={C.gray} fontSize="9" fontFamily="'Inter',sans-serif" opacity="0.65">N</text>
                  <line x1="0" y1="-9" x2="0" y2="-1" stroke={C.gray} strokeWidth="1.5" opacity="0.55"/>
                  <line x1="0" y1="1" x2="0" y2="9" stroke={C.gray} strokeWidth="1" opacity="0.3"/>
                </g>

                {showSetbacks && view==="2D" && <SetbackOverlay/>}


                {view==="2D" && towers.map((t,i)=>{
                  const st=towerState(t);
                  const isSel=sel===t.id,isHov=hoverId===t.id&&!isSel,isShk=shakeId===t.id;
                  const fill=st==="conflict"?"rgba(253,72,72,0.22)":st==="overlap"?"rgba(255,188,0,0.14)":st==="setback"?"rgba(255,188,0,0.10)":isSel?"rgba(1,173,110,0.28)":isHov?"rgba(46,62,82,0.95)":"#2c3f52";
                  const stroke=st==="conflict"?C.red:st==="overlap"||st==="setback"?C.yellow:isSel?C.green2:isHov?"#6a8aaa":"#3e5568";
                  const sw=isSel?2.2:isHov?1.8:1.2;
                  const tipW=118,tipH=36;
                  const tipX=Math.max(-10,t.x+t.w/2-tipW/2);
                  const tipY=t.y>60?t.y-tipH-8:t.y+t.h+8;
                  return (
                    <g key={t.id} className={isShk?"shake":isSel?"pulse-t":""}
                      style={{cursor:dragging.current?.id===t.id?"grabbing":"grab"}}
                      onMouseDown={e=>onTowerDown(e,t.id)}
                      onMouseEnter={()=>setHoverId(t.id)}
                      onMouseLeave={()=>setHoverId(null)}
                      onClick={e=>{e.stopPropagation();setSel(t.id);}}
                    >
                      {/* shadow */}
                      <rect x={t.x+3} y={t.y+5} width={t.w} height={t.h} rx={5} fill="rgba(0,0,0,0.35)" style={{filter:"blur(6px)"}}/>
                      <rect x={t.x} y={t.y} width={t.w} height={t.h} rx={5} fill={fill} stroke={stroke} strokeWidth={sw}
                        style={{filter:isSel?"drop-shadow(0 0 10px rgba(51,224,161,0.45))":isHov?"drop-shadow(0 0 5px rgba(100,140,180,0.2))":"none",transition:"fill 0.15s ease,stroke 0.15s ease,filter 0.15s ease"}}
                      />
                      {/* tower label */}
                      <text x={t.x+t.w/2} y={t.y+t.h/2+(isSel?-5:4)} textAnchor="middle" fill="#fff" fontSize={13} fontWeight="700" fontFamily="'Sora',sans-serif" style={{pointerEvents:"none"}}>{t.id}</text>
                      {isSel&&<text x={t.x+t.w/2} y={t.y+t.h/2+9} textAnchor="middle" fill="rgba(255,255,255,0.55)" fontSize={9} fontFamily="'Inter',sans-serif" style={{pointerEvents:"none"}}>{safeValue(t.floors)}pav · {safeValue(t.units)}un</text>}
                      {/* hover tooltip */}
                      {isHov&&(
                        <g style={{pointerEvents:"none"}}>
                          <rect x={tipX} y={tipY} width={tipW} height={tipH} rx={5} fill="rgba(10,13,20,0.96)" stroke="rgba(255,255,255,0.1)" strokeWidth="0.8"/>
                          <text x={tipX+tipW/2} y={tipY+14} textAnchor="middle" fill="#fff" fontSize={10} fontWeight="700" fontFamily="'Sora',sans-serif">{safeValue(t.floors)} pav · {safeValue(t.units)} un.</text>
                          <text x={tipX+tipW/2} y={tipY+26} textAnchor="middle" fill={C.gray} fontSize={9} fontFamily="'Inter',sans-serif">{safeValue(t.area,{suffix:" m²"})} · {t.type}</text>
                        </g>
                      )}
                      {/* conflict/overlap badge */}
                      {st==="overlap"&&<>
                        <rect x={t.x+t.w/2-27} y={t.y-19} width={54} height={16} rx={4} fill={C.yellow}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#000" fontSize={9} fontWeight="700" fontFamily="'Inter',sans-serif">Conflito</text>
                      </>}
                      {st==="conflict"&&<>
                        <rect x={t.x+t.w/2-29} y={t.y-19} width={58} height={16} rx={4} fill={C.red}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#fff" fontSize={9} fontWeight="700" fontFamily="'Inter',sans-serif">Fora do lote</text>
                      </>}
                      {st==="setback"&&<>
                        <rect x={t.x+t.w/2-24} y={t.y-19} width={48} height={16} rx={4} fill={C.yellow} opacity={0.92}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#000" fontSize={9} fontWeight="700" fontFamily="'Inter',sans-serif">Recuo</text>
                      </>}
                      {/* resize handles */}
                      {isSel&&[["nw",t.x-4,t.y-4],["ne",t.x+t.w-4,t.y-4],["sw",t.x-4,t.y+t.h-4],["se",t.x+t.w-4,t.y+t.h-4]].map(([corner,hx,hy])=>(
                        <rect key={corner} x={hx} y={hy} width={8} height={8} rx={2} fill="rgba(255,255,255,0.95)" stroke={C.green2} strokeWidth={1.2}
                          style={{cursor:`${corner}-resize`}}
                          onMouseDown={e=>{e.stopPropagation();onHandleDown(e,t.id,corner);}}
                        />
                      ))}
                    </g>
                  );
                })}

                {view==="3D" && towers.map(t=>(
                  <Tower3D key={t.id} tower={t} selected={sel===t.id} onSelect={setSel}/>
                ))}

                {liveId&&(()=>{const t=towers.find(item=>item.id===liveId);if(!t)return null;const wM=safeValue(t.w/M_TO_SVG,{digits:1,suffix:"m"});const hM=safeValue(t.h/M_TO_SVG,{digits:1,suffix:"m"});const label=`${wM} × ${hM}`;const tw=label.length*5.5+12;return <g style={{pointerEvents:"none"}}><rect x={t.x+t.w/2-tw/2} y={t.y-22} width={tw} height={14} rx={3} fill="rgba(10,13,20,0.92)" stroke="rgba(255,255,255,0.15)" strokeWidth="0.7"/><text x={t.x+t.w/2} y={t.y-12} textAnchor="middle" fill="rgba(255,255,255,0.9)" fontSize={8.5} fontFamily="'Inter',sans-serif">{label}</text></g>;})()}

                {view==="2D" && selTower && <DistanceRuler tower={selTower} towers={towers}/>}
              </svg>

              {/* floating chat */}
              {!presenting && <ChatPanel msgs={msgs} typing={typing} input={input} setInput={setInput}
                onSend={()=>sendMessage()} size={chatSize} setSize={setChatSize}
                attachedFile={attachedFile} onAttachFile={attachFile}
                onRemoveFile={()=>setAttachedFile(null)}
                onAction={applyChatAction}
                onApplyAlt={applyAlt}
              />}

              {/* compare panel — 2.2 */}
              {!presenting&&comparing && <ComparePanel
                versions={{...versions,[version]:towers}}
                currentVersion={version}
                onClose={()=>setComparing(false)}
                onSwitch={(v,meta={})=>{
                  const newM=calcMetrics(sanitizeTowers(versions[v]||[]));
                  const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
                  switchVersion(v);
                  setComparing(false);
                  setDecision({strategy:v,time:now,units:newM.valid?newM.units:null,ca:newM.valid?newM.ca:null,reason:meta.reason||null,pending:meta.pending||[]});
                  const reasonPart=meta.reason?` · "${meta.reason}"`:"";
                  const pendingPart=meta.pending&&meta.pending.length>0?` · Pendências: ${meta.pending.join(", ")}.`:" Sem pendências registradas.";
                  setMsgs(prev=>[...prev,{id:`decide-${Date.now()}`,role:"copilot-context",time:now,
                    text:`Decisão registrada: ${scenarioName(v)} · ${newM.valid?safeValue(newM.units)+" un · CA "+safeValue(newM.ca,{digits:1}):"indicadores calculados"}${reasonPart}.${pendingPart}`}]);
                }}
              />}
            </div>

            {/* CONTEXT SIDE PANEL */}
            {mode==="active"&&!presenting&&!comparing&&(
              <ContextPanel m={m} towers={towers} version={version} sel={sel} onSelect={setSel} onSave={saveTower} onAdjust={adjustTower} onRemove={removeTower} onAddTower={addTower} limits={limits} onSetLimits={setLimits}/>
            )}

            {/* IDLE SCREEN */}
            {mode==="idle" && <IdleScreen
              onSend={sendMessage} leaving={leaving}
              attachedFile={attachedFile} onAttachFile={attachFile}
              onRemoveFile={()=>setAttachedFile(null)}
            />}
          </div>
          {exportOpen && <ExportModal towers={towers} version={version} onClose={()=>setExportOpen(false)} onDownload={downloadReport}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ArqgenNext/>);
  </script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const src = document.getElementById('app-src').textContent;
      try {
        const compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        (new Function(compiled))();
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#FD4848;padding:20px;font-size:12px;white-space:pre-wrap">' + e.message + '</pre>';
      }
    });
  </script>
</body>
</html>
