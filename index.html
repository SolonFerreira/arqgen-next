      function recordDecisionEvent(text){
        const time=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        setDecisionLog(prev=>[...prev.slice(-19),{id:`event-${Date.now()}-${prev.length}`,time,text}]);
      }

      useEffect(()=>{ const t=setTimeout(()=>setMounted(true),100); return ()=>clearTimeout(t); },[]);
      useEffect(()=>{
        const sync=()=>{ if(!document.fullscreenElement)setPresenting(false); };
        document.addEventListener("fullscreenchange",sync);
        return()=>document.removeEventListener("fullscreenchange",sync);
      },[]);
      useEffect(()=>{
        const resize=()=>setViewportWidth(window.innerWidth);
        window.addEventListener("resize",resize);
        return()=>window.removeEventListener("resize",resize);
      },[]);
      useEffect(()=>()=> {
        clearTimeout(versionTransitionRef.current.switchTimer);
        clearTimeout(versionTransitionRef.current.fadeTimer);
      },[]);
      useEffect(()=>{ if(zoom<=100)setPan({x:0,y:0}); },[zoom]);
      useEffect(()=>{ towersRef.current=towers; },[towers]);
      useEffect(()=>{
        if(!sel||mode!=="active")return;
        const timer=setTimeout(()=>{
          const t=towersRef.current.find(item=>item.id===sel);
          if(!t)return;
          const allTowers=towersRef.current;
          const currentM=calcMetrics(allTowers);
          const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

          let observation,suggestion,confidence;
          const caLimEff=limits.ca, toMaxEff=limits.to;
          const caWarnEff=Math.max(caLimEff*0.83,caLimEff-2);
          const caHeadroom=caLimEff-(currentM.valid?currentM.ca:0);
          const tUnitShare=currentM.valid&&currentM.units>0?Math.round(t.units/currentM.units*100):null;

          if(!currentM.valid){
            observation=`Torre ${t.id} com ${safeValue(t.floors)} pav e ${safeValue(t.units)} unidades. Indicadores não calculados — verificar posição no lote.`;
            suggestion="Reposicionar a torre dentro do contorno para recalcular as métricas.";
            confidence="baixa";
          } else if(t.floors>=15&&currentM.ca>=caWarnEff){
            observation=`Torre ${t.id} com ${t.floors} pav${tUnitShare!==null?` representa ${tUnitShare}% das unidades`:""} — CA total em ${safeValue(currentM.ca,{digits:1})} de ${caLimEff}, margem de ${safeValue(caHeadroom,{digits:1})}.`;
            suggestion=`Redução de 2 pavimentos liberaria ~${safeValue(caHeadroom+0.3,{digits:1})} de CA sem comprometer as demais torres. Premissa calculada; legislação não validada.`;
            confidence="média";
          } else if(t.floors<=8&&caHeadroom>1.5){
            const tM2=(t.w*t.h)/SVG_PER_M2;
            const extra=Math.max(2,Math.min(6,Math.floor(caHeadroom*LOT/Math.max(tM2,1))));
            observation=`Torre ${t.id} com ${t.floors} pavimentos — abaixo do potencial. CA total em ${safeValue(currentM.ca,{digits:1})} de ${caLimEff}, com ${safeValue(caHeadroom,{digits:1})} de margem disponível.`;
            suggestion=`Pode absorver até ${extra} pavimentos adicionais. Confiança: CA e TO calculados; legislação informada pelo usuário, não validada.`;
            confidence="média";
          } else {
            const toHeadroom=toMaxEff-(currentM.valid?currentM.occ:0);
            observation=`Torre ${t.id} com ${t.floors} pav${tUnitShare!==null?`, representando ${tUnitShare}% das unidades`:""} — CA total em ${safeValue(currentM.ca,{digits:1})} de ${caLimEff}.`;
            suggestion=caHeadroom>1.5
              ?`Margem de ${safeValue(caHeadroom,{digits:1})} disponível no CA — explorar variação de densidade ou tipologia.`
              :`CA próximo ao limite. Considere redistribuir pavimentos entre as torres para equilibrar o aproveitamento.`;
            confidence="média";
          }

          setMsgs(prev=>[
            ...prev.filter(msg=>msg.role!=="copilot-analysis"),
            {
              id:`ctx-${Date.now()}`,
              role:"copilot-analysis",
              time:now,
              towerId:t.id,
              observation,
              suggestion,
              confidence,
              facts:[
                {label:"Pavimentos",val:safeValue(t.floors),source:"calculado"},
                {label:"Unidades",val:safeValue(t.units),source:"calculado"},
                {label:"Área",val:safeValue(t.area,{suffix:" m²"}),source:"calculado"},
                ...(currentM.valid?[{label:"CA total",val:safeValue(currentM.ca,{digits:1}),source:"calculado"}]:[]),
              ],
            },
          ]);
        },500);
        return()=>clearTimeout(timer);
      },[sel,mode,towers,limits.ca,limits.to]);

      const m = useMemo(()=>calcMetrics(towers),[towers]);
      const status = useMemo(()=>getStatus(m,limits),[m,limits]);
      const decisionStaleState = useMemo(()=>{
        if(!decision||decision.strategy!==version)return {stale:false,metricsChanged:false,assumptionsChanged:false};
        return decisionStaleness(decision,m,limits);
      },[decision,m,version,limits]);
      const decisionStale=decisionStaleState.stale;

      // Notify when an existing decision becomes stale due to canvas changes
      const prevStaleRef=useRef(false);
      useEffect(()=>{
        if(!decisionStale||prevStaleRef.current===decisionStale)return;
        prevStaleRef.current=decisionStale;
        if(mode!=="active"||!decision)return;
        const nowStr=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const cause=decisionStaleState.assumptionsChanged&&decisionStaleState.metricsChanged
          ?"Canvas e premissas divergiram"
          :decisionStaleState.assumptionsChanged
            ?"Premissas regulatórias mudaram"
            :"Canvas divergiu";
        setMsgs(prev=>[...prev,{id:`stale-${Date.now()}`,role:"copilot-context",time:nowStr,
          text:`${cause} da decisão registrada (${scenarioName(decision.strategy)} · ${decision.time}). Revisar ou confirmar a nova base antes de avançar.`}]);
      },[decisionStale,decision,mode,decisionStaleState.assumptionsChanged,decisionStaleState.metricsChanged]);
      useEffect(()=>{ if(!decisionStale)prevStaleRef.current=false; },[decisionStale]);

      // Proactive copilot alert when CA crosses warning thresholds during editing
      const prevCaRef=useRef(null);
      const lastCaAlertRef=useRef(0);
      useEffect(()=>{
        if(mode!=="active"||!m?.valid)return;
        const prev=prevCaRef.current;
        prevCaRef.current=m.ca;
        if(prev===null)return; // skip initial mount
        const now=Date.now();
        if(now-lastCaAlertRef.current<25000)return; // 25s cooldown between alerts
        const nowStr=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const caLim=limits.ca;
        const caWarnThresh=Math.max(caLim*0.83,caLim-2);
        if(prev<caLim&&m.ca>=caLim){
          lastCaAlertRef.current=now;
          setMsgs(prev2=>[...prev2,{id:`ca-exc-${now}`,role:"copilot-context",time:nowStr,
            text:`CA excedeu ${caLim} — ${safeValue(m.ca,{digits:1})} calculado. Revisar configuração antes de avançar.`}]);
        } else if(prev<caWarnThresh&&m.ca>=caWarnThresh){
          lastCaAlertRef.current=now;
          setMsgs(prev2=>[...prev2,{id:`ca-warn-${now}`,role:"copilot-context",time:nowStr,
            text:`CA em ${safeValue(m.ca,{digits:1})} / ${caLim} — margem de ${safeValue(caLim-m.ca,{digits:1})} restante. Legislação não validada.`}]);
        }
      },[m?.ca,mode,limits.ca]);

      // Undo history (push-before-mutate approach)
      const towerHistoryRef=useRef([]);
      function pushHistorySnapshot(currentTowers){
        towerHistoryRef.current=[...towerHistoryRef.current.slice(-19),sanitizeTowers(currentTowers)];
      }
      function undo(){
        if(towerHistoryRef.current.length===0)return;
        const prev=towerHistoryRef.current[towerHistoryRef.current.length-1];
        towerHistoryRef.current=towerHistoryRef.current.slice(0,-1);
        setTowers(sanitizeTowers(prev));
        setSel(null);
      }

      // Keyboard shortcut: 1/2/3 to switch strategies; Ctrl+Z to undo
      const switchVRef=useRef(null);
      switchVRef.current=switchVersion;
      const undoRef=useRef(null);
      undoRef.current=undo;
      const showSetbacksRef=useRef(showSetbacks);
      showSetbacksRef.current=showSetbacks;
      useEffect(()=>{
        function handler(e){
          if(mode!=="active")return;
          const el=document.activeElement;
          if(el&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA"))return;
          if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();undoRef.current();return;}
          if(e.key==="1") switchVRef.current("Versão 01");
          else if(e.key==="2") switchVRef.current("Versão 02");
          else if(e.key==="3") switchVRef.current("Versão 03");
          else if(e.key==="r"||e.key==="R") setShowSetbacks(v=>!v);
        }
        document.addEventListener("keydown",handler);
        return()=>document.removeEventListener("keydown",handler);
      },[mode]);

      function svgPt(e) {
        const svg=svgRef.current; const p=svg.createSVGPoint();
        p.x=e.clientX; p.y=e.clientY;
        return p.matrixTransform(svg.getScreenCTM().inverse());
      }

      function towerState(t) {
        if (!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)) return "conflict";
        if (towers.some(o=>o.id!==t.id&&overlaps(t,o))) return "overlap";
        if (showSetbacks&&!(pip(t.x,t.y,INSET_TERRAIN)&&pip(t.x+t.w,t.y,INSET_TERRAIN)&&pip(t.x,t.y+t.h,INSET_TERRAIN)&&pip(t.x+t.w,t.y+t.h,INSET_TERRAIN))) return "setback";
        return sel===t.id?"selected":"normal";
      }

      function onTowerDown(e,id) {
        e.stopPropagation(); setSel(id); setLiveId(id); setTeodoraAttention(value=>value+1);
        const t=towers.find(t=>t.id===id); const p=svgPt(e);
        dragging.current={id,ox:p.x-t.x,oy:p.y-t.y,orig:{x:t.x,y:t.y},tower:{...t},historySnapshot:sanitizeTowers(towers),historyPushed:false};
      }

      function onHandleDown(e,id,corner) {
        e.stopPropagation(); setLiveId(id);
        const t=towers.find(t=>t.id===id); const p=svgPt(e);
        resizing.current={id,corner,sp:p,snapshot:{...t},historySnapshot:sanitizeTowers(towers),historyPushed:false};
      }

      function onCanvasDown(e) {
        const background=e.target.dataset.panBg==="true";
        const canPan=(background&&e.button===0)||(e.shiftKey&&e.button===0)||e.button===1;
        if(zoom<=100||!canPan)return;
        e.preventDefault();
        panning.current={clientX:e.clientX,clientY:e.clientY,start:{...pan}};
        setSel(null);
      }

      function changeZoom(next) {
        setZoom(Math.max(50,Math.min(200,next)));
      }

      function onWheel(e) {
        if(!e.ctrlKey&&!e.metaKey)return;
        e.preventDefault();
        changeZoom(zoom+(e.deltaY<0?10:-10));
      }

      const onMove=useCallback(e=>{
        if(panning.current&&svgRef.current){
          const r=svgRef.current.getBoundingClientRect();
          const viewW=640/(zoom/100),viewH=440/(zoom/100);
          const dx=(e.clientX-panning.current.clientX)*viewW/r.width;
          const dy=(e.clientY-panning.current.clientY)*viewH/r.height;
          const limitX=(640-viewW)/2,limitY=(440-viewH)/2;
          setPan({
            x:Math.max(-limitX,Math.min(limitX,panning.current.start.x-dx)),
            y:Math.max(-limitY,Math.min(limitY,panning.current.start.y-dy)),
          });
          return;
        }
        if(dragging.current){
          const drag=dragging.current;
          const{id,ox,oy,tower,orig}=drag; const p=svgPt(e);
          let nx=p.x-ox,ny=p.y-oy;
          if(showSetbacksRef.current){
            const sn=nudgeInsidePoly(nx,ny,tower.w,tower.h,INSET_TERRAIN);
            const dist=Math.hypot(sn.x-nx,sn.y-ny);
            if(dist>0&&dist<10){nx=sn.x;ny=sn.y;}
          }
          if(!drag.historyPushed&&Math.hypot(nx-orig.x,ny-orig.y)>0.1){
            pushHistorySnapshot(drag.historySnapshot);
            drag.historyPushed=true;
          }
          drag.latest={x:nx,y:ny};
          setTowers(prev=>prev.map(t=>t.id===id?sanitizeTower({...t,x:nx,y:ny},t):t));
        }
        if(resizing.current){
          const resize=resizing.current;
          const{id,corner,sp,snapshot}=resize; const p=svgPt(e);
          const dx=p.x-sp.x,dy=p.y-sp.y;
          let{x,y,w,h}=snapshot;
          if(corner.includes("e"))w=snapshot.w+dx;
          if(corner.includes("s"))h=snapshot.h+dy;
          if(corner.includes("w")){x=snapshot.x+dx;w=snapshot.w-dx;}
          if(corner.includes("n")){y=snapshot.y+dy;h=snapshot.h-dy;}
          const next=resizeTowerFromSnapshot(snapshot,{x,y,w,h});
          const changed=["x","y","w","h"].some(key=>Math.abs(next[key]-snapshot[key])>0.1);
          if(!resize.historyPushed&&changed){
            pushHistorySnapshot(resize.historySnapshot);
            resize.historyPushed=true;
          }
          setTowers(prev=>prev.map(t=>t.id===id?next:t));
        }
      },[zoom,pan,towers,showSetbacks]);

      const onUp=useCallback(()=>{
        if(dragging.current){
          const{id,orig,tower,latest=orig,historyPushed}=dragging.current;
          if(!rectInPoly(latest.x,latest.y,tower.w,tower.h,TERRAIN)){
            setShakeId(id); setTimeout(()=>setShakeId(null),400);
            if(historyPushed)towerHistoryRef.current=towerHistoryRef.current.slice(0,-1);
            setTowers(prev=>prev.map(t=>t.id===id?{...t,x:orig.x,y:orig.y}:t));
          } else if(showSetbacksRef.current&&!(pip(latest.x,latest.y,INSET_TERRAIN)&&pip(latest.x+tower.w,latest.y,INSET_TERRAIN)&&pip(latest.x,latest.y+tower.h,INSET_TERRAIN)&&pip(latest.x+tower.w,latest.y+tower.h,INSET_TERRAIN))){
            const sn=nudgeInsidePoly(latest.x,latest.y,tower.w,tower.h,INSET_TERRAIN);
            setTowers(prev=>prev.map(t=>t.id===id?sanitizeTower({...t,x:sn.x,y:sn.y},t):t));
          }
          dragging.current=null;
        }
        resizing.current=null;
        panning.current=null;
        setLiveId(null);
      },[]);

      function attachFile(file) {
        const ext=(file.name.split(".").pop()||"file").toLowerCase();
        const bytes=isRenderableNumber(file.size,1024*1024*1024)?file.size:0;
        const size=bytes<1024*1024
          ? `${Math.max(1,Math.round(bytes/1024))} KB`
          : safeValue(bytes/(1024*1024),{digits:1,suffix:" MB",max:1024});
        setAttachedFile({name:file.name,ext,size,meta:"Arquivo do projeto"});
      }

      function contextualReply(text,tower,currentTowers) {
        const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const lower=text.toLowerCase();
        const asksApplyRecommended=/apli(que|car).*(recomendada|melhor)|alternativa recomendada/.test(lower);
        if(asksApplyRecommended&&lastAlternativesRef.current.length){
          const recommended=lastAlternativesRef.current.find(item=>item.recommended)||lastAlternativesRef.current[0];
          const currentMetrics=calcMetrics(currentTowers);
          return {
            id:`apply-rec-${Date.now()}`,role:"skill",time:now,
            fn:"aplicar_alternativa_recomendada()",
            sub:`${recommended.name} · prévia rastreável`,
            text:`Segundo o objetivo informado, ${recommended.name} é a alternativa recomendada. O principal trade-off é: ${recommended.impact}\n\nComo próximo passo, podemos analisar os recuos do lote para ver se há margem de otimização na projeção de alguma das torres. Quer que eu faça essa análise?`,
            preview:[
              {label:"Unidades",before:currentMetrics.valid?safeValue(currentMetrics.units):"--",after:recommended.metrics.valid?safeValue(recommended.metrics.units):"--",good:recommended.metrics.units>=currentMetrics.units},
              {label:"CA",before:currentMetrics.valid?safeValue(currentMetrics.ca,{digits:1}):"--",after:recommended.metrics.valid?safeValue(recommended.metrics.ca,{digits:1}):"--",good:recommended.metrics.ca<=limits.ca},
              {label:"Risco",before:currentMetrics.valid&&currentMetrics.ca>=limits.ca*0.9?"médio":"baixo",after:recommended.risk,good:recommended.risk==="baixo"},
            ],
            action:{id:`action-${Date.now()}`,type:"applyAlternative",targetId:null,label:`Aplicar ${recommended.name}`,after:recommended.towers,alternativeName:recommended.name},
          };
        }

        const asksAlternatives=/alternativ|redistrib|otimiz|maximiz|máximo|densidade|área livre|permeab|reduz.*risco|menor risco|variação/.test(lower);
        if(!tower||asksAlternatives){
          const generated=generateMassingAlternatives(currentTowers,lower,limits.ca,LOT,TERRAIN_POINTS);
          lastAlternativesRef.current=generated;
          const currentMetrics=calcMetrics(currentTowers);
          const tallest=[...sanitizeTowers(currentTowers)].sort((a,b)=>b.floors-a.floors)[0];
          const recommended=generated.find(item=>item.recommended);
          return {
            id:`alt-${Date.now()}`,role:"alternatives",time:now,
            text:`Objetivo interpretado: ${/livre|permeab/.test(lower)?"ampliar área livre":/unidade|dens|max/.test(lower)?"maximizar unidades dentro do CA":"reduzir risco preservando potencial"}. ${recommended?`${recommended.name} lidera segundo esse critério.`:""}\n\nPodemos comparar essas estratégias detalhadamente ou aplicar uma delas para testar a distribuição no canvas. Qual caminho você prefere seguir?`,
            diagnosis:`Diagnóstico: CA ${currentMetrics.valid?safeValue(currentMetrics.ca,{digits:1}):"--"} / ${limits.ca}. ${tallest?`Torre ${tallest.id} concentra a maior altura, com ${tallest.floors} pavimentos.`:""} Premissas regulatórias ainda requerem validação local.`,
            alternatives:generated.map(candidate=>({
              id:candidate.id,label:candidate.name,intent:candidate.description,impact:candidate.impact,
              towers:candidate.towers,deltaUnits:(candidate.metrics.valid&&currentMetrics.valid)?candidate.metrics.units-currentMetrics.units:0,
              ca:candidate.metrics.valid?safeValue(candidate.metrics.ca,{digits:1}):"--",
              occ:candidate.metrics.valid?safeValue(candidate.metrics.occ,{digits:1,suffix:"%"}):"--",
              risk:candidate.risk,recommended:candidate.recommended,applied:false,
            })),
          };
        }

        if(/explique|contribui|contribuição|impacto/.test(lower)){
          const metrics=calcMetrics(currentTowers);
          const contribution=tower.area/LOT;
          const share=metrics.valid&&metrics.units?Math.round(tower.units/metrics.units*100):null;
          return {
            id:`explain-${Date.now()}`,role:"agent",time:now,
            text:`Torre ${tower.id} contribui com aproximadamente ${safeValue(contribution,{digits:2})} de CA e ${share!==null?safeValue(share,{suffix:"%"}):"--"} das unidades do estudo. ${tower.floors>=15?"Ela concentra altura e é o primeiro ponto para redistribuição.":"Sua contribuição é moderada; ajustes locais têm impacto controlado."}\n\nRecomendação: comparar uma redistribuição antes de alterar a projeção. Confiança média — CA e unidades são calculados; legislação permanece não validada.\n\nPodemos tentar redistribuir 2 pavimentos desta torre para a Torre mais baixa para equilibrar o CA. Quer que eu simule essa alternativa?`,
          };
        }

        let type="reduce",label=`Reduzir Torre ${tower.id} em 20%`,after=scaleTower(tower,0.8);
        if(/remov|exclu|apagar|deletar|tirar/.test(lower)){
          type="remove"; label=`Remover Torre ${tower.id}`; after=null;
        } else if(/aument|mais|ampli|pavimento|cresce|subir|sobe/.test(lower)){
          type="increase"; label=`Adicionar 2 pavimentos à Torre ${tower.id}`;
          after=increaseFloors(tower,2);
        }

        const nextTowers=type==="remove"
          ? currentTowers.filter(t=>t.id!==tower.id)
          : currentTowers.map(t=>t.id===tower.id?after:t);
        const beforeM=calcMetrics(currentTowers),afterM=calcMetrics(nextTowers);
        const previewValid=beforeM.valid&&afterM.valid;
        const caLimCtx=limits.ca;
        const caHeadroom=beforeM.valid?caLimCtx-beforeM.ca:0;
        const reduceReason=caHeadroom<=1.5?`CA total em ${safeValue(beforeM.ca,{digits:1})} / ${caLimCtx} — redução libera margem regulatória.`:`Torre ${tower.id} com ${safeValue(tower.floors)} pav — redução de 20% para ajustar ocupação no lote.`;
        
        let nextStepPrompt = "";
        if (type === "remove") {
          nextStepPrompt = `\n\nAgora que removemos a Torre ${tower.id}, liberamos bastante área livre no lote. Quer que eu tente redistribuir as unidades perdidas aumentando os pavimentos das torres restantes?`;
        } else if (type === "increase") {
          nextStepPrompt = `\n\nCom mais 2 pavimentos na Torre ${tower.id}, nos aproximamos do limite de CA. Quer que eu gere alternativas para reduzir a projeção de outra torre e manter a ocupação equilibrada?`;
        } else {
          nextStepPrompt = `\n\nReduzindo a projeção da Torre ${tower.id}, diminuímos a ocupação do solo. Como próximo passo, gostaria de testar se conseguimos recuperar unidades adicionando pavimentos em outra torre?`;
        }

        return {
          id:`skill-${Date.now()}`,role:"skill",time:now,
          fn:type==="remove"?"remover_torre()":type==="increase"?"aumentar_pavimentos()":"reduzir_projecao()",
          sub:`Torre ${tower.id} · prévia calculada`,
          text:(type==="remove"
            ? `A remoção da Torre ${tower.id} ${afterM.valid?`reduz o CA para ${safeValue(afterM.ca,{digits:1})}`:"recalcula os indicadores"} e libera sua área de projeção.`
            : type==="increase"
              ? `Torre ${tower.id} com ${safeValue(tower.floors)} pavimentos. Adicionando 2 pavimentos — CA passaria de ${previewValid?safeValue(beforeM.ca,{digits:1}):"--"} para ${previewValid?safeValue(afterM.ca,{digits:1}):"--"}.`
              : reduceReason) + nextStepPrompt,
          preview:[
            {label:"Unidades",before:previewValid?safeValue(beforeM.units):"--",after:previewValid?safeValue(afterM.units):"--",good:type==="increase"},
            {label:"Área total",before:previewValid?safeValue(beforeM.area,{suffix:" m²"}):"--",after:previewValid?safeValue(beforeM.area,{suffix:" m²"}):"--",good:type!=="increase"},
            {label:"CA",before:previewValid?safeValue(beforeM.ca,{digits:1}):"--",after:previewValid?safeValue(afterM.ca,{digits:1}):"--",good:previewValid&&afterM.ca<=beforeM.ca},
          ],
          action:{id:`action-${Date.now()}`,type,targetId:tower.id,label,after},
        };
      }

      function sendMessage(text) {
        const msg=(text||input||"").trim();
        if(!msg && !attachedFile)return;
        const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const selected=towers.find(t=>t.id===sel);
        const currentTowers=sanitizeTowers(towers);
        
        const isTransitioningFromIdle = mode === "idle";

        if (isTransitioningFromIdle) {
          setMsgs([
            ...(attachedFile?[{id:`file-${Date.now()}`,role:"file",...attachedFile,time:now}]:[]),
            ...(msg?[{id:`user-${Date.now()}`,role:"user",text:msg,time:now}]:[]),
          ]);
          setLeaving(true);
          setTimeout(()=>{ setMode("active"); setLeaving(false); setChatSize("medium"); },500);
        } else {
          setMsgs(m=>[
            ...m,
            ...(attachedFile?[{id:`file-${Date.now()}`,role:"file",...attachedFile,time:now}]:[]),
            ...(msg?[{id:`user-${Date.now()}`,role:"user",text:msg,time:now}]:[]),
          ]);
        }
        
        setInput("");
        
        // Save parameters for when reasoning completes
        setThinkingQuery(msg);
        setThinkingAttached(Boolean(attachedFile));
        setThinkingFromIdle(isTransitioningFromIdle);
        setThinkingTime(now);
        setThinkingSelected(selected);
        setThinkingTowers(currentTowers);
        
        setAttachedFile(null);
        
        // Start reasoning overlay
        setIsThinking(true);
      }

      const handleReasoningComplete = useCallback(() => {
        setIsThinking(false);
        const now = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        
        let response;
        if (thinkingFromIdle) {
          response = {
            id: `proactive-greet-${Date.now()}`,
            role: "proactive-greet",
            time: now,
            text: `Analisei seu estudo. Encontrei três oportunidades interessantes.
Qual delas você gostaria de explorar?`,
            options: [
              { text: "Aumentar aproximadamente 16 unidades", query: "Quero maximizar unidades" },
              { text: "Reduzir risco regulatório", query: "Quero reduzir o risco" },
              { text: "Liberar mais área livre", query: "Quero liberar mais área livre" }
            ]
          };
        } else {
          response = contextualReply(thinkingQuery, thinkingSelected, thinkingTowers);
        }
        setMsgs(m => [...m, response]);
        if (response.role === "alternatives") {
          recordDecisionEvent("Teodora gerou 3 alternativas e recomendou uma estratégia segundo o objetivo informado.");
        }
      }, [thinkingQuery, thinkingSelected, thinkingTowers, thinkingFromIdle]);

      function applyChatAction(message) {
        const action=message.action;
        if(!action||action.applied)return;
        pushHistorySnapshot(towers);
        const before=calcMetrics(towers);
        if(action.type==="applyAlternative"){
          setTowers(sanitizeTowers(action.after));
          setSel(null);
          const after=calcMetrics(sanitizeTowers(action.after));
          recordDecisionEvent(`Aplicada “${action.alternativeName}”: CA ${before.valid?safeValue(before.ca,{digits:1}):"--"} → ${after.valid?safeValue(after.ca,{digits:1}):"--"}; unidades ${before.valid?safeValue(before.units):"--"} → ${after.valid?safeValue(after.units):"--"}.`);
        } else if(action.type==="remove"){
          setTowers(prev=>prev.filter(t=>t.id!==action.targetId));
          setSel(null);
        } else {
          setTowers(prev=>prev.map(t=>t.id===action.targetId?sanitizeTower(action.after,t):t));
          setSel(action.targetId);
        }
        setMsgs(prev=>prev.map(m=>m.id===message.id?{...m,action:{...m.action,applied:true}}:m));
      }

      function applyAlt(message,altIdx) {
        const alt=message.alternatives?.[altIdx];
        if(!alt||alt.applied)return;
        const nextTowers=sanitizeTowers(alt.towers);
        if(alt.ver&&alt.ver!==version){
          const transition=versionTransitionRef.current;
          clearTimeout(transition.switchTimer);
          clearTimeout(transition.fadeTimer);
          transition.target=null;
          transition.switchTimer=null;
          transition.fadeTimer=null;
          setTransitioning(false);
          setVersions(prev=>({...prev,[version]:sanitizeTowers(towers),[alt.ver]:nextTowers}));
          towerHistoryRef.current=[];
          setVersion(alt.ver);
          setPan({x:0,y:0});
        } else {
          pushHistorySnapshot(towers);
        }
        setTowers(nextTowers);
        setSel(null);
        const before=calcMetrics(towers),after=calcMetrics(nextTowers);
        recordDecisionEvent(`Aplicada “${alt.label}”: CA ${before.valid?safeValue(before.ca,{digits:1}):"--"} → ${after.valid?safeValue(after.ca,{digits:1}):"--"}; unidades ${before.valid?safeValue(before.units):"--"} → ${after.valid?safeValue(after.units):"--"}.`);
        setMsgs(prev=>prev.map(item=>item.id===message.id?{...item,alternatives:item.alternatives.map((candidate,index)=>({...candidate,applied:index===altIdx}))}:item));
      }

      function switchVersion(newVer) {
        const transition=versionTransitionRef.current;
        if(newVer===version){
          if(transition.target){
            clearTimeout(transition.switchTimer);
            clearTimeout(transition.fadeTimer);
            transition.target=null;
            transition.switchTimer=null;
            transition.fadeTimer=null;
            setTransitioning(false);
          }
          return;
        }
        if(newVer===transition.target)return;
        clearTimeout(transition.switchTimer);
        clearTimeout(transition.fadeTimer);
        transition.target=newVer;
        const oldVer = version;
        const oldTowers = sanitizeTowers(towers);
        const newTowers = sanitizeTowers(versions[newVer]);
        setVersions(v=>({...v,[version]:sanitizeTowers(towers)}));
        setTransitioning(true);
        transition.switchTimer=setTimeout(()=>{
          if(versionTransitionRef.current.target!==newVer)return;
          versionTransitionRef.current.switchTimer=null;
          towerHistoryRef.current=[];
          setTowers(sanitizeTowers(newTowers));
          setVersion(newVer);
          setSel(null);
          setPan({x:0,y:0});
          versionTransitionRef.current.fadeTimer=setTimeout(()=>{
            if(versionTransitionRef.current.target!==newVer)return;
            versionTransitionRef.current.target=null;
            versionTransitionRef.current.fadeTimer=null;
            setTransitioning(false);
          },180);
          const oldM=calcMetrics(oldTowers);
          const newM=calcMetrics(newTowers);
          const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
          const decisionNote=decision
            ?(newVer===decision.strategy?" · Decisão registrada nesta estratégia.":" · Decisão registrada em "+scenarioName(decision.strategy)+".")
            :"";
          const text=(oldM.valid&&newM.valid)
            ?(()=>{
                const du=newM.units-oldM.units;
                const dc=safeValue(Math.abs(newM.ca-oldM.ca),{digits:1});
                const caDir=newM.ca>oldM.ca?"↑":"↓";
                const unDir=du>=0?"+":"";
                return `Estratégia alterada · ${scenarioName(newVer)} · ${safeValue(newM.units)} un (${unDir}${du}) · CA ${safeValue(newM.ca,{digits:1})} ${caDir}${dc} vs ${scenarioName(oldVer)}${decisionNote}`;
              })()
            :`Estratégia alterada para ${scenarioName(newVer)}${decisionNote}`;
          setMsgs(prev=>[...prev,{id:`switch-${Date.now()}`,role:"copilot-context",time:now,text}]);
        }, 200);
      }

      function addTower() {
        const ids=["A","B","C","D","E","F"];
        if(towers.length>=6) return;
        const newId=ids.find(id=>!towers.some(t=>t.id===id));
        const t={id:newId,x:240,y:185,w:60,h:44,floors:10,units:40,area:1760,type:"Studio 44m²"};
        pushHistorySnapshot(towers);
        setTowers(prev=>sanitizeTowers([...prev,t]));
        setSel(newId);
      }

      function adjustTower(id) {
        pushHistorySnapshot(towers);
        setTowers(prev=>prev.map(t=>t.id===id?scaleTower(t,0.8):t));
      }

      function saveTower(updated) {
        pushHistorySnapshot(towers);
        setTowers(prev=>prev.map(t=>t.id===updated.id?sanitizeTower(updated,t):t));
      }

      function removeTower(id) {
        pushHistorySnapshot(towers);
        setTowers(prev=>prev.filter(t=>t.id!==id));
        setSel(null);
      }

        const blob=new Blob([html],{type:"text/html;charset=utf-8"});

                  </pattern>
                  <radialGradient id="terrain-fill" cx="50%" cy="50%" r="58%">
                    <stop offset="0%" stopColor="rgba(1,173,110,0.13)"/>
                    <stop offset="100%" stopColor="rgba(1,173,110,0.04)"/>
                  </radialGradient>
                  <filter id="lot-glow">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                </defs>
                <rect data-pan-bg="true" x="-320" y="-220" width="1280" height="880" fill="url(#g)"/>
                <polygon points={TERRAIN} fill="url(#terrain-fill)" stroke="none"/>
                <polygon points={TERRAIN} fill="none" stroke="rgba(1,173,110,0.55)" strokeWidth="1.5" filter="url(#lot-glow)"/>
                <text x="315" y="232" textAnchor="middle" fill={C.gray} fontSize="10" fontFamily="'Inter',sans-serif" fontWeight="500" opacity="0.5">847 m²</text>

                {showSetbacks && view==="2D" && <SetbackOverlay/>}


                {view==="2D" && towers.map((t,i)=>{
                  const st=towerState(t);
                  const isSel=sel===t.id,isHov=hoverId===t.id&&!isSel,isShk=shakeId===t.id;
                  const fill=st==="conflict"?"rgba(253,72,72,0.22)":st==="overlap"?"rgba(255,188,0,0.14)":st==="setback"?"rgba(255,188,0,0.10)":isSel?"rgba(1,173,110,0.28)":isHov?"rgba(46,62,82,0.95)":"#2c3f52";
                  const stroke=st==="conflict"?C.red:st==="overlap"||st==="setback"?C.yellow:isSel?C.green2:isHov?"#6a8aaa":"#3e5568";
                  const sw=isSel?2.2:isHov?1.8:1.2;
                  const tipW=118,tipH=36;
                  const tipX=Math.max(-10,t.x+t.w/2-tipW/2);
                  const tipY=t.y>60?t.y-tipH-8:t.y+t.h+8;
                  return (
                    <g key={t.id} className={isShk?"shake":isSel?"pulse-t":""}
                      style={{cursor:dragging.current?.id===t.id?"grabbing":"grab"}}
                      onMouseDown={e=>onTowerDown(e,t.id)}
                      onMouseEnter={()=>setHoverId(t.id)}
                      onMouseLeave={()=>setHoverId(null)}
                      onClick={e=>e.stopPropagation()}
                    >
                      {/* shadow */}
                      <rect x={t.x+3} y={t.y+5} width={t.w} height={t.h} rx={5} fill="rgba(0,0,0,0.35)" style={{filter:"blur(6px)"}}/>
                      <rect x={t.x} y={t.y} width={t.w} height={t.h} rx={5} fill={fill} stroke={stroke} strokeWidth={sw}
                        style={{filter:isSel?"drop-shadow(0 0 10px rgba(51,224,161,0.45))":isHov?"drop-shadow(0 0 5px rgba(100,140,180,0.2))":"none",transition:"fill 0.15s ease,stroke 0.15s ease,filter 0.15s ease"}}
                      />
                      {/* tower label */}
                      <text x={t.x+t.w/2} y={t.y+t.h/2+(isSel?-7:!isHov&&t.h>32?-1:4)} textAnchor="middle" fill="#fff" fontSize={13} fontWeight="700" fontFamily="'Sora',sans-serif" style={{pointerEvents:"none"}}>{t.id}</text>
                      {isSel&&<text x={t.x+t.w/2} y={t.y+t.h/2+9} textAnchor="middle" fill="rgba(255,255,255,0.55)" fontSize={9} fontFamily="'Inter',sans-serif" style={{pointerEvents:"none"}}>{safeValue(t.floors)}pav · {safeValue(t.units)}un</text>}
                      {!isSel&&!isHov&&t.h>32&&<text x={t.x+t.w/2} y={t.y+t.h/2+12} textAnchor="middle" fill="rgba(255,255,255,0.35)" fontSize={8} fontFamily="'Inter',sans-serif" style={{pointerEvents:"none"}}>{safeValue(t.floors)}p</text>}
                      {/* hover tooltip */}
                      {isHov&&(
                        <g style={{pointerEvents:"none"}}>
                          <rect x={tipX} y={tipY} width={tipW} height={tipH} rx={5} fill="rgba(10,13,20,0.96)" stroke="rgba(255,255,255,0.1)" strokeWidth="0.8"/>
                          <text x={tipX+tipW/2} y={tipY+14} textAnchor="middle" fill="#fff" fontSize={10} fontWeight="700" fontFamily="'Sora',sans-serif">{safeValue(t.floors)} pav · {safeValue(t.units)} un.</text>
                          <text x={tipX+tipW/2} y={tipY+26} textAnchor="middle" fill={C.gray} fontSize={9} fontFamily="'Inter',sans-serif">{safeValue(t.area,{suffix:" m²"})} · {t.type}</text>
                        </g>
                      )}
                      {/* conflict/overlap badge */}
                      {st==="overlap"&&<>
                        <rect x={t.x+t.w/2-27} y={t.y-19} width={54} height={16} rx={4} fill={C.yellow}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#000" fontSize={9} fontWeight="700" fontFamily="'Inter',sans-serif">Conflito</text>
                      </>}
                      {st==="conflict"&&<>
                        <rect x={t.x+t.w/2-29} y={t.y-19} width={58} height={16} rx={4} fill={C.red}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#fff" fontSize={9} fontWeight="700" fontFamily="'Inter',sans-serif">Fora do lote</text>
                      </>}
                      {st==="setback"&&<>
                        <rect x={t.x+t.w/2-24} y={t.y-19} width={48} height={16} rx={4} fill={C.yellow} opacity={0.92}/>
                        <text x={t.x+t.w/2} y={t.y-8} textAnchor="middle" fill="#000" fontSize={9} fontWeight="700" fontFamily="'Inter',sans-serif">Recuo</text>
                      </>}
                      {/* resize handles */}
                      {isSel&&[["nw",t.x-4,t.y-4],["ne",t.x+t.w-4,t.y-4],["sw",t.x-4,t.y+t.h-4],["se",t.x+t.w-4,t.y+t.h-4]].map(([corner,hx,hy])=>(
                        <rect key={corner} x={hx} y={hy} width={8} height={8} rx={2} fill="rgba(255,255,255,0.95)" stroke={C.green2} strokeWidth={1.2}
                          style={{cursor:`${corner}-resize`}}
                          onMouseDown={e=>{e.stopPropagation();onHandleDown(e,t.id,corner);}}
                        />
                      ))}
                    </g>
                  );
                })}

                {view==="3D" && towers.map(t=>(
                  <Tower3D key={t.id} tower={t} selected={sel===t.id} onSelect={id=>{setSel(id);setTeodoraAttention(value=>value+1);}}/>
                ))}

                {liveId&&(()=>{const t=towers.find(item=>item.id===liveId);if(!t)return null;const wM=safeValue(t.w/M_TO_SVG,{digits:1,suffix:"m"});const hM=safeValue(t.h/M_TO_SVG,{digits:1,suffix:"m"});const label=`${wM} × ${hM}`;const tw=label.length*5.5+12;return <g style={{pointerEvents:"none"}}><rect x={t.x+t.w/2-tw/2} y={t.y-22} width={tw} height={14} rx={3} fill="rgba(10,13,20,0.92)" stroke="rgba(255,255,255,0.15)" strokeWidth="0.7"/><text x={t.x+t.w/2} y={t.y-12} textAnchor="middle" fill="rgba(255,255,255,0.9)" fontSize={8.5} fontFamily="'Inter',sans-serif">{label}</text></g>;})()}

                {view==="2D" && selTower && <DistanceRuler tower={selTower} towers={towers}/>}
              </svg>

              {/* floating chat */}
              {!presenting && <ChatPanel msgs={msgs} typing={typing} input={input} setInput={setInput}
                onSend={()=>sendMessage()} size={chatSize} setSize={setChatSize}
                attachedFile={attachedFile} onAttachFile={attachFile}
                onRemoveFile={()=>setAttachedFile(null)}
                onAction={applyChatAction}
                onApplyAlt={applyAlt}
                sel={sel}
                attentionSignal={teodoraAttention}
                onPromptSubmit={prompt=>{setChatSize("full");sendMessage(prompt);}}
              />}

              {/* compare panel — 2.2 */}
              {!presenting&&comparing && <ComparePanel
                versions={{...versions,[version]:towers}}
                currentVersion={version}
                onClose={()=>setComparing(false)}
                onPreview={v=>{switchVersion(v);setComparing(false);recordDecisionEvent(`Estratégia “${scenarioName(v)}” aberta no canvas para inspeção.`);}}
                onSwitch={(v,meta={})=>{
                  const newM=calcMetrics(sanitizeTowers(versions[v]||[]));
                  const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
                  switchVersion(v);
                  setComparing(false);
                  setDecision({strategy:v,time:now,units:newM.valid?newM.units:null,ca:newM.valid?newM.ca:null,limits:{...limits},reason:meta.reason||null,pending:meta.pending||[]});
                  recordDecisionEvent(`Decisão registrada: avançar com “${scenarioName(v)}”${meta.reason?` — ${meta.reason}`:""}.`);
                  const reasonPart=meta.reason?` · "${meta.reason}"`:"";
                  const pendingPart=meta.pending&&meta.pending.length>0?` · Pendências: ${meta.pending.join(", ")}.`:" Sem pendências registradas.";
                  setMsgs(prev=>[...prev,{id:`decide-${Date.now()}`,role:"copilot-context",time:now,
                    text:`Decisão registrada: ${scenarioName(v)} · ${newM.valid?safeValue(newM.units)+" un · CA "+safeValue(newM.ca,{digits:1}):"indicadores calculados"}${reasonPart}.${pendingPart}`}]);
                }}
                limits={limits}
              />}
            </div>

            {/* CONTEXT SIDE PANEL */}
            {mode==="active"&&!presenting&&!comparing&&(
              <ContextPanel m={m} towers={towers} version={version} sel={sel} onSelect={setSel} onSave={saveTower} onAdjust={adjustTower} onRemove={removeTower} onAddTower={addTower} limits={limits} decision={decision} decisionStale={decisionStale} decisionLog={decisionLog} onAgentAction={prompt=>{setChatSize("full");sendMessage(prompt);}} onSetLimits={newLim=>{
                  setLimits(newLim);
                  recordDecisionEvent(`Premissas alteradas: CA máximo ${newLim.ca} e TO máxima ${newLim.to}%.`);
                  const nowStr=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
                  setMsgs(prev=>[...prev,{id:`limits-${Date.now()}`,role:"copilot-context",time:nowStr,
                    text:`Premissas atualizadas: CA máx ${newLim.ca} · TO máx ${newLim.to}%. Status e barras recalculados. Confirmar com legislação local antes de avançar.`}]);
                }}/>
            )}

            {/* IDLE SCREEN */}
            {mode==="idle" && <IdleScreen
              onSend={sendMessage} leaving={leaving}
              attachedFile={attachedFile} onAttachFile={attachFile}
              onRemoveFile={()=>setAttachedFile(null)}
            />}

            {/* REASONING OVERLAY */}
            <ReasoningOverlay
              isThinking={isThinking}
              query={thinkingQuery}
              hasAttachedFile={thinkingAttached}
              onComplete={handleReasoningComplete}
              viewportWidth={viewportWidth}
            />
          </div>
          {exportOpen && <ExportModal towers={towers} version={version} onClose={()=>setExportOpen(false)} onDownload={downloadReport}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ArqgenNext/>);
  </script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const src = document.getElementById('app-src').textContent;
      try {
        const compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        (new Function(compiled))();
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#FD4848;padding:20px;font-size:12px;white-space:pre-wrap">' + e.message + '</pre>';
      }
    });
  </script>
</body>
</html>
