<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arqgen Next · V0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="./calculations.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #11151d; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    @keyframes bounce   { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
    @keyframes pulseT   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.018)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut  { from{opacity:1} to{opacity:0} }
    @keyframes slideUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes expandIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    @keyframes canvasIn { from{opacity:0;transform:scale(1.02)} to{opacity:1;transform:scale(1)} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes springIn { from{opacity:0;transform:scale(0.82) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes insightIn { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideInPanel { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }

    .shake   { animation: shake  300ms ease forwards; }
    .pulse-t { animation: pulseT 200ms ease 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script id="app-src" type="text/plain">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;
    const { LIMITS, sanitizeTower, sanitizeTowers, calcMetrics:calculateMetrics, scaleTower, resizeTowerFromSnapshot, increaseFloors, isRenderableNumber, formatNumber } = ArqgenCalc;

    /* ── palette ──────────────────────────────────────────────── */
    const C = {
      ink:    "#1A202C", ink2:   "#11151d", card:   "#20262f",
      green:  "#01AD6E", green2: "#33E0A1", purple: "#564FFF",
      yellow: "#FFBC00", red:    "#FD4848", gray:   "#718096",
      gray2:  "#CBD5E0",
    };

    function getStatus(m, lim) {
      const caLim=lim?.ca??CA_LIMIT, toMax=lim?.to??TO_LIMIT;
      const caWarn=Math.max(caLim*0.83,caLim-2), toWarn=Math.max(toMax*0.83,toMax-8);
      if (!m?.valid||![m.ca,m.occ,m.units,m.area].every(value=>isRenderableNumber(value))) return {key:"invalid",label:"Dados insuficientes",detail:"Indicadores não calculados",dot:C.red,color:C.red,bg:"rgba(253,72,72,0.08)",border:"rgba(253,72,72,0.2)"};
      if (m.ca>=caLim||m.occ>=toMax) return {key:"warning",label:"Limites informados excedidos",detail:`CA ${formatNumber(m.ca,{digits:1})} ou TO ${formatNumber(m.occ,{digits:1})}% — limite excedido · revisar`,nextStep:"Revisar pavimentos das torres maiores antes de avançar.",dot:C.yellow,color:C.yellow,bg:"rgba(255,188,0,0.08)",border:"rgba(255,188,0,0.25)"};
      if (m.ca>=caWarn||m.occ>=toWarn) return {key:"caution",label:"Próximo aos limites informados",detail:`CA ${formatNumber(m.ca,{digits:1})} / ${caLim} · TO ${formatNumber(m.occ,{digits:1})}% — margem reduzida`,nextStep:m.ca>=caWarn?"Comparar com Mais área livre para redistribuir o risco.":null,dot:C.yellow,color:"#e5ab00",bg:"rgba(255,188,0,0.06)",border:"rgba(255,188,0,0.18)"};
      const approxExtra=Math.max(1,Math.round((caLim-m.ca)*LOT/52));
      const nextStep=m.ca<caLim*0.58?"Explorar Máxima densidade para aumentar o aproveitamento do lote.":null;
      return {key:"preliminary",label:"Avaliação preliminar",detail:`CA ${formatNumber(m.ca,{digits:1})} / ${caLim} · ~${approxExtra} un de margem · legislação não validada`,nextStep,dot:C.purple,color:"rgba(203,200,255,0.95)",bg:"rgba(86,79,255,0.08)",border:"rgba(86,79,255,0.25)"};
    }

    /* ── icons ────────────────────────────────────────────────── */
    const Icon = {
      Send:      ({s=14,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
      ZoomIn:    ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
      ZoomOut:   ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
      X:         ({s=12,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Layers:    ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,

      Square:    ({s=12,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>,
      Expand:    ({s=12,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>,
      Plus:      ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Ruler:      ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/><path d="M20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>,
      Paperclip:  ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>,
      Download:   ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Present:    ({s=13,c="currentColor"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="13" rx="2"/><line x1="8" y1="21" x2="12" y2="16"/><line x1="16" y1="21" x2="12" y2="16"/></svg>,
    };

    /* ── Arqgen logo SVG (dark-mode: dark fill → white) ──────── */
    function ArqgenLogo({height=36}) {
      // original 160×32 viewBox; scale to desired height
      return (
        <svg height={height} viewBox="0 0 160 32" fill="none" xmlns="http://www.w3.org/2000/svg" style={{display:"block"}}>
          <path d="M26.154 0.587903H17.1013C13.3144 0.587903 10.2305 3.68187 10.2305 7.48756V18.4694H14.2135V22.4692H26.154C29.9408 22.4692 33.0248 19.3752 33.0248 15.5695V7.48462C33.0248 3.68187 29.9438 0.584961 26.154 0.584961V0.587903ZM29.0388 15.5695C29.0388 17.1665 27.7443 18.4664 26.154 18.4664H26.1305H18.7882H14.2165V7.48462C14.2165 5.88764 15.511 4.5877 17.1013 4.5877H26.154C27.7443 4.5877 29.0388 5.88764 29.0388 7.48462V15.5695Z" fill="#01AD6E"/>
          <path d="M6.8708 31.7336C3.08395 31.7336 0 28.6396 0 24.8339V16.749C0 12.9463 3.08102 9.84937 6.8708 9.84937H18.8112V13.8492H6.8708C5.2805 13.8492 3.986 15.1491 3.986 16.7461V24.831C3.986 26.428 5.2805 27.7279 6.8708 27.7279H15.9235C17.5138 27.7279 18.8083 26.428 18.8083 24.831V13.8492H22.7914V24.831C22.7914 28.6337 19.7104 31.7306 15.9206 31.7306H6.86787L6.8708 31.7336Z" fill="#ffffff"/>

            <path d="M9.64453 0V23.0577H33.6074V0H9.64453ZM14.5062 13.8523H9.9374V9.85245H14.5062V13.8523Z" fill="white"/>
          </mask>

            <path d="M26.153 0.588147H17.1003C13.3134 0.588147 10.2295 3.68211 10.2295 7.4878V18.4696H14.2126V22.4694H26.153C29.9398 22.4694 33.0238 19.3755 33.0238 15.5698V7.48486C33.0238 3.68211 29.9428 0.585205 26.153 0.585205V0.588147ZM29.0378 15.5698C29.0378 17.1667 27.7433 18.4667 26.153 18.4667H26.1296H18.7872H14.2155V7.48486C14.2155 5.88788 15.51 4.58795 17.1003 4.58795H26.153C27.7433 4.58795 29.0378 5.88788 29.0378 7.48486V15.5698Z" fill="#01AD6E"/>
          </g>
          <path d="M78.6211 14.6346V14.214C78.6211 10.4348 76.7291 8.3584 72.3273 8.3584H63.6787V23.9606H67.5974V20.2019H71.8235L75.7187 19.9578C77.7864 19.1167 78.624 17.1727 78.624 14.6316L78.6211 14.6346ZM67.5944 16.6903V12.1141H71.9963C73.7125 12.1141 74.682 12.3582 74.682 14.2346V14.5875C74.682 16.4668 73.6481 16.6874 71.9963 16.6874H67.5944V16.6903Z" fill="#ffffff"/>
          <path d="M51.926 8.3584H47.7702L40.7031 23.9606H45.0845L46.0715 21.5283H53.6218L54.6146 23.9606H58.996L51.926 8.3584ZM47.3924 18.3491L49.8583 12.3817L52.3243 18.3491H47.3953H47.3924Z" fill="#ffffff"/>
          <path d="M73.2588 23.9609H77.6373L74.65 17.5847H70.3652L73.2588 23.9609Z" fill="#ffffff"/>
          <path d="M100.127 18.5902V12.1141H96.2079V18.7226C96.2079 19.7578 95.6807 20.2049 94.9105 20.2049H89.1233C88.353 20.2049 87.8259 19.8108 87.8259 18.7226V13.617C87.8259 12.5288 88.3384 12.1141 89.1233 12.1141H96.2108V8.3584H89.1233C85.603 8.3584 83.9072 10.5671 83.9072 13.7522V18.5932C83.9072 21.7548 85.603 23.9635 89.1233 23.9635H93.3641L94.6762 26.8134H99.0048L97.4731 23.4488C99.2596 22.6195 100.127 20.846 100.127 18.5902Z" fill="#ffffff"/>
          <path d="M138.733 8.3584H126.254V23.9606H139.392V20.2049H138.736C138.736 20.2049 138.736 20.2049 138.733 20.2049H130.149V17.8168H136.024V14.4228H135.491C135.45 14.4169 135.409 14.414 135.362 14.414H130.146V12.1141H139.389V8.3584H138.73H138.733Z" fill="#01AD6E"/>
          <path d="M159.091 8.3584H155.834V17.9285L148.682 8.75544C148.682 8.75544 148.668 8.74073 148.659 8.73191L148.366 8.3584H144.676V23.9606H148.594V14.4346L155.12 22.7606L155.746 23.5635C155.773 23.5959 155.802 23.6194 155.831 23.6488L156.083 23.9606H159.753V8.3584H159.094H159.091Z" fill="#01AD6E"/>
          <path d="M109.326 13.617C109.326 12.4994 109.789 12.1141 110.623 12.1141H117.049V8.3584H110.623C107.103 8.3584 105.407 10.5671 105.407 13.7522V20.2049H109.326V13.6199V13.617Z" fill="#01AD6E"/>
          <path d="M113.189 14.4231V17.8053H117.052V18.7229C117.052 19.9875 116.44 20.2052 115.755 20.2052H109.329V23.9638H115.755C119.275 23.9638 120.971 21.3433 120.971 18.1817V14.4231H113.189Z" fill="#01AD6E"/>
        </svg>
      );
    }

    /* ── data ─────────────────────────────────────────────────── */
    const TERRAIN = "160,60 480,40 560,120 540,360 420,400 180,380 80,280 100,140";
    const LOT = 847;
    const CA_LIMIT = 12;
    const TO_LIMIT = 50;

    const INIT_TOWERS = [
      { id:"A", x:185, y:145, w:72,  h:52, floors:12, units:48, area:2304, type:"Studio 44m²"  },
      { id:"B", x:310, y:165, w:88,  h:60, floors:15, units:75, area:5100, type:"Studio 44m²"  },
      { id:"C", x:390, y:270, w:64,  h:48, floors:10, units:40, area:1920, type:"1 dorm 52m²" },
    ];

    const VERSIONS_INIT = {
      "Versão 01": [
        { id:"A", x:185, y:145, w:72, h:52, floors:12, units:48,  area:2304, type:"Studio 44m²"  },
        { id:"B", x:310, y:165, w:88, h:60, floors:15, units:75,  area:5100, type:"Studio 44m²"  },
        { id:"C", x:390, y:270, w:64, h:48, floors:10, units:40,  area:1920, type:"1 dorm 52m²" },
      ],
      "Versão 02": [
        { id:"A", x:178, y:138, w:82, h:60, floors:16, units:96,  area:4224, type:"Studio 44m²"  },
        { id:"B", x:305, y:155, w:96, h:66, floors:18, units:108, area:4752, type:"Studio 44m²"  },
        { id:"C", x:382, y:262, w:72, h:54, floors:13, units:65,  area:3380, type:"1 dorm 52m²" },
      ],
      "Versão 03": [
        { id:"A", x:175, y:138, w:64, h:50, floors:11, units:44,  area:1936, type:"Studio 44m²"  },
        { id:"B", x:300, y:140, w:78, h:56, floors:13, units:65,  area:2860, type:"Studio 44m²"  },
        { id:"C", x:385, y:218, w:65, h:48, floors:11, units:55,  area:2420, type:"Studio 44m²"  },
        { id:"D", x:238, y:265, w:58, h:44, floors:10, units:40,  area:2080, type:"1 dorm 52m²" },
      ],
    };

    const SCENARIO_META = {
      "Versão 01": {
        name:"Equilíbrio de implantação",
        revision:"v01",
        intent:"Três torres com alturas moderadas e distribuição equilibrada no lote.",
        tradeoff:"Densidade média · menor risco de aprovação · área de permanência preservada.",
      },
      "Versão 02": {
        name:"Máxima densidade",
        revision:"v02",
        intent:"Torres maiores para maximizar unidades e aproveitamento do CA disponível.",
        tradeoff:"CA elevado · TO próxima ao limite · maior exposição a risco regulatório.",
      },
      "Versão 03": {
        name:"Mais área livre",
        revision:"v03",
        intent:"Quatro torres menores liberando permeabilidade no centro do lote.",
        tradeoff:"CA reduzido · TO baixa · quatro blocos ampliam complexidade construtiva.",
      },
    };
    const scenarioName=key=>SCENARIO_META[key]?.name||key;
    const scenarioRevision=key=>SCENARIO_META[key]?.revision||key;
    const scenarioIntent=key=>SCENARIO_META[key]?.intent||"";
    const scenarioTradeoff=key=>SCENARIO_META[key]?.tradeoff||"";

    function computeInsights(towers, m) {
      const insights = [];
      if (!m?.valid) return insights;
      const clean = sanitizeTowers(towers);
      const caHeadroom = CA_LIMIT - m.ca;
      const toHeadroom = TO_LIMIT - m.occ;

      // CA opportunity or risk
      if (caHeadroom > 2.5) {
        const approxExtra = Math.max(1, Math.round(caHeadroom * LOT / 52));
        insights.push({
          id: "ca-headroom",
          type: "opportunity",
          text: `CA em ${safeValue(m.ca,{digits:1})} de ${CA_LIMIT} — margem para ~${approxExtra} unidades adicionais.`,
        });
      } else if (m.ca >= 11) {
        insights.push({
          id: "ca-risk",
          type: "warning",
          text: `CA em ${safeValue(m.ca,{digits:1})} / ${CA_LIMIT} — apenas ${safeValue(caHeadroom,{digits:1})} de margem. Qualquer adição pode exceder o limite.`,
        });
      }

      // Tower growth opportunity
      const lowTower = clean.find(t => t.floors < 10 && caHeadroom > 1.5);
      if (lowTower) {
        const towerM2 = Math.max(lowTower.w * lowTower.h, 1) / SVG_PER_M2;
        const potentialFloors = Math.max(2, Math.min(6, Math.floor(caHeadroom * LOT / towerM2)));
        insights.push({
          id: `grow-${lowTower.id}`,
          type: "opportunity",
          text: `Torre ${lowTower.id} pode absorver ${potentialFloors} pavimentos adicionais sem comprometer o CA.`,
        });
      }

      // TO space
      if (toHeadroom > 12) {
        const freeM2 = Math.round(toHeadroom / 100 * LOT);
        insights.push({
          id: "to-space",
          type: "info",
          text: `${safeValue(freeM2,{suffix:" m²"})} de área disponível no lote · TO em ${safeValue(m.occ,{digits:1})}% de ${TO_LIMIT}%.`,
        });
      }

      // Conflict/overlap warnings
      clean.forEach(t => {
        if (!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)) {
          insights.push({ id:`conflict-${t.id}`, type:"warning", text:`Torre ${t.id} fora dos limites do lote — regularizar posição antes de calcular.` });
        }
      });
      for (let i = 0; i < clean.length; i++) {
        for (let j = i+1; j < clean.length; j++) {
          if (overlaps(clean[i], clean[j])) {
            insights.push({ id:`overlap-${clean[i].id}-${clean[j].id}`, type:"warning", text:`Torres ${clean[i].id} e ${clean[j].id} se sobrepõem — métricas estão inconsistentes.` });
          }
        }
      }

      // Low units / high floor warning
      const highTower = clean.find(t => t.floors >= 15 && m.ca >= 10);
      if (highTower && !insights.some(i => i.id === "ca-risk")) {
        insights.push({
          id: `tall-${highTower.id}`,
          type: "warning",
          text: `Torre ${highTower.id} com ${safeValue(highTower.floors)} pavimentos mantém CA em ${safeValue(m.ca,{digits:1})} — conferir margem antes de crescer.`,
        });
      }

      return insights.slice(0, 4);
    }

    function initialHistory() {
      const pts = "160,60 480,40 560,120 540,360 420,400 180,380 80,280 100,140".split(" ").map(p=>p.split(",").map(Number));
      const m = calculateMetrics(sanitizeTowers(INIT_TOWERS), LOT, pts);
      const units = m.valid ? m.units : 163;
      const occ   = m.valid ? formatNumber(m.occ, {digits:1}) : "38";
      const ca    = m.valid ? formatNumber(m.ca,  {digits:1}) : "3.7";
      const tB    = INIT_TOWERS.find(t=>t.id==="B");
      const bShare= (m.valid&&m.units>0&&tB) ? Math.round(tB.units/m.units*100) : 46;
      return [

    /* ── geometry ─────────────────────────────────────────────── */
    function pip(px, py, pts) {
      let inside = false;
      for (let i=0, j=pts.length-1; i<pts.length; j=i++) {
        const [xi,yi]=pts[i],[xj,yj]=pts[j];
        if ((yi>py)!==(yj>py) && px<((xj-xi)*(py-yi))/(yj-yi)+xi) inside=!inside;
      }
      return inside;
    }
    const parsePoly = str => str.split(" ").map(p=>p.split(",").map(Number));
    const TERRAIN_POINTS=parsePoly(TERRAIN);
    const calcMetrics=towers=>calculateMetrics(towers,LOT,TERRAIN_POINTS);
    const safeValue=(value,options={})=>formatNumber(value,{fallback:"--",...options});
    function rectInPoly(x,y,w,h,str) {
      const pts=parsePoly(str);
      return pip(x,y,pts)&&pip(x+w,y,pts)&&pip(x,y+h,pts)&&pip(x+w,y+h,pts);
    }
    const overlaps = (a,b) => a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;

    function closestPointOnSegment(p,a,b) {
      const dx=b[0]-a[0],dy=b[1]-a[1];
      const len2=dx*dx+dy*dy;
      const t=len2?Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/len2)):0;
      const point=[a[0]+t*dx,a[1]+t*dy];
      return {point,distance:Math.hypot(p[0]-point[0],p[1]-point[1])};
    }

    function nudgeInsidePoly(x,y,w,h,pts) {
      const corners=[[x,y],[x+w,y],[x,y+h],[x+w,y+h]];
      let bx=0,by=0;
      for(const [cx,cy] of corners){
        if(!pip(cx,cy,pts)){
          const res=closestPointOnPolygon([cx,cy],pts);
          const ddx=res.point[0]-cx,ddy=res.point[1]-cy;
          if(Math.abs(ddx)>Math.abs(bx))bx=ddx;
          if(Math.abs(ddy)>Math.abs(by))by=ddy;
        }
      }
      return{x:x+bx,y:y+by};
    }

    function closestPointOnPolygon(p,pts) {
      return pts.reduce((best,a,i)=>{
        const candidate=closestPointOnSegment(p,a,pts[(i+1)%pts.length]);
        return !best||candidate.distance<best.distance?{...candidate,edge:i}:best;
      },null);
    }

    /* ── geometry extra ───────────────────────────────────────── */
    const M_TO_SVG = 13.06; // 1m ≈ 13.06 SVG units (847m² = 144400 SVG²)
    const SVG_PER_M2 = M_TO_SVG * M_TO_SVG; // ≈ 170.56 SVG² per m² — precomputed to avoid repeated polygon area computation

    function insetPoly(pts, distances) {
      const n = pts.length;
      function inNorm(a, b) {
        const dx=b[0]-a[0], dy=b[1]-a[1], len=Math.sqrt(dx*dx+dy*dy);
        return [-dy/len, dx/len]; // CCW rotation = inward for CW polygon in SVG Y-down
      }
      const norms = pts.map((p,i)=>inNorm(p,pts[(i+1)%n]));
      function offPt(i, end) {
        const pi=pts[end?((i+1)%n):i];
        const d=Array.isArray(distances)?distances[i]:distances;
        return [pi[0]+norms[i][0]*d, pi[1]+norms[i][1]*d];
      }
      function xsect(a,b,c,e) {
        const dx1=b[0]-a[0],dy1=b[1]-a[1],dx2=e[0]-c[0],dy2=e[1]-c[1];
        const den=dx1*dy2-dy1*dx2;
        if(Math.abs(den)<0.001) return [(b[0]+c[0])/2,(b[1]+c[1])/2];
        const t=((c[0]-a[0])*dy2-(c[1]-a[1])*dx2)/den;
        return [a[0]+t*dx1, a[1]+t*dy1];
      }
      return pts.map((_,i)=>{
        const prev=(i-1+n)%n;
        return xsect(offPt(prev,false),offPt(prev,true),offPt(i,false),offPt(i,true));
      });
    }

    /* ── FlipValue ────────────────────────────────────────────── */
    function FlipValue({val,suffix="",size=20}) {
      const safe=isRenderableNumber(val)?val:null;
      const [disp,setDisp]=useState(safe);

      const prev=useRef(safe);

              <span style={{background:"rgba(255,188,0,0.1)",border:"1px solid rgba(255,188,0,0.28)",borderRadius:10,fontFamily:"'Inter',sans-serif",fontSize:8,fontWeight:600,color:C.yellow,padding:"1px 5px"}}>simulado</span>

                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:9,color:C.gray,marginBottom:3}}>CA máximo</div>

                    />

                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:9,color:C.gray,marginBottom:3}}>TO máx. (%)</div>
                    <input type="number" value={draftTO} min="10" max="80" step="1"
                      onChange={e=>setDraftTO(e.target.value)}
                      style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:5,color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:600,padding:"5px 8px",outline:"none"}}

    function TowerDetail({tower,m,onClose,onSave,onAdjust,onRemove}) {
      const [editing,setEditing]=useState(false);
      const [draft,setDraft]=useState({...tower});
      useEffect(()=>setDraft({...tower}),[tower.id,tower.floors,tower.units,tower.area,tower.type]);
      const fieldStyle={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:11,padding:"6px 7px",outline:"none"};
      const numberField=(key,min,max)=><input type="number" min={min} max={max} value={draft[key]} onChange={e=>setDraft(d=>({...d,[key]:Math.max(min,Math.min(max,Number(e.target.value)||min))}))} style={fieldStyle}/>;
      function towerAiText(t,metrics) {
        const st=sanitizeTower(t);
        if(!metrics?.valid) return "Indicadores não calculados. Verificar posição da torre no lote.";
        const caHeadroom=CA_LIMIT-metrics.ca;
        const tM2=st.w*st.h/SVG_PER_M2;
        const tCaContrib=safeValue(st.area/LOT,{digits:2});
        if(st.floors>=15&&metrics.ca>=10) return `CA total em ${safeValue(metrics.ca,{digits:1})} / ${CA_LIMIT} — margem de ${safeValue(caHeadroom,{digits:1})}. Esta torre contribui com ~${tCaContrib} CA. Redução de 2 pav libera margem sem comprometer as demais.`;
        if(st.floors<=8&&caHeadroom>1.5){
          const extra=Math.max(2,Math.min(6,Math.floor(caHeadroom*LOT/Math.max(tM2,1))));
          return `CA total em ${safeValue(metrics.ca,{digits:1})} de ${CA_LIMIT}, com ${safeValue(caHeadroom,{digits:1})} de margem. Esta torre pode absorver até ${extra} pavimentos adicionais sem exceder os limites informados.`;
        }
        if(metrics.ca>=10) return `CA em ${safeValue(metrics.ca,{digits:1})} / ${CA_LIMIT} — próximo ao limite. Ajustar com cuidado para não ultrapassar os parâmetros informados.`;
        return `Configuração dentro dos parâmetros. CA em ${safeValue(metrics.ca,{digits:1})} de ${CA_LIMIT}, com ${safeValue(caHeadroom,{digits:1})} de margem disponível.`;
      }
      const aiText=towerAiText(tower,m);
      function save(){onSave(sanitizeTower({...tower,floors:Math.round(draft.floors),units:Math.round(draft.units),area:Math.round(draft.area),type:draft.type},tower));setEditing(false);}
      return (
        <>
          <div style={{padding:"16px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:28,height:28,borderRadius:6,background:"rgba(1,173,110,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:C.green2}}>{tower.id}</div>
            <span style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,color:"#fff"}}>Torre {tower.id}</span>
            <div style={{flex:1}}/>
            <button onClick={onClose} style={{background:"none",border:"none",color:C.gray,cursor:"pointer",display:"flex"}}><Icon.X s={13}/></button>
          </div>
          <div style={{padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:11}}>Propriedades</div>
            {editing?(
              <div style={{display:"grid",gridTemplateColumns:"78px 1fr",gap:"8px",alignItems:"center"}}>
                <span style={{fontSize:10,color:C.gray}}>Pavimentos</span>{numberField("floors",1,60)}
                <span style={{fontSize:10,color:C.gray}}>Unidades</span>{numberField("units",1,999)}
                <span style={{fontSize:10,color:C.gray}}>Área total</span>{numberField("area",1,99999)}
                <span style={{fontSize:10,color:C.gray}}>Tipologia</span>
                <select value={draft.type} onChange={e=>setDraft(d=>({...d,type:e.target.value}))} style={fieldStyle}>{["Studio 44m²","1 dorm 52m²","2 dorm 68m²","Uso misto"].map(type=><option key={type} value={type} style={{background:C.card}}>{type}</option>)}</select>
              </div>
            ):(
              [["Pavimentos",safeValue(tower.floors)],["Unidades",safeValue(tower.units)],["Área total",safeValue(tower.area,{suffix:" m²"})],["Tipologia",tower.type||"--"]].map(([label,value])=><div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:11,color:C.gray}}>{label}</span><span style={{fontSize:11,color:C.gray2,fontWeight:500}}>{value}</span></div>)
            )}
          </div>
          {!editing&&<div style={{padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>Análise IA</div>
            <div style={{background:"rgba(1,173,110,0.08)",border:"1px solid rgba(51,224,161,0.18)",borderRadius:8,padding:"10px 11px",fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray2,lineHeight:1.5}}>{aiText}</div>
          </div>}
          <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:7}}>
            {editing?<div style={{display:"flex",gap:7}}><button onClick={()=>{setDraft({...tower});setEditing(false);}} style={{flex:1,background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:C.gray2,padding:"7px",cursor:"pointer"}}>Cancelar</button><button onClick={save} style={{flex:1,background:C.green,border:"none",borderRadius:6,color:"#fff",padding:"7px",cursor:"pointer"}}>Salvar</button></div>:<>
              <button onClick={()=>setEditing(true)} style={{background:"rgba(1,173,110,0.12)",border:"1px solid rgba(1,173,110,0.3)",borderRadius:6,color:C.green2,padding:"8px",cursor:"pointer"}}>Editar propriedades</button>
              <button onClick={onAdjust} style={{background:"rgba(255,188,0,0.08)",border:"1px solid rgba(255,188,0,0.22)",borderRadius:6,color:C.yellow,padding:"8px",cursor:"pointer"}}>Reduzir 20%</button>
              <button onClick={onRemove} style={{background:"rgba(253,72,72,0.08)",border:"1px solid rgba(253,72,72,0.22)",borderRadius:6,color:C.red,padding:"8px",cursor:"pointer"}}>Remover torre</button>
            </>}
          </div>
        </>
      );
    }

    function ContextPanel({m,towers,version,sel,onSelect,onSave,onAdjust,onRemove,onAddTower,limits,onSetLimits}) {
      const tower=towers.find(item=>item.id===sel);
      return (
        <div style={{width:240,flexShrink:0,background:"rgba(12,16,23,0.98)",borderLeft:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",overflowY:"auto",animation:"slideInPanel 0.25s ease"}}>
          {tower?<TowerDetail tower={tower} m={m} onClose={()=>onSelect(null)} onSave={onSave} onAdjust={()=>onAdjust(tower.id)} onRemove={()=>onRemove(tower.id)}/>:<LotOverview m={m} towers={towers} version={version} onSelectTower={onSelect} onAddTower={onAddTower} limits={limits} onSetLimits={onSetLimits}/>}
        </div>
      );
    }

    const SETBACK_METERS=[5,1.5,1.5,3,3,1.5,1.5,5]; // frontal, laterais, fundos (uma por aresta do terreno)
    const INSET_TERRAIN=insetPoly(TERRAIN_POINTS,SETBACK_METERS.map(v=>v*M_TO_SVG));

    /* ── SetbackOverlay ───────────────────────────────────────── */
    function SetbackOverlay() {
      const terrain = parsePoly(TERRAIN);
      const setbackMeters=SETBACK_METERS;
      const inner = INSET_TERRAIN;
      const outerPath = terrain.map(p=>p.join(" ")).join(" L ");
      const coord=v=>isRenderableNumber(v,2000)?v.toFixed(1):"0";
      const innerPath = inner.map(p=>p.map(coord).join(" ")).join(" L ");
      const innerPts  = inner.map(p=>p.map(coord).join(",")).join(" ");
      return (
        <g style={{pointerEvents:"none"}}>
          <path d={`M ${outerPath} Z M ${innerPath} Z`} fillRule="evenodd" fill="rgba(255,188,0,0.09)"/>
          <polygon points={innerPts} fill="none" stroke="rgba(255,188,0,0.6)" strokeWidth="1" strokeDasharray="5,4"/>
          {terrain.map((a,i)=>{
            const b=terrain[(i+1)%terrain.length];
            const x=(a[0]+b[0])/2,y=(a[1]+b[1])/2;
            const angle=Math.atan2(b[1]-a[1],b[0]-a[0])*180/Math.PI;
            const label=setbackMeters[i]===5?"Frontal":setbackMeters[i]===3?"Fundos":"Lateral";
            return <text key={i} x={x} y={y-5} textAnchor="middle" fill="rgba(255,188,0,0.9)" fontSize={8} fontFamily="'Inter',sans-serif" transform={`rotate(${angle},${x},${y})`}>{label} · {setbackMeters[i]}m</text>;
          })}
        </g>
      );
    }

    /* ── DistanceRuler ────────────────────────────────────────── */
    function DistanceRuler({tower, towers}) {
      const terrain=parsePoly(TERRAIN);
      const dl = {stroke:"rgba(51,224,161,0.5)",strokeWidth:"0.8",strokeDasharray:"4,3"};
      const tl = {stroke:"rgba(51,224,161,0.65)",strokeWidth:"1"};
      const cx = tower.x+tower.w/2, cy = tower.y+tower.h/2;
      const fm = d => safeValue(d/M_TO_SVG,{digits:1,suffix:"m",max:1000});

      function DLab({x,y,text}) {
        const w=Math.max(22,text.length*5.4);
        return <g>
          <rect x={x-w/2} y={y-9} width={w+4} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
          <text x={x} y={y} textAnchor="middle" fill={C.green2} fontSize={9} fontFamily="'Inter',sans-serif">{text}</text>
        </g>;
      }
      function SLab({x,y,text}) {
        const w=Math.max(22,text.length*5.4);
        return <g>
          <rect x={x+5} y={y-9} width={w+4} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
          <text x={x+8} y={y} textAnchor="start" fill={C.green2} fontSize={9} fontFamily="'Inter',sans-serif">{text}</text>
        </g>;
      }

      const anchors=[
        [tower.x,cy],
        [tower.x+tower.w,cy],
        [cx,tower.y],
        [cx,tower.y+tower.h],
      ].map(point=>({from:point,...closestPointOnPolygon(point,terrain)}));

      return (
        <g style={{pointerEvents:"none"}}>
          {anchors.map(({from,point,distance},i)=>(
            <g key={i}>
              <line x1={from[0]} y1={from[1]} x2={point[0]} y2={point[1]} {...dl}/>
              <circle cx={point[0]} cy={point[1]} r={2.2} fill={C.green2}/>
              <DLab x={(from[0]+point[0])/2} y={(from[1]+point[1])/2-2} text={fm(distance)}/>
            </g>
          ))}

          {/* inter-tower gaps */}
          {towers.filter(o=>o.id!==tower.id).map(o=>{
            const yOvl=tower.y<o.y+o.h&&tower.y+tower.h>o.y;
            const xOvl=tower.x<o.x+o.w&&tower.x+tower.w>o.x;
            if(yOvl){
              const lx=tower.x+tower.w<o.x?tower.x+tower.w:o.x+o.w;
              const rx=tower.x+tower.w<o.x?o.x:tower.x;
              if(rx-lx<=0)return null;
              const my=(Math.max(tower.y,o.y)+Math.min(tower.y+tower.h,o.y+o.h))/2;
              return <g key={o.id}>
                <line x1={lx} y1={my} x2={rx} y2={my} stroke={C.yellow} strokeWidth="0.8" strokeDasharray="4,3"/>
                <line x1={lx} y1={my-4} x2={lx} y2={my+4} stroke={C.yellow} strokeWidth="1"/>
                <line x1={rx} y1={my-4} x2={rx} y2={my+4} stroke={C.yellow} strokeWidth="1"/>
                <rect x={(lx+rx)/2-13} y={my-9} width={26} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
                <text x={(lx+rx)/2} y={my} textAnchor="middle" fill={C.yellow} fontSize={9} fontFamily="'Inter',sans-serif">{safeValue(Math.max(0,rx-lx)/M_TO_SVG,{digits:1,suffix:"m",max:1000})}</text>
              </g>;
            }
            if(xOvl){
              const ty=tower.y+tower.h<o.y?tower.y+tower.h:o.y+o.h;
              const by=tower.y+tower.h<o.y?o.y:tower.y;
              if(by-ty<=0)return null;
              const mx=(Math.max(tower.x,o.x)+Math.min(tower.x+tower.w,o.x+o.w))/2;
              return <g key={o.id}>
                <line x1={mx} y1={ty} x2={mx} y2={by} stroke={C.yellow} strokeWidth="0.8" strokeDasharray="4,3"/>
                <line x1={mx-4} y1={ty} x2={mx+4} y2={ty} stroke={C.yellow} strokeWidth="1"/>
                <line x1={mx-4} y1={by} x2={mx+4} y2={by} stroke={C.yellow} strokeWidth="1"/>
                <rect x={mx+5} y={(ty+by)/2-6} width={26} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
                <text x={mx+8} y={(ty+by)/2+4} textAnchor="start" fill={C.yellow} fontSize={9} fontFamily="'Inter',sans-serif">{safeValue(Math.max(0,by-ty)/M_TO_SVG,{digits:1,suffix:"m",max:1000})}</text>
              </g>;
            }
            return null;
          })}
        </g>
      );
    }

    /* ── Tower3D ──────────────────────────────────────────────── */
    function Tower3D({tower,selected,onSelect}) {
      const st=sanitizeTower(tower);
      const height=Math.min(90,22+st.floors*3.1);
      const dx=-height*0.30,dy=-height*0.50;
      const {x,y,w,h}=st;
      const top  =`${x},${y} ${x+w},${y} ${x+w+dx},${y+dy} ${x+dx},${y+dy}`;
      const left =`${x},${y} ${x+dx},${y+dy} ${x+dx},${y+h+dy} ${x},${y+h}`;
      const right=`${x+w},${y} ${x+w+dx},${y+dy} ${x+w+dx},${y+h+dy} ${x+w},${y+h}`;
      const cols=selected
        ?{left:"#1a7a5e",right:"#0f5f49",top:"#2ec98c"}
        :{left:"#1e3044",right:"#162536",top:"#2d4a62"};
      const floorCount=Math.min(st.floors,16);
      const windowLines=[];
      for(let i=1;i<floorCount;i++){
        const r=i/floorCount;
        windowLines.push(
          <line key={`wr${i}`} x1={x+w+dx*r} y1={y+dy*r} x2={x+w} y2={y+h*r} stroke="rgba(255,255,255,0.06)" strokeWidth="0.7"/>,
          <line key={`wl${i}`} x1={x+dx*r} y1={y+dy*r} x2={x} y2={y+h*r} stroke="rgba(255,255,255,0.05)" strokeWidth="0.6"/>
        );
      }
      return (
        <g onClick={e=>{e.stopPropagation();onSelect(st.id);}} style={{cursor:"pointer",filter:selected?"drop-shadow(0 0 14px rgba(51,224,161,0.35))":"none",transition:"filter 0.2s ease"}}>
          <ellipse cx={x+w/2+4} cy={y+h+7} rx={w*0.65} ry={h*0.22} fill="rgba(0,0,0,0.28)"/>

    /* ── ComparePanel — 2.2 ──────────────────────────────────── */
    function compareRec(verL, mL, verR, mR) {
      if (!mL?.valid || !mR?.valid) return null;
      const du = mR.units - mL.units;
      const nameL = scenarioName(verL), nameR = scenarioName(verR);
      const riskR = mR.ca >= CA_LIMIT, riskL = mL.ca >= CA_LIMIT;
      const highR = mR.ca >= 10, highL = mL.ca >= 10;
      const pct = (a,b) => `${Math.round(Math.abs(a-b)/Math.max(Math.min(a,b),1)*100)}%`;
      if(Math.abs(du)<=2&&Math.abs(mR.ca-mL.ca)<=0.2) return {text:`Configurações equivalentes em unidades e CA. Diferença principal é a distribuição das torres no lote.`,rec:null};
      if(du>5){
        if(riskR&&!riskL) return {text:`${nameR} gera ${du} unidades a mais (+${pct(mR.units,mL.units)}), mas CA ${safeValue(mR.ca,{digits:1})} excede o limite informado. Avançar com ${nameR} exige revisão regulatória.`,rec:verL,label:`Menor risco · ${nameL}`};
        if(highR&&!highL) return {text:`${nameR} gera ${du} unidades a mais (+${pct(mR.units,mL.units)}), com CA ${safeValue(mR.ca,{digits:1})} próximo ao limite. ${nameL} preserva margem de ${safeValue(CA_LIMIT-mL.ca,{digits:1})}.`,rec:null};
        return {text:`${nameR} produz ${du} unidades a mais (+${pct(mR.units,mL.units)}) e CA ${safeValue(mR.ca,{digits:1})} dentro dos parâmetros.`,rec:verR,label:`Mais unidades · ${nameR}`};
      }
      if(du<-5){
        const ad=Math.abs(du);
        if(riskL&&!riskR) return {text:`${nameL} tem ${ad} unidades a mais, mas CA ${safeValue(mL.ca,{digits:1})} excede o limite informado. ${nameR} preserva segurança regulatória.`,rec:verR,label:`Menor risco · ${nameR}`};
        return {text:`${nameL} produz ${ad} unidades a mais (+${pct(mL.units,mR.units)}) — CA ${safeValue(mL.ca,{digits:1})} ${riskL?"acima do limite":"dentro dos parâmetros"}.`,rec:null};
      }
      if(mR.ca<mL.ca-0.3) return {text:`Unidades similares. ${nameR} tem CA ${safeValue(mR.ca,{digits:1})} — ${safeValue(mL.ca-mR.ca,{digits:1})} abaixo de ${nameL}. Menor CA amplia margem regulatória.`,rec:verR,label:`Menor risco · ${nameR}`};
      if(mL.ca<mR.ca-0.3) return {text:`Unidades similares. ${nameL} tem CA ${safeValue(mL.ca,{digits:1})} — ${safeValue(mR.ca-mL.ca,{digits:1})} abaixo de ${nameR}. Menor CA amplia margem regulatória.`,rec:verL,label:`Menor risco · ${nameL}`};
      return {text:`Diferença pequena em unidades (${du>0?"+":""}${du}) e CA similar. Fator diferenciador é a distribuição no lote.`,rec:null};
    }

    const PENDING_ITEMS=["Conferir legislação urbanística","Validar viabilidade econômica","Revisar setores de recuo","Confirmar disponibilidade de vagas"];

    function ComparePanel({versions, currentVersion, onClose, onSwitch}) {
      const VERS = ["Versão 01","Versão 02","Versão 03"];
      const [left,  setLeft]  = useState(currentVersion);
      const [right, setRight] = useState(VERS.find(v=>v!==currentVersion)||"Versão 02");
      const [deciding, setDeciding] = useState(null); // {strategy, label} | null
      const [reason, setReason] = useState("");
      const [pending, setPending] = useState(PENDING_ITEMS.slice(0,2)); // first 2 pre-checked

      const tL = versions[left]  || [];
      const tR = versions[right] || [];
      const mL = calcMetrics(tL);
      const mR = calcMetrics(tR);
      const metricsValid=mL.valid&&mR.valid;

      function MiniCanvas({towers}) {
        return (
          <svg viewBox="0 0 640 440" style={{width:"100%",display:"block"}}>
            <polygon points={TERRAIN} fill="rgba(1,173,110,0.06)" stroke="rgba(1,173,110,0.35)" strokeWidth="1.5" strokeDasharray="6,4"/>
            {towers.map(t=>(
              <g key={t.id}>
                <rect x={t.x+3} y={t.y+5} width={t.w} height={t.h} rx={4} fill="rgba(0,0,0,0.3)" style={{filter:"blur(4px)"}}/>
                <rect x={t.x} y={t.y} width={t.w} height={t.h} rx={4} fill="#2d3748" stroke="#526171" strokeWidth={1.5}/>
                <text x={t.x+t.w/2} y={t.y+t.h/2+5} textAnchor="middle" fill="#fff" fontSize={13} fontWeight="bold" fontFamily="'Sora',sans-serif">{t.id}</text>
              </g>
            ))}
          </svg>
        );
      }

      const METRICS = [
        {label:"Torres",   lv:tL.length, rv:tR.length, fmt:v=>safeValue(v),higher:true},
        {label:"Unidades", lv:mL.units,  rv:mR.units,  fmt:v=>safeValue(v),higher:true},
        {label:"Área m²",  lv:mL.area,   rv:mR.area,   fmt:v=>safeValue(v),higher:true},
        {label:"CA",       lv:mL.ca,     rv:mR.ca,     fmt:v=>safeValue(v,{digits:1}),higher:false,limit:12},
        {label:"TO %",     lv:mL.occ,    rv:mR.occ,    fmt:v=>safeValue(v,{digits:1,suffix:"%"}),higher:false,limit:50},
      ];

      return (
        <div style={{position:"absolute",inset:0,zIndex:100,background:C.ink2,display:"flex",flexDirection:"column",animation:"fadeIn 0.18s ease"}}>
          {/* header */}
          <div style={{display:"flex",alignItems:"center",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
            <span style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,color:"#fff"}}>Comparar estratégias</span>
            <div style={{flex:1}}/>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:C.gray2,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon.X s={12}/>
            </button>
          </div>

          {/* two mini-canvases */}
          <div style={{display:"flex",flex:1,gap:12,padding:"14px 20px 12px",overflow:"hidden",minHeight:0}}>
            {[{ver:left,setVer:setLeft,tw:tL,m:mL,accent:"rgba(51,224,161,0.2)"},{ver:right,setVer:setRight,tw:tR,m:mR,accent:"rgba(86,79,255,0.2)"}].map(({ver,setVer,tw,m,accent},si)=>(
              <div key={si} style={{flex:1,display:"flex",flexDirection:"column",gap:8,minHeight:0}}>
                <div style={{display:"flex",flexDirection:"column",gap:7,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <select value={ver} onChange={e=>setVer(e.target.value)}
                      style={{background:"rgba(32,38,47,0.95)",border:`1px solid ${accent}`,color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,borderRadius:6,padding:"4px 10px",cursor:"pointer",outline:"none"}}>
                      {VERS.map(v=><option key={v} value={v} style={{background:C.card}}>{scenarioName(v)} · {scenarioRevision(v)}</option>)}
                    </select>
                    <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray}}>
                      {safeValue(tw.length)} torres · {m.valid?safeValue(m.units):"--"} un · CA <span style={{color:m.valid&&m.ca>=12?C.yellow:"#fff",fontWeight:600}}>{m.valid?safeValue(m.ca,{digits:1}):"--"}</span>
                    </span>
                  </div>
                  {scenarioIntent(ver)&&(
                    <div style={{background:"rgba(17,21,29,0.55)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"6px 9px"}}>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray2,lineHeight:1.4,marginBottom:3}}>{scenarioIntent(ver)}</div>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,lineHeight:1.4}}>{scenarioTradeoff(ver)}</div>
                    </div>
                  )}
                </div>
                <div style={{flex:1,border:`1px solid ${accent}`,borderRadius:10,overflow:"hidden",background:C.ink2,minHeight:0}}>
                  <MiniCanvas towers={tw}/>
                </div>
              </div>
            ))}
          </div>

          {/* metrics delta strip */}
          <div style={{flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(17,21,29,0.7)",padding:"12px 20px"}}>
            <div style={{display:"flex",justifyContent:"center",gap:0}}>
              {METRICS.map(({label,lv,rv,fmt,higher,limit},mi)=>{
                const rowValid=metricsValid&&isRenderableNumber(lv)&&isRenderableNumber(rv);
                const diff = rowValid?rv-lv:null;
                const overLimit = rowValid&&limit&&rv>=limit;
                const col = diff===0 ? C.gray
                  : !rowValid?C.gray:higher
                    ? (diff>0 ? C.green2 : C.red)
                    : (diff>0 ? (overLimit?C.red:C.yellow) : C.green2);
                const arrow = rowValid?(diff>0?"↑":diff<0?"↓":""):"";
                return (
                  <div key={label} style={{flex:1,textAlign:"center",padding:"0 8px",borderLeft:mi>0?"1px solid rgba(255,255,255,0.05)":"none"}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,marginBottom:3}}>{label}</div>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,color:"#fff"}}>{fmt(lv)}</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:700,color:col,margin:"3px 0",minHeight:16}}>
                      {!rowValid?"--":diff===0?"—":`${diff>0?"+":""}${fmt(Math.round(Math.abs(diff)*10)/10)} ${arrow}`}
                    </div>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,color:"#fff"}}>{fmt(rv)}</div>
                  </div>

                <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                  <span style={{color:C.purple,fontSize:12,fontFamily:"'Sora',sans-serif",fontWeight:700,flexShrink:0,lineHeight:1.4}}>→</span>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray2,lineHeight:1.55}}>{rec.text}</div>
                    {rec.rec&&(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
                        <span style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.purple,fontWeight:600}}>{rec.label}</span>
                        <button onClick={()=>{setDeciding({strategy:rec.rec,label:rec.label});setReason("");setPending(PENDING_ITEMS.slice(0,2));}}
                          style={{background:"rgba(86,79,255,0.22)",border:"1px solid rgba(86,79,255,0.45)",borderRadius:5,color:"rgba(203,200,255,0.95)",fontFamily:"'Inter',sans-serif",fontSize:10,fontWeight:600,padding:"4px 11px",cursor:"pointer"}}>
                          Avançar com esta →
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );})()}
            {deciding&&(
              <div style={{marginTop:10,background:"rgba(1,173,110,0.07)",border:"1px solid rgba(1,173,110,0.25)",borderRadius:8,padding:"12px 14px",animation:"fadeIn 0.18s ease"}}>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:700,color:C.green2,marginBottom:4}}>Registrar decisão</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,marginBottom:10}}>Estratégia selecionada: <span style={{color:C.gray2,fontWeight:600}}>{scenarioName(deciding.strategy)}</span></div>
                <textarea value={reason} onChange={e=>setReason(e.target.value)}
                  placeholder="Por que esta estratégia? (opcional — ex: melhor relação unidades/risco)"
                  style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:10,padding:"7px 9px",resize:"vertical",minHeight:44,outline:"none",marginBottom:10}}
                />
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,marginBottom:6}}>Pendências antes de avançar:</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
                  {PENDING_ITEMS.map(item=>(
                    <label key={item} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                      <input type="checkbox" checked={pending.includes(item)}
                        onChange={e=>setPending(e.target.checked?[...pending,item]:pending.filter(p=>p!==item))}
                        style={{accentColor:C.green,width:12,height:12,flexShrink:0}}
                      />
                      <span style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray2}}>{item}</span>

    /* ── Main ─────────────────────────────────────────────────── */
    function ArqgenNext() {
      const [towers,      setTowers]      = useState(()=>sanitizeTowers(INIT_TOWERS));
      const [sel,         setSel]         = useState(null);
      const [zoom,        setZoom]        = useState(100);
      const [pan,         setPan]         = useState({x:0,y:0});
      const [viewportWidth,setViewportWidth]=useState(window.innerWidth);
      const [version,     setVersion]     = useState("Versão 01");
      const [view,        setView]        = useState("2D");
      const [msgs,        setMsgs]        = useState(initialHistory);
      const [input,       setInput]       = useState("");
      const [typing,      setTyping]      = useState(false);
      const [mounted,     setMounted]     = useState(false);
      const [shakeId,     setShakeId]     = useState(null);
      const [hoverId,     setHoverId]     = useState(null);
      const [liveId,      setLiveId]      = useState(null);
      const [mode,        setMode]        = useState("idle");
      const [leaving,     setLeaving]     = useState(false);
      const [chatSize,    setChatSize]    = useState("medium"); // "mini"|"medium"|"full"
      const [showSetbacks, setShowSetbacks] = useState(false);
      const [versions,     setVersions]     = useState(()=>Object.fromEntries(Object.entries(VERSIONS_INIT).map(([key,value])=>[key,sanitizeTowers(value)])));
      const [transitioning,setTransitioning]= useState(false);
      const [comparing,    setComparing]    = useState(false);
      const [attachedFile, setAttachedFile] = useState(null);
      const [exportOpen,   setExportOpen]   = useState(false);
      const [presenting,   setPresenting]   = useState(false);
      const [decision,     setDecision]     = useState(null); // {strategy, time, units, ca} | null
      const [limits,       setLimits]       = useState({ca:CA_LIMIT,to:TO_LIMIT});

      const appRef   = useRef(null);
      const svgRef   = useRef(null);
      const dragging = useRef(null);
      const resizing = useRef(null);
      const panning   = useRef(null);
      const towersRef = useRef(towers);

      useEffect(()=>{ const t=setTimeout(()=>setMounted(true),100); return ()=>clearTimeout(t); },[]);
      useEffect(()=>{
        const sync=()=>{ if(!document.fullscreenElement)setPresenting(false); };
        document.addEventListener("fullscreenchange",sync);
        return()=>document.removeEventListener("fullscreenchange",sync);
      },[]);
      useEffect(()=>{
        const resize=()=>setViewportWidth(window.innerWidth);
        window.addEventListener("resize",resize);
        return()=>window.removeEventListener("resize",resize);
      },[]);
      useEffect(()=>{ if(zoom<=100)setPan({x:0,y:0}); },[zoom]);
      useEffect(()=>{ towersRef.current=towers; },[towers]);
      useEffect(()=>{
        if(!sel||mode!=="active")return;
        const timer=setTimeout(()=>{
          const t=towersRef.current.find(item=>item.id===sel);
          if(!t)return;
          const allTowers=towersRef.current;
          const currentM=calcMetrics(allTowers);
          const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

          let observation,suggestion,confidence;
          const caHeadroom=CA_LIMIT-(currentM.valid?currentM.ca:0);
          const tUnitShare=currentM.valid&&currentM.units>0?Math.round(t.units/currentM.units*100):null;

          if(!currentM.valid){
            observation=`Torre ${t.id} com ${safeValue(t.floors)} pav e ${safeValue(t.units)} unidades. Indicadores não calculados — verificar posição no lote.`;
            suggestion="Reposicionar a torre dentro do contorno para recalcular as métricas.";
            confidence="baixa";
          } else if(t.floors>=15&&currentM.ca>=10){
            observation=`Torre ${t.id} com ${t.floors} pav${tUnitShare!==null?` representa ${tUnitShare}% das unidades`:""} — CA total em ${safeValue(currentM.ca,{digits:1})} de ${CA_LIMIT}, margem de ${safeValue(caHeadroom,{digits:1})}.`;
            suggestion=`Redução de 2 pavimentos liberaria ~${safeValue(caHeadroom+0.3,{digits:1})} de CA sem comprometer as demais torres. Premissa calculada; legislação não validada.`;
            confidence="média";
          } else if(t.floors<=8&&caHeadroom>1.5){
            const tM2=(t.w*t.h)/SVG_PER_M2;
            const extra=Math.max(2,Math.min(6,Math.floor(caHeadroom*LOT/Math.max(tM2,1))));
            observation=`Torre ${t.id} com ${t.floors} pavimentos — abaixo do potencial. CA total em ${safeValue(currentM.ca,{digits:1})} de ${CA_LIMIT}, com ${safeValue(caHeadroom,{digits:1})} de margem disponível.`;
            suggestion=`Pode absorver até ${extra} pavimentos adicionais. Confiança: CA e TO calculados; legislação informada pelo usuário, não validada.`;
            confidence="média";
          } else {
            const toHeadroom=TO_LIMIT-(currentM.valid?currentM.occ:0);
            observation=`Torre ${t.id} com ${t.floors} pav${tUnitShare!==null?`, representando ${tUnitShare}% das unidades`:""} — CA total em ${safeValue(currentM.ca,{digits:1})} de ${CA_LIMIT}.`;
            suggestion=caHeadroom>1.5
              ?`Margem de ${safeValue(caHeadroom,{digits:1})} disponível no CA — explorar variação de densidade ou tipologia.`
              :`CA próximo ao limite. Considere redistribuir pavimentos entre as torres para equilibrar o aproveitamento.`;
            confidence="média";
          }

          setMsgs(prev=>[
            ...prev.filter(msg=>msg.role!=="copilot-analysis"),
            {
              id:`ctx-${Date.now()}`,
              role:"copilot-analysis",
              time:now,
              towerId:t.id,
              observation,
              suggestion,
              confidence,
              facts:[
                {label:"Pavimentos",val:safeValue(t.floors),source:"calculado"},
                {label:"Unidades",val:safeValue(t.units),source:"calculado"},
                {label:"Área",val:safeValue(t.area,{suffix:" m²"}),source:"calculado"},
                ...(currentM.valid?[{label:"CA total",val:safeValue(currentM.ca,{digits:1}),source:"calculado"}]:[]),
              ],
            },
          ]);
        },500);
        return()=>clearTimeout(timer);
      },[sel,mode]);

      const m = useMemo(()=>calcMetrics(towers),[towers]);
      const status = useMemo(()=>getStatus(m,limits),[m,limits]);
      const decisionStale = useMemo(()=>{
        if(!decision||!m?.valid||decision.strategy!==version)return false;
        const duPct=decision.units?Math.abs((m.units-decision.units)/Math.max(decision.units,1)):0;
        const dca=decision.ca!=null?Math.abs(m.ca-decision.ca):0;
        return duPct>0.1||dca>0.5;
      },[decision,m,version]);

      // Proactive copilot alert when CA crosses warning thresholds during editing
      const prevCaRef=useRef(null);
      const lastCaAlertRef=useRef(0);
      useEffect(()=>{
        if(mode!=="active"||!m?.valid)return;
        const prev=prevCaRef.current;
        prevCaRef.current=m.ca;
        if(prev===null)return; // skip initial mount
        const now=Date.now();
        if(now-lastCaAlertRef.current<25000)return; // 25s cooldown between alerts
        const nowStr=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        if(prev<CA_LIMIT&&m.ca>=CA_LIMIT){
          lastCaAlertRef.current=now;
          setMsgs(prev2=>[...prev2,{id:`ca-exc-${now}`,role:"copilot-context",time:nowStr,
            text:`CA excedeu ${CA_LIMIT} — ${safeValue(m.ca,{digits:1})} calculado. Revisar configuração antes de avançar.`}]);
        } else if(prev<10&&m.ca>=10){
          lastCaAlertRef.current=now;
          setMsgs(prev2=>[...prev2,{id:`ca-warn-${now}`,role:"copilot-context",time:nowStr,
            text:`CA em ${safeValue(m.ca,{digits:1})} / ${CA_LIMIT} — margem de ${safeValue(CA_LIMIT-m.ca,{digits:1})} restante. Legislação não validada.`}]);
        }
      },[m?.ca,mode]);

      // Undo history (push-before-mutate approach)
      const towerHistoryRef=useRef([sanitizeTowers(INIT_TOWERS)]);
      function pushHistorySnapshot(currentTowers){
        towerHistoryRef.current=[...towerHistoryRef.current.slice(-19),sanitizeTowers(currentTowers)];
      }
      function undo(){
        if(towerHistoryRef.current.length===0)return;
        const prev=towerHistoryRef.current[towerHistoryRef.current.length-1];
        towerHistoryRef.current=towerHistoryRef.current.slice(0,-1);
        setTowers(sanitizeTowers(prev));
        setSel(null);
      }

      // Keyboard shortcut: 1/2/3 to switch strategies; Ctrl+Z to undo
      const switchVRef=useRef(null);
      switchVRef.current=switchVersion;
      const undoRef=useRef(null);
      undoRef.current=undo;
      const showSetbacksRef=useRef(showSetbacks);
      showSetbacksRef.current=showSetbacks;
      useEffect(()=>{
        function handler(e){
          if(mode!=="active")return;
          const el=document.activeElement;
          if(el&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA"))return;
          if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();undoRef.current();return;}
          if(e.key==="1") switchVRef.current("Versão 01");
          else if(e.key==="2") switchVRef.current("Versão 02");
          else if(e.key==="3") switchVRef.current("Versão 03");
        }
        document.addEventListener("keydown",handler);
        return()=>document.removeEventListener("keydown",handler);
      },[mode]);

      function svgPt(e) {
        const svg=svgRef.current; const p=svg.createSVGPoint();
        p.x=e.clientX; p.y=e.clientY;
        return p.matrixTransform(svg.getScreenCTM().inverse());
      }

      function towerState(t) {
        if (!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)) return "conflict";
        if (towers.some(o=>o.id!==t.id&&overlaps(t,o))) return "overlap";
        if (showSetbacks&&!(pip(t.x,t.y,INSET_TERRAIN)&&pip(t.x+t.w,t.y,INSET_TERRAIN)&&pip(t.x,t.y+t.h,INSET_TERRAIN)&&pip(t.x+t.w,t.y+t.h,INSET_TERRAIN))) return "setback";
        return sel===t.id?"selected":"normal";
      }

      function onTowerDown(e,id) {
        e.stopPropagation(); setSel(id); setLiveId(id);
        pushHistorySnapshot(towers);
        const t=towers.find(t=>t.id===id); const p=svgPt(e);
        dragging.current={id,ox:p.x-t.x,oy:p.y-t.y,orig:{x:t.x,y:t.y}};
      }

      function onHandleDown(e,id,corner) {
        e.stopPropagation(); setLiveId(id);
        pushHistorySnapshot(towers);
        const t=towers.find(t=>t.id===id); const p=svgPt(e);
        resizing.current={id,corner,sp:p,snapshot:{...t}};
      }

      function onCanvasDown(e) {
        const background=e.target.dataset.panBg==="true";
        const canPan=(background&&e.button===0)||(e.shiftKey&&e.button===0)||e.button===1;
        if(zoom<=100||!canPan)return;
        e.preventDefault();
        panning.current={clientX:e.clientX,clientY:e.clientY,start:{...pan}};
        setSel(null);
      }

      function changeZoom(next) {
        setZoom(Math.max(50,Math.min(200,next)));
      }

      function onWheel(e) {
        if(!e.ctrlKey&&!e.metaKey)return;
        e.preventDefault();
        changeZoom(zoom+(e.deltaY<0?10:-10));
      }

      const onMove=useCallback(e=>{
        if(panning.current&&svgRef.current){
          const r=svgRef.current.getBoundingClientRect();
          const viewW=640/(zoom/100),viewH=440/(zoom/100);
          const dx=(e.clientX-panning.current.clientX)*viewW/r.width;
          const dy=(e.clientY-panning.current.clientY)*viewH/r.height;
          const limitX=(640-viewW)/2,limitY=(440-viewH)/2;
          setPan({
            x:Math.max(-limitX,Math.min(limitX,panning.current.start.x-dx)),
            y:Math.max(-limitY,Math.min(limitY,panning.current.start.y-dy)),
          });
          return;
        }
        if(dragging.current){
          const{id,ox,oy}=dragging.current; const p=svgPt(e);
          setTowers(prev=>prev.map(t=>t.id===id?sanitizeTower({...t,x:p.x-ox,y:p.y-oy},t):t));
        }
        if(resizing.current){
          const{id,corner,sp,snapshot}=resizing.current; const p=svgPt(e);
          const dx=p.x-sp.x,dy=p.y-sp.y;
          setTowers(prev=>prev.map(t=>{
            if(t.id!==id)return t;
            let{x,y,w,h}=snapshot;
            if(corner.includes("e"))w=snapshot.w+dx;
            if(corner.includes("s"))h=snapshot.h+dy;
            if(corner.includes("w")){x=snapshot.x+dx;w=snapshot.w-dx;}
            if(corner.includes("n")){y=snapshot.y+dy;h=snapshot.h-dy;}
            return resizeTowerFromSnapshot(snapshot,{x,y,w,h});
          }));
        }
      },[zoom]);

      const onUp=useCallback(()=>{
        if(dragging.current){
          const{id,orig}=dragging.current;
          setTowers(prev=>{
            const t=prev.find(t=>t.id===id);
            if(!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)){
              setShakeId(id); setTimeout(()=>setShakeId(null),400);
              return prev.map(tt=>tt.id===id?{...tt,x:orig.x,y:orig.y}:tt);
            }
            if(showSetbacksRef.current&&!(pip(t.x,t.y,INSET_TERRAIN)&&pip(t.x+t.w,t.y,INSET_TERRAIN)&&pip(t.x,t.y+t.h,INSET_TERRAIN)&&pip(t.x+t.w,t.y+t.h,INSET_TERRAIN))){
              const sn=nudgeInsidePoly(t.x,t.y,t.w,t.h,INSET_TERRAIN);
              return prev.map(tt=>tt.id===id?sanitizeTower({...tt,x:sn.x,y:sn.y},tt):tt);
            }
            return prev;
          });
          dragging.current=null;
        }
        resizing.current=null;
        panning.current=null;
        setLiveId(null);
      },[]);

      function attachFile(file) {
        const ext=(file.name.split(".").pop()||"file").toLowerCase();
        const bytes=isRenderableNumber(file.size,1024*1024*1024)?file.size:0;
        const size=bytes<1024*1024
          ? `${Math.max(1,Math.round(bytes/1024))} KB`
          : safeValue(bytes/(1024*1024),{digits:1,suffix:" MB",max:1024});
        setAttachedFile({name:file.name,ext,size,meta:"Arquivo do projeto"});
      }

      function contextualReply(text,tower,currentTowers) {
        const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const lower=text.toLowerCase();
        if(!tower){
          return {
            id:`alt-${Date.now()}`,role:"alternatives",time:now,text:"Três configurações para explorar:",
            alternatives:(()=>{
              const base=[
                {ver:"Versão 02",label:scenarioName("Versão 02"),intent:scenarioIntent("Versão 02"),towers:VERSIONS_INIT["Versão 02"]},
                {ver:"Versão 01",label:scenarioName("Versão 01"),intent:scenarioIntent("Versão 01"),towers:VERSIONS_INIT["Versão 01"]},
                {ver:"Versão 03",label:scenarioName("Versão 03"),intent:scenarioIntent("Versão 03"),towers:VERSIONS_INIT["Versão 03"]},
              ];
              const wantMax=/densidade|maximiz|unidades|mais un|produt/.test(lower);
              const wantFree=/área livre|permeab|menos|espaço|verde|equilibr/.test(lower);
              if(wantMax) return [base[0],base[1],base[2]];
              if(wantFree) return [base[2],base[1],base[0]];
              return [base[1],base[0],base[2]];
            })().map(candidate=>{
              const cm=calcMetrics(sanitizeTowers(candidate.towers));
              const curM=calcMetrics(currentTowers);
              return {...candidate,deltaUnits:(cm.valid&&curM.valid)?cm.units-curM.units:0,ca:cm.valid?safeValue(cm.ca,{digits:1}):"--",applied:false};
            }),
          };
        }

        let type="reduce",label=`Reduzir Torre ${tower.id} em 20%`,after=scaleTower(tower,0.8);
        if(/remov|exclu|apagar|deletar|tirar/.test(lower)){
          type="remove"; label=`Remover Torre ${tower.id}`; after=null;
        } else if(/aument|mais|ampli|pavimento|cresce|subir|sobe/.test(lower)){
          type="increase"; label=`Adicionar 2 pavimentos à Torre ${tower.id}`;
          after=increaseFloors(tower,2);
        }

        const nextTowers=type==="remove"
          ? currentTowers.filter(t=>t.id!==tower.id)
          : currentTowers.map(t=>t.id===tower.id?after:t);
        const beforeM=calcMetrics(currentTowers),afterM=calcMetrics(nextTowers);
        const previewValid=beforeM.valid&&afterM.valid;
        const caHeadroom=beforeM.valid?CA_LIMIT-beforeM.ca:0;
        const reduceReason=caHeadroom<=1.5?`CA total em ${safeValue(beforeM.ca,{digits:1})} / ${CA_LIMIT} — redução libera margem regulatória.`:`Torre ${tower.id} com ${safeValue(tower.floors)} pav — redução de 20% para ajustar ocupação no lote.`;
        return {
          id:`skill-${Date.now()}`,role:"skill",time:now,
          fn:type==="remove"?"remover_torre()":type==="increase"?"aumentar_pavimentos()":"reduzir_projecao()",
          sub:`Torre ${tower.id} · prévia calculada`,
          text:type==="remove"
            ? `A remoção da Torre ${tower.id} ${afterM.valid?`reduz o CA para ${safeValue(afterM.ca,{digits:1})}`:"recalcula os indicadores"} e libera sua área de projeção.`
            : type==="increase"
              ? `Torre ${tower.id} com ${safeValue(tower.floors)} pavimentos. Adicionando 2 pavimentos — CA passaria de ${previewValid?safeValue(beforeM.ca,{digits:1}):"--"} para ${previewValid?safeValue(afterM.ca,{digits:1}):"--"}.`
              : reduceReason,
          preview:[
            {label:"Unidades",before:previewValid?safeValue(beforeM.units):"--",after:previewValid?safeValue(afterM.units):"--",good:type==="increase"},
            {label:"Área total",before:previewValid?safeValue(beforeM.area,{suffix:" m²"}):"--",after:previewValid?safeValue(afterM.area,{suffix:" m²"}):"--",good:type!=="increase"},
            {label:"CA",before:previewValid?safeValue(beforeM.ca,{digits:1}):"--",after:previewValid?safeValue(afterM.ca,{digits:1}):"--",good:previewValid&&afterM.ca<=beforeM.ca},
          ],
          action:{id:`action-${Date.now()}`,type,targetId:tower.id,label,after},
        };
      }

      function sendMessage(text) {
        const msg=(text||input||"").trim();
        if(!msg && !attachedFile)return;
        const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        const selected=towers.find(t=>t.id===sel);
        const currentTowers=sanitizeTowers(towers);
        setMsgs(m=>[
          ...m,
          ...(attachedFile?[{role:"file",...attachedFile,time:now}]:[]),
          ...(msg?[{role:"user",text:msg,time:now}]:[]),
        ]);
        setInput("");
        setAttachedFile(null);
        // transition: fade idle out, then show canvas
        setLeaving(true);
        setTimeout(()=>{ setMode("active"); setLeaving(false); setChatSize("medium"); },500);
        setTyping(true);
        setTimeout(()=>{
          setTyping(false);
          setMsgs(m=>[...m,contextualReply(msg,selected,currentTowers)]);
        },1700);
      }

      function applyChatAction(message) {
        const action=message.action;
        if(!action||action.applied)return;
        pushHistorySnapshot(towers);
        if(action.type==="remove"){
          setTowers(prev=>prev.filter(t=>t.id!==action.targetId));
          setSel(null);
        } else {
          setTowers(prev=>prev.map(t=>t.id===action.targetId?sanitizeTower(action.after,t):t));
          setSel(action.targetId);
        }
        setMsgs(prev=>prev.map(m=>m.id===message.id?{...m,action:{...m.action,applied:true}}:m));
      }

      function applyAlt(message,altIdx) {
        const alt=message.alternatives?.[altIdx];
        if(!alt||alt.applied)return;
        pushHistorySnapshot(towers);
        setTowers(sanitizeTowers(alt.towers));
        setSel(null);
        setMsgs(prev=>prev.map(item=>item.id===message.id?{...item,alternatives:item.alternatives.map((candidate,index)=>({...candidate,applied:index===altIdx}))}:item));
      }

      function switchVersion(newVer) {
        if (newVer === version) return;
        const oldVer = version;
        const oldTowers = sanitizeTowers(towers);
        const newTowers = sanitizeTowers(versions[newVer]);
        setVersions(v=>({...v,[version]:sanitizeTowers(towers)}));
        setTransitioning(true);
        setTimeout(()=>{
          setTowers(sanitizeTowers(newTowers));
          setVersion(newVer);
          setSel(null);
          setPan({x:0,y:0});
          setTimeout(()=>setTransitioning(false), 180);
          const oldM=calcMetrics(oldTowers);
          const newM=calcMetrics(newTowers);
          const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
          const text=(oldM.valid&&newM.valid)
            ?(()=>{
                const du=newM.units-oldM.units;
                const dc=safeValue(Math.abs(newM.ca-oldM.ca),{digits:1});
                const caDir=newM.ca>oldM.ca?"↑":"↓";
                const unDir=du>=0?"+":"";
                return `Estratégia alterada · ${scenarioName(newVer)} · ${safeValue(newM.units)} un (${unDir}${du}) · CA ${safeValue(newM.ca,{digits:1})} ${caDir}${dc} vs ${scenarioName(oldVer)}`;
              })()
            :`Estratégia alterada para ${scenarioName(newVer)}`;
          setMsgs(prev=>[...prev,{id:`switch-${Date.now()}`,role:"copilot-context",time:now,text}]);
        }, 200);
      }

      function addTower() {
        const ids=["A","B","C","D","E","F"];
        if(towers.length>=6) return;
        const newId=ids.find(id=>!towers.some(t=>t.id===id));
        const t={id:newId,x:240,y:185,w:60,h:44,floors:10,units:40,area:1760,type:"Studio 44m²"};
        pushHistorySnapshot(towers);
        setTowers(prev=>sanitizeTowers([...prev,t]));
        setSel(newId);
      }

      function adjustTower(id) {
        pushHistorySnapshot(towers);
        setTowers(prev=>prev.map(t=>t.id===id?scaleTower(t,0.8):t));
      }

      function saveTower(updated) {
        pushHistorySnapshot(towers);
        setTowers(prev=>prev.map(t=>t.id===updated.id?sanitizeTower(updated,t):t));
      }

      function removeTower(id) {
        pushHistorySnapshot(towers);
        setTowers(prev=>prev.filter(t=>t.id!==id));
        setSel(null);
      }

      async function enterPresentation() {
        setSel(null);
        setChatSize("mini");
        setPresenting(true);
        try {
          if(appRef.current?.requestFullscreen) await appRef.current.requestFullscreen();
        } catch(e) {}
      }

      async function exitPresentation() {
        setPresenting(false);
        try {
          if(document.fullscreenElement) await document.exitFullscreen();
        } catch(e) {}
      }

        const st=getStatus(reportMetrics,limits);

        const blob=new Blob([html],{type:"text/html;charset=utf-8"});
