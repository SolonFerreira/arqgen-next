  <style>

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    @keyframes bounce   { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
    @keyframes pulseT   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.018)} }

      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(1, 173, 110, 0.15)); }

  <script id="app-src" type="text/plain">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;
    const { LIMITS, sanitizeTower, sanitizeTowers, calcMetrics:calculateMetrics, scaleTower, resizeTowerFromSnapshot, increaseFloors, generateMassingAlternatives, isRenderableNumber, formatNumber, escapeHtml, decisionStaleness, clampFloatingPosition } = ArqgenCalc;

    /* ── palette ──────────────────────────────────────────────── */
    const C = {
      ink:    "#1A202C", ink2:   "#11151d", card:   "#20262f",
      green:  "#01AD6E", green2: "#33E0A1", purple: "#564FFF",
      yellow: "#FFBC00", red:    "#FD4848", gray:   "#718096",
      gray2:  "#CBD5E0",
    };

    function getStatus(m, lim) {
      const caLim=lim?.ca??CA_LIMIT, toMax=lim?.to??TO_LIMIT;
      const caWarn=Math.max(caLim*0.83,caLim-2), toWarn=Math.max(toMax*0.83,toMax-8);
      if (!m?.valid||![m.ca,m.occ,m.units,m.area].every(value=>isRenderableNumber(value))) return {key:"invalid",label:"Dados insuficientes",detail:"Indicadores não calculados",dot:C.red,color:C.red,bg:"rgba(253,72,72,0.08)",border:"rgba(253,72,72,0.2)"};
      if (m.ca>=caLim||m.occ>=toMax) return {key:"warning",label:"Limites informados excedidos",detail:`CA ${formatNumber(m.ca,{digits:1})} ou TO ${formatNumber(m.occ,{digits:1})}% — limite excedido · revisar`,nextStep:"Revisar pavimentos das torres maiores antes de avançar.",dot:C.yellow,color:C.yellow,bg:"rgba(255,188,0,0.08)",border:"rgba(255,188,0,0.25)"};
      if (m.ca>=caWarn||m.occ>=toWarn) return {key:"caution",label:"Próximo aos limites informados",detail:`CA ${formatNumber(m.ca,{digits:1})} / ${caLim} · TO ${formatNumber(m.occ,{digits:1})}% — margem reduzida`,nextStep:m.ca>=caWarn?"Comparar com Mais área livre para redistribuir o risco.":null,dot:C.yellow,color:"#e5ab00",bg:"rgba(255,188,0,0.06)",border:"rgba(255,188,0,0.18)"};
      const approxExtra=Math.max(1,Math.round((caLim-m.ca)*LOT/52));
      const nextStep=m.ca<caLim*0.58?"Explorar Máxima densidade para aumentar o aproveitamento do lote.":null;
      return {key:"preliminary",label:"Avaliação preliminar",detail:`CA ${formatNumber(m.ca,{digits:1})} / ${caLim} · ~${approxExtra} un de margem · legislação não validada`,nextStep,dot:C.purple,color:"rgba(203,200,255,0.95)",bg:"rgba(86,79,255,0.08)",border:"rgba(86,79,255,0.25)"};
    }

    };

    /* ── Arqgen logo SVG (dark-mode: dark fill → white) ──────── */

      // original 160×32 viewBox; scale to desired height
      return (
        <svg height={height} viewBox="0 0 160 32" fill="none" xmlns="http://www.w3.org/2000/svg" style={{display:"block"}}>

          <path d="M78.6211 14.6346V14.214C78.6211 10.4348 76.7291 8.3584 72.3273 8.3584H63.6787V23.9606H67.5974V20.2019H71.8235L75.7187 19.9578C77.7864 19.1167 78.624 17.1727 78.624 14.6316L78.6211 14.6346ZM67.5944 16.6903V12.1141H71.9963C73.7125 12.1141 74.682 12.3582 74.682 14.2346V14.5875C74.682 16.4668 73.6481 16.6874 71.9963 16.6874H67.5944V16.6903Z" fill="#ffffff"/>

          <path d="M113.189 14.4231V17.8053H117.052V18.7229C117.052 19.9875 116.44 20.2052 115.755 20.2052H109.329V23.9638H115.755C119.275 23.9638 120.971 21.3433 120.971 18.1817V14.4231H113.189Z" fill="#01AD6E"/>
        </svg>
      );
    }

    /* ── data ─────────────────────────────────────────────────── */
    const TERRAIN = "160,60 480,40 560,120 540,360 420,400 180,380 80,280 100,140";
    const LOT = 847;
    const CA_LIMIT = 12;
    const TO_LIMIT = 50;

    const INIT_TOWERS = [
      { id:"A", x:185, y:145, w:72,  h:52, floors:12, units:48, area:2304, type:"Studio 44m²"  },
      { id:"B", x:310, y:165, w:88,  h:60, floors:15, units:75, area:5100, type:"Studio 44m²"  },
      { id:"C", x:390, y:270, w:64,  h:48, floors:10, units:40, area:1920, type:"1 dorm 52m²" },
    ];

    const VERSIONS_INIT = {
      "Versão 01": [
        { id:"A", x:185, y:145, w:72, h:52, floors:12, units:48,  area:2304, type:"Studio 44m²"  },
        { id:"B", x:310, y:165, w:88, h:60, floors:15, units:75,  area:5100, type:"Studio 44m²"  },
        { id:"C", x:390, y:270, w:64, h:48, floors:10, units:40,  area:1920, type:"1 dorm 52m²" },
      ],
      "Versão 02": [
        { id:"A", x:178, y:138, w:82, h:60, floors:16, units:96,  area:4224, type:"Studio 44m²"  },
        { id:"B", x:305, y:155, w:96, h:66, floors:18, units:108, area:4752, type:"Studio 44m²"  },
        { id:"C", x:382, y:262, w:72, h:54, floors:13, units:65,  area:3380, type:"1 dorm 52m²" },
      ],
      "Versão 03": [
        { id:"A", x:175, y:138, w:64, h:50, floors:11, units:44,  area:1936, type:"Studio 44m²"  },
        { id:"B", x:300, y:140, w:78, h:56, floors:13, units:65,  area:2860, type:"Studio 44m²"  },
        { id:"C", x:385, y:218, w:65, h:48, floors:11, units:55,  area:2420, type:"Studio 44m²"  },
        { id:"D", x:238, y:265, w:58, h:44, floors:10, units:40,  area:2080, type:"1 dorm 52m²" },
      ],
    };

    const SCENARIO_META = {
      "Versão 01": {
        name:"Equilíbrio de implantação",
        revision:"v01",
        intent:"Três torres com alturas moderadas e distribuição equilibrada no lote.",
        tradeoff:"Densidade média · menor risco de aprovação · área de permanência preservada.",
      },
      "Versão 02": {
        name:"Máxima densidade",
        revision:"v02",
        intent:"Torres maiores para maximizar unidades e aproveitamento do CA disponível.",
        tradeoff:"CA elevado · TO próxima ao limite · maior exposição a risco regulatório.",
      },
      "Versão 03": {
        name:"Mais área livre",
        revision:"v03",
        intent:"Quatro torres menores liberando permeabilidade no centro do lote.",
        tradeoff:"CA reduzido · TO baixa · quatro blocos ampliam complexidade construtiva.",
      },
    };
    const scenarioName=key=>SCENARIO_META[key]?.name||key;
    const scenarioRevision=key=>SCENARIO_META[key]?.revision||key;
    const scenarioIntent=key=>SCENARIO_META[key]?.intent||"";
    const scenarioTradeoff=key=>SCENARIO_META[key]?.tradeoff||"";

    function computeInsights(towers, m, lim) {
      const insights = [];
      if (!m?.valid) return insights;
      const caLim=lim?.ca??CA_LIMIT, toMax=lim?.to??TO_LIMIT;
      const clean = sanitizeTowers(towers);
      const caHeadroom = caLim - m.ca;
      const toHeadroom = toMax - m.occ;

      // CA opportunity or risk
      if (caHeadroom > 2.5) {
        const approxExtra = Math.max(1, Math.round(caHeadroom * LOT / 52));
        insights.push({
          id: "ca-headroom",
          type: "opportunity",
          text: `CA em ${safeValue(m.ca,{digits:1})} de ${caLim} — margem para ~${approxExtra} unidades adicionais.`,
        });
      } else if (m.ca >= caLim - 1) {
        insights.push({
          id: "ca-risk",
          type: "warning",
          text: `CA em ${safeValue(m.ca,{digits:1})} / ${caLim} — apenas ${safeValue(caHeadroom,{digits:1})} de margem. Qualquer adição pode exceder o limite.`,
        });
      }

      // Tower growth opportunity
      const lowTower = clean.find(t => t.floors < 10 && caHeadroom > 1.5);
      if (lowTower) {
        const towerM2 = Math.max(lowTower.w * lowTower.h, 1) / SVG_PER_M2;
        const potentialFloors = Math.max(2, Math.min(6, Math.floor(caHeadroom * LOT / towerM2)));
        insights.push({
          id: `grow-${lowTower.id}`,
          type: "opportunity",
          text: `Torre ${lowTower.id} pode absorver ${potentialFloors} pavimentos adicionais sem comprometer o CA.`,
        });
      }

      // TO space
      if (toHeadroom > 12) {
        const freeM2 = Math.round(toHeadroom / 100 * LOT);
        insights.push({
          id: "to-space",
          type: "info",
          text: `${safeValue(freeM2,{suffix:" m²"})} de área disponível no lote · TO em ${safeValue(m.occ,{digits:1})}% de ${toMax}%.`,
        });
      }

      // Conflict/overlap warnings
      clean.forEach(t => {
        if (!rectInPoly(t.x,t.y,t.w,t.h,TERRAIN)) {
          insights.push({ id:`conflict-${t.id}`, type:"warning", text:`Torre ${t.id} fora dos limites do lote — regularizar posição antes de calcular.` });
        }
      });
      for (let i = 0; i < clean.length; i++) {

    /* ── geometry ─────────────────────────────────────────────── */
    function pip(px, py, pts) {
      let inside = false;
      for (let i=0, j=pts.length-1; i<pts.length; j=i++) {
        const [xi,yi]=pts[i],[xj,yj]=pts[j];
        if ((yi>py)!==(yj>py) && px<((xj-xi)*(py-yi))/(yj-yi)+xi) inside=!inside;
      }
      return inside;
    }
    const parsePoly = str => str.split(" ").map(p=>p.split(",").map(Number));
    const TERRAIN_POINTS=parsePoly(TERRAIN);
    const calcMetrics=towers=>calculateMetrics(towers,LOT,TERRAIN_POINTS);
    const safeValue=(value,options={})=>formatNumber(value,{fallback:"--",...options});
    function rectInPoly(x,y,w,h,str) {
      const pts=parsePoly(str);
      return pip(x,y,pts)&&pip(x+w,y,pts)&&pip(x,y+h,pts)&&pip(x+w,y+h,pts);
    }
    const overlaps = (a,b) => a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;

    function closestPointOnSegment(p,a,b) {
      const dx=b[0]-a[0],dy=b[1]-a[1];
      const len2=dx*dx+dy*dy;
      const t=len2?Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/len2)):0;
      const point=[a[0]+t*dx,a[1]+t*dy];
      return {point,distance:Math.hypot(p[0]-point[0],p[1]-point[1])};
    }

    function nudgeInsidePoly(x,y,w,h,pts) {
      const corners=[[x,y],[x+w,y],[x,y+h],[x+w,y+h]];
      let bx=0,by=0;
      for(const [cx,cy] of corners){
        if(!pip(cx,cy,pts)){
          const res=closestPointOnPolygon([cx,cy],pts);
          const ddx=res.point[0]-cx,ddy=res.point[1]-cy;
          if(Math.abs(ddx)>Math.abs(bx))bx=ddx;
          if(Math.abs(ddy)>Math.abs(by))by=ddy;
        }
      }
      return{x:x+bx,y:y+by};
    }

    function closestPointOnPolygon(p,pts) {
      return pts.reduce((best,a,i)=>{
        const candidate=closestPointOnSegment(p,a,pts[(i+1)%pts.length]);
        return !best||candidate.distance<best.distance?{...candidate,edge:i}:best;
      },null);
    }

    /* ── geometry extra ───────────────────────────────────────── */
    const M_TO_SVG = 13.06; // 1m ≈ 13.06 SVG units (847m² = 144400 SVG²)
    const SVG_PER_M2 = M_TO_SVG * M_TO_SVG; // ≈ 170.56 SVG² per m² — precomputed to avoid repeated polygon area computation

    function insetPoly(pts, distances) {
      const n = pts.length;
      function inNorm(a, b) {
        const dx=b[0]-a[0], dy=b[1]-a[1], len=Math.sqrt(dx*dx+dy*dy);
        return [-dy/len, dx/len]; // CCW rotation = inward for CW polygon in SVG Y-down
      }
      const norms = pts.map((p,i)=>inNorm(p,pts[(i+1)%n]));
      function offPt(i, end) {
        const pi=pts[end?((i+1)%n):i];
        const d=Array.isArray(distances)?distances[i]:distances;
        return [pi[0]+norms[i][0]*d, pi[1]+norms[i][1]*d];
      }
      function xsect(a,b,c,e) {
        const dx1=b[0]-a[0],dy1=b[1]-a[1],dx2=e[0]-c[0],dy2=e[1]-c[1];
        const den=dx1*dy2-dy1*dx2;
        if(Math.abs(den)<0.001) return [(b[0]+c[0])/2,(b[1]+c[1])/2];
        const t=((c[0]-a[0])*dy2-(c[1]-a[1])*dx2)/den;
        return [a[0]+t*dx1, a[1]+t*dy1];
      }
      return pts.map((_,i)=>{
        const prev=(i-1+n)%n;
        return xsect(offPt(prev,false),offPt(prev,true),offPt(i,false),offPt(i,true));
      });
    }

    /* ── FlipValue ────────────────────────────────────────────── */
    function FlipValue({val,suffix="",size=20}) {
      const safe=isRenderableNumber(val)?val:null;

    /* ── Insights ─────────────────────────────────────────────── */
    function InsightCard({insight,index,onDismiss,onAction}) {
      const dot=insight.type==="opportunity"?C.green2:insight.type==="warning"?C.yellow:C.purple;
      return (
        <div 
          onClick={()=>onAction&&onAction(insight)}
          style={{display:"flex",alignItems:"flex-start",gap:8,background:"rgba(15,19,26,0.94)",backdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"8px 9px",animation:`insightIn 0.3s ease ${index*0.14}s both`,cursor:"pointer",transition:"all 0.15s ease"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(1,173,110,0.3)";e.currentTarget.style.background="rgba(20,25,35,0.96)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";e.currentTarget.style.background="rgba(15,19,26,0.94)";}}
        >
          <div style={{width:6,height:6,borderRadius:"50%",background:dot,boxShadow:`0 0 6px ${dot}`,marginTop:4,flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray2,lineHeight:1.4}}>{insight.text}</div>
            <div style={{marginTop:6,color:C.green2,fontFamily:"'Inter',sans-serif",fontSize:9,fontWeight:700}}>Explorar com a Teodora →</div>
          </div>
          <button onClick={e=>{e.stopPropagation();onDismiss(insight.id);}} style={{background:"none",border:"none",color:C.gray,cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
        </div>
      );
    }

    function InsightsRail({towers,m,limits,onAction}) {
      const [visible,setVisible]=useState(false);
      const [dismissed,setDismissed]=useState([]);
      const activeInsights=computeInsights(towers,m,limits);
      const activeIds=activeInsights.map(i=>i.id).join(",");
      const prevIds=useRef(activeIds);
      useEffect(()=>{
        if(prevIds.current!==activeIds){
          const newIds=activeInsights.map(i=>i.id).filter(id=>!prevIds.current.includes(id));
          const newWarnings=activeInsights.filter(i=>newIds.includes(i.id)&&i.type==="warning");
          setDismissed(prev=>prev.filter(id=>activeInsights.some(i=>i.id===id)));
          prevIds.current=activeIds;
          if(newWarnings.length>0)setVisible(true);
        }
      },[activeIds]);
      useEffect(()=>{const timer=setTimeout(()=>setVisible(true),1800);return()=>clearTimeout(timer);},[]);
      const active=activeInsights.filter(item=>!dismissed.includes(item.id)).slice(0,3);
      if(!visible||!active.length)return null;
      return (
        <div style={{position:"absolute",top:80,left:14,zIndex:20,width:226,display:"flex",flexDirection:"column",gap:5}}>
          {active.map((insight,index)=><InsightCard key={insight.id} insight={insight} index={index} onAction={onAction} onDismiss={id=>setDismissed(prev=>[...prev,id])}/>)}
        </div>
      );
    }

    function TowerDetail({tower,m,onClose,onSave,onAdjust,onRemove,limits,onAgentAction}) {
      const [localInput,setLocalInput]=useState("");
      const st=sanitizeTower(tower);
      const tCaContrib=safeValue(st.area/LOT,{digits:2});
      function towerAiText(t,metrics) {
        const caLim=limits?.ca??CA_LIMIT;
        const caWarn=Math.max(caLim*0.83,caLim-2);
        if(!metrics?.valid) return "Indicadores não calculados. Verificar posição da torre no lote.";
        const caHeadroom=caLim-metrics.ca;
        const tM2=st.w*st.h/SVG_PER_M2;
        if(st.floors>=15&&metrics.ca>=caWarn) return `CA total em ${safeValue(metrics.ca,{digits:1})} / ${caLim} — margem de ${safeValue(caHeadroom,{digits:1})}. Esta torre contribui com ~${tCaContrib} CA. Redução de altura libera margem sem comprometer as demais. Quer testar reduzir esta torre para ver o impacto no CA?`;
        if(st.floors<=8&&caHeadroom>1.5){
          const extra=Math.max(2,Math.min(6,Math.floor(caHeadroom*LOT/Math.max(tM2,1))));
          return `CA total em ${safeValue(metrics.ca,{digits:1})} de ${caLim}, com ${safeValue(caHeadroom,{digits:1})} de margem. Esta torre pode absorver até ${extra} pavimentos adicionais. Gostaria de adicionar 2 pavimentos para testar?`;
        }
        if(metrics.ca>=caWarn) return `O estudo usa ${safeValue(metrics.ca/caLim*100,{digits:1,suffix:"%"})} do CA informado. A Torre ${st.id} contribui com ~${tCaContrib}; alterar sua altura sem redistribuição reduz a margem para ajustes futuros. Recomendo uma transferência de 1 a 2 pavimentos para a torre mais baixa. Quer simular essa redistribuição?`;
        return `A Torre ${st.id} contribui com ~${tCaContrib} de CA. O estudo mantém ${safeValue(caHeadroom,{digits:1})} de margem. O trade-off principal é usar essa folga para unidades ou preservá-la para reduzir risco regulatório. Gostaria que eu simulasse alternativas para aumentar unidades?`;
      }
      const aiText=towerAiText(tower,m);
      const SUGGESTIONS = [
        "+ aumentar unidades",
        "+ reduzir altura",
        "+ melhorar insolação",
        "+ diminuir risco",
        "+ preservar área livre",
        "+ redistribuir potencial",
      ];
      return (
        <>
          <div style={{padding:"16px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:28,height:28,borderRadius:6,background:"rgba(1,173,110,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:C.green2}}>{tower.id}</div>

          </div>
          <div style={{padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:11}}>Contexto</div>
            {[
              ["Pavimentos",safeValue(tower.floors)],
              ["Unidades",safeValue(tower.units)],
              ["Área total",safeValue(tower.area,{suffix:" m²"})],
              ["Tipologia",tower.type||"--"],
              ["Contribuição no CA",`~${tCaContrib} CA`],
            ].map(([label,value])=>(
              <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:11,color:C.gray}}>{label}</span>

              </div>
            ))}
          </div>
          <div style={{padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>Análise da Teodora</div>
            <div style={{background:"rgba(1,173,110,0.08)",border:"1px solid rgba(51,224,161,0.18)",borderRadius:8,padding:"10px 11px",fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray2,lineHeight:1.5}}>{aiText}</div>
          </div>
          <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:6}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>O que você gostaria de fazer?</div>
            <div style={{position:"relative",display:"flex",alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"4px 8px 4px 10px"}}>
              <input 
                type="text" 
                value={localInput} 
                onChange={e=>setLocalInput(e.target.value)} 
                onKeyDown={e=>{
                  e.stopPropagation();
                  if(e.key==="Enter" && localInput.trim()){
                    onAgentAction(localInput.trim());
                    setLocalInput("");
                  }

                placeholder={`Intenção para Torre ${tower.id}...`}

                  if(localInput.trim()){
                    onAgentAction(localInput.trim());
                    setLocalInput("");
                  }
                }} 
                disabled={!localInput.trim()}
                style={{background:localInput.trim()?C.green:"rgba(255,255,255,0.04)",border:"none",borderRadius:4,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",cursor:localInput.trim()?"pointer":"default",transition:"all 0.2s ease"}}

            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
              {SUGGESTIONS.map(s => (

                  onMouseLeave={e=>{e.target.style.background="rgba(255,255,255,0.03)";e.target.style.borderColor="rgba(255,255,255,0.07)";e.target.style.color=C.gray2;}}
                >
                  {s}
                </button>
              ))}
            </div>
          </div>
        </>
      );
    }

    function QuantitiesPanel({ m, towers, version, limits, onShowToast, onBackToLote }) {
      const [quantitiesTab, setQuantitiesTab] = useState("capa");
      const cleanTowers = sanitizeTowers(towers);
      const valid = m?.valid === true;

      const towerDetails = cleanTowers.map(t => {
        const heightM = t.floors * 3;
        const perimeterM = (2 * (t.w + t.h)) / M_TO_SVG;
        const fachada = Math.round(perimeterM * heightM);
        const cobertura = Math.round((t.w * t.h) / SVG_PER_M2);
        const areaConstruida = t.area;
        const areaPrivativa = Math.round(areaConstruida * 0.73);
        const areaComum = areaConstruida - areaPrivativa;

        return {
          id: t.id,
          floors: t.floors,
          units: t.units,
          areaConstruida,
          areaPrivativa,
          areaComum,
          fachada,
          cobertura
        };
      });

      const totalTorres = cleanTowers.length;
      const totalFloors = towerDetails.reduce((sum, td) => sum + td.floors, 0);
      const totalUnits = valid ? m.units : towerDetails.reduce((sum, td) => sum + td.units, 0);
      const totalAreaConstruida = valid ? m.area : towerDetails.reduce((sum, td) => sum + td.areaConstruida, 0);
      const totalAreaPrivativa = towerDetails.reduce((sum, td) => sum + td.areaPrivativa, 0);
      const totalAreaComum = totalAreaConstruida - totalAreaPrivativa;
      const totalCobertura = towerDetails.reduce((sum, td) => sum + td.cobertura, 0);
      const totalFachada = towerDetails.reduce((sum, td) => sum + td.fachada, 0);
      const caUtilizado = valid ? m.ca : 0;
      const toUtilizado = valid ? m.occ : 0;
      const areaProjecao = Math.round((toUtilizado * LOT) / 100);

      const areaLivre = Math.max(0, LOT - totalCobertura);
      const areaPermeavel = Math.round(areaLivre * 0.4);
      const sistemaViario = Math.round(areaLivre * 0.15);
      const calcadasCirc = Math.round(areaLivre * 0.20);
      const paisagismo = Math.round(areaLivre * 0.25);

      const formatM2 = val => safeValue(val, { digits: 0, suffix: " m²" });

      // Generate dynamic rows based on active towers
      const alvenariasRows = [];
      const portasRows = [];
      const janelasRows = [];
      const sancasRows = [];

      cleanTowers.forEach(t => {
        const isStudio = t.type.toLowerCase().includes("studio");
        const tipologia = t.type;
        const units = t.units;

        // Dormitório
        const aDormPiso = 12 * units;
        const aDormPerim = 14 * units;
        const aDormParedes = Math.round(aDormPerim * 2.8);
        const aDormVaos = 2 * units;
        const aDormAreaVaos = Math.round(3.2 * units);
        const aDormDesc = Math.round(0.8 * units);
        
        alvenariasRows.push({
          torre: t.id,
          tipo: tipologia,
          ambiente: "Dormitório",
          zoneId: `T${t.id}-APT-DORM`,
          altura: "2.80",
          areaPiso: aDormPiso,
          perim: aDormPerim,
          areaPar: aDormParedes,
          vaos: aDormVaos,
          areaVaos: aDormAreaVaos,
          desc: aDormDesc
        });

        // Sala/Cozinha
        const aSalaPiso = (isStudio ? 27 : 35) * units;
        const aSalaPerim = (isStudio ? 21 : 26) * units;
        const aSalaParedes = Math.round(aSalaPerim * 2.8);
        const aSalaVaos = 3 * units;
        const aSalaAreaVaos = Math.round(4.8 * units);
        const aSalaDesc = Math.round(1.2 * units);

        alvenariasRows.push({
          torre: t.id,
          tipo: tipologia,
          ambiente: "Sala/Cozinha",

        // Banheiro

        const aWcParedes = Math.round(aWcPerim * 2.8);
        const aWcVaos = 1 * units;

        const aWcDesc = Math.round(0.6 * units);

    const SETBACK_METERS=[5,1.5,1.5,3,3,1.5,1.5,5]; // frontal, laterais, fundos (uma por aresta do terreno)
    const INSET_TERRAIN=insetPoly(TERRAIN_POINTS,SETBACK_METERS.map(v=>v*M_TO_SVG));

    /* ── SetbackOverlay ───────────────────────────────────────── */
    function SetbackOverlay({ terrainPoints }) {
      const terrain = terrainPoints || parsePoly(TERRAIN);
      const n = terrain.length;
      const setbackMeters = terrain.map((_, i) => {
        if (i === 0 || i === n - 1) return 5;
        if (i === 3 || i === 4) return 3;
        return 1.5;
      });
      const inner = insetPoly(terrain, setbackMeters.map(v => v * M_TO_SVG));
      const outerPath = terrain.map(p=>p.join(" ")).join(" L ");
      const coord=v=>isRenderableNumber(v,2000)?v.toFixed(1):"0";
      const innerPath = inner.map(p=>p.map(coord).join(" ")).join(" L ");
      const innerPts  = inner.map(p=>p.map(coord).join(",")).join(" ");
      return (
        <g style={{pointerEvents:"none"}}>
          <path d={`M ${outerPath} Z M ${innerPath} Z`} fillRule="evenodd" fill="rgba(255,188,0,0.09)"/>
          <polygon points={innerPts} fill="none" stroke="rgba(255,188,0,0.6)" strokeWidth="1" strokeDasharray="5,4"/>
          {terrain.map((a,i)=>{
            const b=terrain[(i+1)%terrain.length];
            const x=(a[0]+b[0])/2,y=(a[1]+b[1])/2;
            const angle=Math.atan2(b[1]-a[1],b[0]-a[0])*180/Math.PI;
            const label=setbackMeters[i]===5?"Frontal":setbackMeters[i]===3?"Fundos":"Lateral";
            return <text key={i} x={x} y={y-5} textAnchor="middle" fill="rgba(255,188,0,0.9)" fontSize={8} fontFamily="'Inter',sans-serif" transform={`rotate(${angle},${x},${y})`}>{label} · {setbackMeters[i]}m</text>;
          })}
        </g>
      );
    }

    /* ── DistanceRuler ────────────────────────────────────────── */
    function DistanceRuler({tower, towers}) {
      const terrain=parsePoly(TERRAIN);
      const dl = {stroke:"rgba(51,224,161,0.5)",strokeWidth:"0.8",strokeDasharray:"4,3"};
      const tl = {stroke:"rgba(51,224,161,0.65)",strokeWidth:"1"};
      const cx = tower.x+tower.w/2, cy = tower.y+tower.h/2;
      const fm = d => safeValue(d/M_TO_SVG,{digits:1,suffix:"m",max:1000});

      function DLab({x,y,text}) {
        const w=Math.max(22,text.length*5.4);
        return <g>
          <rect x={x-w/2} y={y-9} width={w+4} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
          <text x={x} y={y} textAnchor="middle" fill={C.green2} fontSize={9} fontFamily="'Inter',sans-serif">{text}</text>
        </g>;
      }
      function SLab({x,y,text}) {
        const w=Math.max(22,text.length*5.4);
        return <g>
          <rect x={x+5} y={y-9} width={w+4} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
          <text x={x+8} y={y} textAnchor="start" fill={C.green2} fontSize={9} fontFamily="'Inter',sans-serif">{text}</text>
        </g>;
      }

      const anchors=[
        [tower.x,cy],
        [tower.x+tower.w,cy],
        [cx,tower.y],
        [cx,tower.y+tower.h],
      ].map(point=>({from:point,...closestPointOnPolygon(point,terrain)}));

      return (
        <g style={{pointerEvents:"none"}}>
          {anchors.map(({from,point,distance},i)=>(
            <g key={i}>
              <line x1={from[0]} y1={from[1]} x2={point[0]} y2={point[1]} {...dl}/>
              <circle cx={point[0]} cy={point[1]} r={2.2} fill={C.green2}/>
              <DLab x={(from[0]+point[0])/2} y={(from[1]+point[1])/2-2} text={fm(distance)}/>
            </g>
          ))}

          {/* inter-tower gaps */}
          {towers.filter(o=>o.id!==tower.id).map(o=>{
            const yOvl=tower.y<o.y+o.h&&tower.y+tower.h>o.y;
            const xOvl=tower.x<o.x+o.w&&tower.x+tower.w>o.x;
            if(yOvl){
              const lx=tower.x+tower.w<o.x?tower.x+tower.w:o.x+o.w;
              const rx=tower.x+tower.w<o.x?o.x:tower.x;
              if(rx-lx<=0)return null;
              const my=(Math.max(tower.y,o.y)+Math.min(tower.y+tower.h,o.y+o.h))/2;
              return <g key={o.id}>
                <line x1={lx} y1={my} x2={rx} y2={my} stroke={C.yellow} strokeWidth="0.8" strokeDasharray="4,3"/>
                <line x1={lx} y1={my-4} x2={lx} y2={my+4} stroke={C.yellow} strokeWidth="1"/>
                <line x1={rx} y1={my-4} x2={rx} y2={my+4} stroke={C.yellow} strokeWidth="1"/>
                <rect x={(lx+rx)/2-13} y={my-9} width={26} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
                <text x={(lx+rx)/2} y={my} textAnchor="middle" fill={C.yellow} fontSize={9} fontFamily="'Inter',sans-serif">{safeValue(Math.max(0,rx-lx)/M_TO_SVG,{digits:1,suffix:"m",max:1000})}</text>
              </g>;
            }
            if(xOvl){
              const ty=tower.y+tower.h<o.y?tower.y+tower.h:o.y+o.h;
              const by=tower.y+tower.h<o.y?o.y:tower.y;
              if(by-ty<=0)return null;
              const mx=(Math.max(tower.x,o.x)+Math.min(tower.x+tower.w,o.x+o.w))/2;
              return <g key={o.id}>
                <line x1={mx} y1={ty} x2={mx} y2={by} stroke={C.yellow} strokeWidth="0.8" strokeDasharray="4,3"/>
                <line x1={mx-4} y1={ty} x2={mx+4} y2={ty} stroke={C.yellow} strokeWidth="1"/>
                <line x1={mx-4} y1={by} x2={mx+4} y2={by} stroke={C.yellow} strokeWidth="1"/>
                <rect x={mx+5} y={(ty+by)/2-6} width={26} height={11} rx={2} fill="rgba(17,21,29,0.88)"/>
                <text x={mx+8} y={(ty+by)/2+4} textAnchor="start" fill={C.yellow} fontSize={9} fontFamily="'Inter',sans-serif">{safeValue(Math.max(0,by-ty)/M_TO_SVG,{digits:1,suffix:"m",max:1000})}</text>
              </g>;
            }
            return null;
          })}
        </g>
      );
    }

    /* ── Tower3D ──────────────────────────────────────────────── */
    function Tower3D({tower,selected,onSelect,isMasses=false}) {
      const st=sanitizeTower(tower);
      const height=Math.min(90,22+st.floors*3.1);
      const dx=-height*0.30,dy=-height*0.50;
      const {x,y,w,h}=st;
      const top  =`${x},${y} ${x+w},${y} ${x+w+dx},${y+dy} ${x+dx},${y+dy}`;
      const left =`${x},${y} ${x+dx},${y+dy} ${x+dx},${y+h+dy} ${x},${y+h}`;
      const right=`${x+w},${y} ${x+w+dx},${y+dy} ${x+w+dx},${y+h+dy} ${x+w},${y+h}`;
      
      const cols = isMasses
        ? { left: "rgba(1, 173, 110, 0.16)", right: "rgba(1, 140, 90, 0.16)", top: "rgba(51, 224, 161, 0.28)" }
        : selected
          ? {left:"#1a7a5e",right:"#0f5f49",top:"#2ec98c"}
          : {left:"#1e3044",right:"#162536",top:"#2d4a62"};
          
      const floorCount=Math.min(st.floors,16);
      const windowLines=[];
      if (!isMasses) {
        for(let i=1;i<floorCount;i++){
          const r=i/floorCount;
          windowLines.push(
            <line key={`wr${i}`} x1={x+w+dx*r} y1={y+dy*r} x2={x+w} y2={y+h*r} stroke="rgba(255,255,255,0.06)" strokeWidth="0.7"/>,
            <line key={`wl${i}`} x1={x+dx*r} y1={y+dy*r} x2={x} y2={y+h*r} stroke="rgba(255,255,255,0.05)" strokeWidth="0.6"/>
          );
        }
      }
      
      const insetTop = (factor) => {
        const cx = x + w/2 + dx/2;
        const cy = y + dy/2;
        return [
          [x, y],
          [x+w, y],
          [x+w+dx, y+dy],
          [x+dx, y+dy]
        ].map(([px, py]) => {
          const nx = cx + (px - cx) * factor;
          const ny = cy + (py - cy) * factor;
          return `${nx},${ny}`;
        }).join(" ");
      };

      const strokeCol = isMasses ? "rgba(51, 224, 161, 0.6)" : selected ? C.green2 : "#3d5870";

        <g onClick={e=>{e.stopPropagation();onSelect(st.id);}} style={{cursor:"pointer",filter:selected?"drop-shadow(0 0 14px rgba(51,224,161,0.35))":"none",transition:"filter 0.2s ease"}}>

    }

    /* ── ComparePanel — 2.2 ──────────────────────────────────── */
    function compareRec(verL, mL, verR, mR, lim, getScenarioName = scenarioName) {
      if (!mL?.valid || !mR?.valid) return null;
      const caLim=lim?.ca??CA_LIMIT, caWarn=Math.max(caLim*0.83,caLim-2);
      const du = mR.units - mL.units;
      const nameL = getScenarioName(verL), nameR = getScenarioName(verR);
      const riskR = mR.ca >= caLim, riskL = mL.ca >= caLim;
      const highR = mR.ca >= caWarn, highL = mL.ca >= caWarn;
      const pct = (a,b) => `${Math.round(Math.abs(a-b)/Math.max(Math.min(a,b),1)*100)}%`;
      if(Math.abs(du)<=2&&Math.abs(mR.ca-mL.ca)<=0.2) return {text:`Configurações equivalentes em unidades e CA. Diferença principal é a distribuição das torres no lote.`,rec:null};
      if(du>5){
        if(riskR&&!riskL) return {text:`${nameR} gera ${du} unidades a mais (+${pct(mR.units,mL.units)}), mas CA ${safeValue(mR.ca,{digits:1})} excede o limite informado. Avançar com ${nameR} exige revisão regulatória.`,rec:verL,label:`Menor risco · ${nameL}`};
        if(highR&&!highL) return {text:`${nameR} gera ${du} unidades a mais (+${pct(mR.units,mL.units)}), com CA ${safeValue(mR.ca,{digits:1})} próximo ao limite. ${nameL} preserva margem de ${safeValue(caLim-mL.ca,{digits:1})}.`,rec:null};
        return {text:`${nameR} produz ${du} unidades a mais (+${pct(mR.units,mL.units)}) e CA ${safeValue(mR.ca,{digits:1})} dentro dos parâmetros.`,rec:verR,label:`Mais unidades · ${nameR}`};
      }
      if(du<-5){
        const ad=Math.abs(du);
        if(riskL&&!riskR) return {text:`${nameL} tem ${ad} unidades a mais, mas CA ${safeValue(mL.ca,{digits:1})} excede o limite informado. ${nameR} preserva segurança regulatória.`,rec:verR,label:`Menor risco · ${nameR}`};
        return {text:`${nameL} produz ${ad} unidades a mais (+${pct(mL.units,mR.units)}) — CA ${safeValue(mL.ca,{digits:1})} ${riskL?"acima do limite":"dentro dos parâmetros"}.`,rec:null};
      }
      if(mR.ca<mL.ca-0.3) return {text:`Unidades similares. ${nameR} tem CA ${safeValue(mR.ca,{digits:1})} — ${safeValue(mL.ca-mR.ca,{digits:1})} abaixo de ${nameL}. Menor CA amplia margem regulatória.`,rec:verR,label:`Menor risco · ${nameR}`};
      if(mL.ca<mR.ca-0.3) return {text:`Unidades similares. ${nameL} tem CA ${safeValue(mL.ca,{digits:1})} — ${safeValue(mR.ca-mL.ca,{digits:1})} abaixo de ${nameR}. Menor CA amplia margem regulatória.`,rec:verL,label:`Menor risco · ${nameL}`};
      return {text:`Diferença pequena em unidades (${du>0?"+":""}${du}) e CA similar. Fator diferenciador é a distribuição no lote.`,rec:null};
    }

    const PENDING_ITEMS=["Conferir legislação urbanística","Validar viabilidade econômica","Revisar setores de recuo","Confirmar disponibilidade de vagas"];

    function ComparePanel({
      versions,
      currentVersion,
      onClose,
      onSwitch,
      onPreview,
      limits,
      calcMetrics: localCalcMetrics,
      terrainPoints,
      scenarioName: customScenarioName,
      scenarioRevision: customScenarioRevision,
      scenarioIntent: customScenarioIntent,
      scenarioTradeoff: customScenarioTradeoff
    }) {
      const getScenarioName = customScenarioName || scenarioName;
      const getScenarioRevision = customScenarioRevision || scenarioRevision;
      const getScenarioIntent = customScenarioIntent || scenarioIntent;
      const getScenarioTradeoff = customScenarioTradeoff || scenarioTradeoff;

      const VERS = Object.keys(versions);
      const [left,  setLeft]  = useState(currentVersion);
      const [right, setRight] = useState(VERS.find(v=>v!==currentVersion)||VERS[0]);
      const [deciding, setDeciding] = useState(null); // {strategy, label} | null
      const [reason, setReason] = useState("");
      const [pending, setPending] = useState(PENDING_ITEMS.slice(0,2)); // first 2 pre-checked

      const cmpCalcMetrics = localCalcMetrics || calcMetrics;
      const tL = versions[left]  || [];
      const tR = versions[right] || [];
      const mL = cmpCalcMetrics(tL);
      const mR = cmpCalcMetrics(tR);
      const metricsValid=mL.valid&&mR.valid;
      const riskFor=metrics=>!metrics.valid?"bloqueante":metrics.ca>=(limits?.ca??CA_LIMIT)?"alto":metrics.ca>=(limits?.ca??CA_LIMIT)*0.9?"médio":"baixo";

      function MiniCanvas({towers}) {

                {t.h>32&&<text x={t.x+t.w/2} y={t.y+t.h/2+12} textAnchor="middle" fill="rgba(255,255,255,0.35)" fontSize={8} fontFamily="'Inter',sans-serif">{safeValue(t.floors)}p</text>}
              </g>
            ))}
          </svg>
        );
      }

      const METRICS = [
        {label:"Torres",   lv:tL.length, rv:tR.length, fmt:v=>safeValue(v),higher:true},
        {label:"Unidades", lv:mL.units,  rv:mR.units,  fmt:v=>safeValue(v),higher:true},
        {label:"Área m²",  lv:mL.area,   rv:mR.area,   fmt:v=>safeValue(v),higher:true},
        {label:"Área livre",lv:mL.valid?LOT*(100-mL.occ)/100:null,rv:mR.valid?LOT*(100-mR.occ)/100:null,fmt:v=>safeValue(v,{suffix:" m²"}),higher:true},
        {label:"CA",       lv:mL.ca,     rv:mR.ca,     fmt:v=>safeValue(v,{digits:1}),higher:false,limit:limits?.ca??CA_LIMIT},
        {label:"TO %",     lv:mL.occ,    rv:mR.occ,    fmt:v=>safeValue(v,{digits:1,suffix:"%"}),higher:false,limit:limits?.to??TO_LIMIT},
      ];

      return (
        <div style={{position:"absolute",inset:0,zIndex:100,background:C.ink2,display:"flex",flexDirection:"column",animation:"fadeIn 0.18s ease"}}>
          {/* header */}
          <div style={{display:"flex",alignItems:"center",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
            <span style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,color:"#fff"}}>Comparar estratégias</span>
            <div style={{flex:1}}/>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:C.gray2,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon.X s={12}/>
            </button>
          </div>

          {/* two mini-canvases */}
          <div style={{display:"flex",flex:1,gap:12,padding:"14px 20px 12px",overflow:"hidden",minHeight:0}}>
            {[{ver:left,setVer:setLeft,tw:tL,m:mL,accent:"rgba(51,224,161,0.2)"},{ver:right,setVer:setRight,tw:tR,m:mR,accent:"rgba(86,79,255,0.2)"}].map(({ver,setVer,tw,m,accent},si)=>(
              <div key={si} style={{flex:1,display:"flex",flexDirection:"column",gap:8,minHeight:0}}>
                <div style={{display:"flex",flexDirection:"column",gap:7,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <select value={ver} onChange={e=>setVer(e.target.value)}
                      style={{background:"rgba(32,38,47,0.95)",border:`1px solid ${accent}`,color:"#fff",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,borderRadius:6,padding:"4px 10px",cursor:"pointer",outline:"none"}}>
                      {VERS.map(v=><option key={v} value={v} style={{background:C.card}}>{getScenarioName(v)} · {getScenarioRevision(v)}</option>)}
                    </select>
                    <span style={{fontFamily:"'Inter',sans-serif",fontSize:11,color:C.gray}}>
                      {safeValue(tw.length)} torres · {m.valid?safeValue(m.units):"--"} un · CA <span style={{color:m.valid&&m.ca>=(limits?.ca??CA_LIMIT)?C.yellow:"#fff",fontWeight:600}}>{m.valid?safeValue(m.ca,{digits:1}):"--"}</span>
                    </span>
                    <span style={{fontFamily:"'Inter',sans-serif",fontSize:9,fontWeight:700,color:riskFor(m)==="baixo"?C.green2:riskFor(m)==="médio"?C.yellow:C.red}}>risco {riskFor(m)}</span>
                  </div>
                  {getScenarioIntent(ver)&&(
                    <div style={{background:"rgba(17,21,29,0.55)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"6px 9px"}}>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray2,lineHeight:1.4,marginBottom:3}}>{getScenarioIntent(ver)}</div>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:10,color:C.gray,lineHeight:1.4}}>{getScenarioTradeoff(ver)}</div>
                    </div>
                  )}
                </div>
                <div style={{flex:1,border:`1px solid ${accent}`,borderRadius:10,overflow:"hidden",background:C.ink2,minHeight:0}}>
                  <MiniCanvas towers={tw}/>
                </div>
                <div style={{display:"flex",gap:7,flexShrink:0}}>
                  <button onClick={()=>onPreview&&onPreview(ver)} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:C.gray2,fontFamily:"'Inter',sans-serif",fontSize:10,padding:"6px",cursor:"pointer"}}>Ver no canvas</button>
                  <button onClick={()=>{setDeciding({strategy:ver,label:`Aplicar ${getScenarioName(ver)}`});setReason("");setPending(PENDING_ITEMS.slice(0,2));}} style={{flex:1,background:"rgba(1,173,110,0.14)",border:"1px solid rgba(51,224,161,0.3)",borderRadius:6,color:C.green2,fontFamily:"'Inter',sans-serif",fontSize:10,fontWeight:700,padding:"6px",cursor:"pointer"}}>Aplicar esta versão</button>
                </div>
              </div>
            ))}
          </div>

          {/* metrics delta strip */}
          <div style={{flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(17,21,29,0.7)",padding:"12px 20px"}}>
            <div style={{display:"flex",justifyContent:"center",gap:0}}>
              {METRICS.map(({label,lv,rv,fmt,higher,limit},mi)=>{
                const rowValid=metricsValid&&isRenderableNumber(lv)&&isRenderableNumber(rv);
                const diff = rowValid?rv-lv:null;
                const overLimit = rowValid&&limit&&rv>=limit;
                const col = diff===0 ? C.gray

    /* ── ReasoningOverlay ─────────────────────────────────────── */
    function generateReasoningSteps(query, hasAttachedFile) {
      const lower = (query || "").toLowerCase();
      
      const isQuantities = /quantit|quantif|planilha|levantamento|orça|orço/.test(lower);
      if (isQuantities) {
        return [
          "Lendo a solução ativa...",
          "Identificando torres, pavimentos e unidades...",
          "Calculando áreas construídas...",
          "Estimando fachadas e áreas de cobertura...",
          "Consolidando ambientes e áreas comuns...",
          "Organizando quantitativos por categoria...",
          "Preparando visão executiva..."
        ];
      }

      const C_UNDERSTANDING = [
        "Entendendo seu objetivo...",
        "Interpretando sua intenção...",
        "Organizando as premissas...",
        "Preparando o estudo...",
        "Lendo o contexto do projeto..."
      ];
      
      const C_ARCH = [
        "Abrindo ferramentas urbanísticas...",
        "Carregando motor arquitetônico...",
        "Avaliando restrições legais...",
        "Verificando legislação...",
        "Calculando potencial construtivo...",
        "Conferindo CA...",
        "Conferindo TO...",
        "Avaliando afastamentos...",
        "Calculando insolação...",
        "Simulando distribuição das torres...",
        "Testando novas implantações...",
        "Avaliando circulação...",
        "Calculando área construída...",
        "Buscando oportunidades de otimização...",
        "Simulando alternativas...",
        "Comparando estratégias..."
      ];

      const C_IA = [
        "Cruzando milhares de possibilidades...",
        "Priorizando alternativas...",
        "Avaliando impacto...",
        "Escolhendo a estratégia mais promissora...",
        "Preparando recomendações...",
        "Construindo explicação...",
        "Preparando visualização..."
      ];

      const C_HUMOR = [
        "☕ Reabastecendo o café da Teodora...",
        "📐 Procurando um lápis que funcione...",
        "🧠 Organizando as ideias...",
        "🏙️ Observando o terreno por outro ângulo..."
      ];

      // Specifics
      const SPECIFIC_MAX_UNITS = [
        "Calculando potencial construtivo...",
        "Redistribuindo torres...",
        "Testando alturas...",
        "Avaliando CA...",
        "Escolhendo a melhor estratégia..."
      ];

      const SPECIFIC_LOW_RISK = [
        "Avaliando margem regulatória...",
        "Simulando cenários conservadores...",
        "Buscando alternativas mais seguras...",
        "Comparando impacto..."
      ];

      const SPECIFIC_COMPARE = [
        "Carregando estudos...",
        "Comparando soluções...",
        "Calculando diferenças...",
        "Identificando trade-offs..."
      ];

      const SPECIFIC_ATTACHED = [
        "Lendo o contexto do projeto...",
        "Analisando geometria do lote...",
        "Extraindo polígono do terreno...",
        "Verificando orientação solar...",
        "Avaliando recuos obrigatórios..."
      ];

      let steps = [];

      function sample(arr, n) {
        const shuffled = [...arr].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, n);
      }

      // Step 1: Understanding
      if (hasAttachedFile) {
        steps.push(sample(SPECIFIC_ATTACHED, 1)[0]);
      } else {
        steps.push(sample(C_UNDERSTANDING, 1)[0]);
      }

      // Step 2 & 3: Arch / Specifics
      const isMaxUnits = /unidade|max|potencial|dens|aproveit|altura|pavimento/.test(lower);
      const isLowRisk = /risco|seguro|conservador|regulatório|regulat/.test(lower);
      const isCompare = /compar|diferen|trade-off|versus|vs/.test(lower);

      if (isMaxUnits) {
        steps.push(sample(SPECIFIC_MAX_UNITS, 1)[0]);
        steps.push(sample(C_ARCH.filter(x => !steps.includes(x)), 1)[0]);
      } else if (isLowRisk) {
        steps.push(sample(SPECIFIC_LOW_RISK, 1)[0]);
        steps.push(sample(C_ARCH.filter(x => !steps.includes(x)), 1)[0]);
      } else if (isCompare) {
        steps.push(sample(SPECIFIC_COMPARE, 1)[0]);
        steps.push(sample(C_ARCH.filter(x => !steps.includes(x)), 1)[0]);
      } else {
        const chosen = sample(C_ARCH, 2);
        steps.push(chosen[0]);
        steps.push(chosen[1]);
      }

      // Step 4: IA
      steps.push(sample(C_IA, 1)[0]);

      // Step 5: Micro-humor (5% chance)
      if (Math.random() < 0.05) {
        steps.push(sample(C_HUMOR, 1)[0]);
      }

      // Step 6: Final IA step
      const finalCandidates = C_IA.filter(x => !steps.includes(x));
      steps.push(sample(finalCandidates, 1)[0]);

      return steps;
    }

    /* ── ArchitecturalStudyPreview ────────────────────────────── */
    function project(x, y, z, theta, zoom = 0.55) {
      const dx = x - 315;
      const dy = y - 210;
      const rx = dx * Math.cos(theta) - dy * Math.sin(theta);
      const ry = dx * Math.sin(theta) + dy * Math.cos(theta);
      const cx = 210;
      const cy = 150;
      const screenX = (rx - ry) * zoom + cx;
      const screenY = (rx + ry) * 0.55 * zoom + cy - z * zoom;
      return { x: screenX, y: screenY };
    }

    function ExtrudedPolygon({ points, zBottom, zTop, fillBottom, fillTop, fillSide, stroke, strokeWidth=1, theta, zoom }) {
      const bottomPts = points.map(p => project(p.x, p.y, zBottom, theta, zoom));
      const topPts = points.map(p => project(p.x, p.y, zTop, theta, zoom));
      const bottomStr = bottomPts.map(p => `${p.x},${p.y}`).join(" ");
      const topStr = topPts.map(p => `${p.x},${p.y}`).join(" ");
      
      const sideFaces = [];
      const n = points.length;
      for (let i = 0; i < n; i++) {
        const next = (i + 1) % n;
        const facePts = [
          bottomPts[i],
          topPts[i],
          topPts[next],
          bottomPts[next]
        ];
        const faceStr = facePts.map(p => `${p.x},${p.y}`).join(" ");
        sideFaces.push(
          <polygon key={i} points={faceStr} fill={fillSide} stroke={stroke} strokeWidth={strokeWidth} />
        );
      }
      
      return (
        <g>
          {fillBottom && <polygon points={bottomStr} fill={fillBottom} stroke={stroke} strokeWidth={strokeWidth} />}
          {sideFaces}
          {fillTop && <polygon points={topStr} fill={fillTop} stroke={stroke} strokeWidth={strokeWidth} />}
        </g>
      );
    }

    function ExtrudedBox({ x, y, w, h, zBottom, zTop, fillTop, fillSide, stroke, strokeWidth=0.8, theta, zoom }) {
      const points = [
        { x: x, y: y },
        { x: x + w, y: y },
        { x: x + w, y: y + h },
        { x: x, y: y + h }
      ];
      return (
        <ExtrudedPolygon
          points={points}
          zBottom={zBottom}
          zTop={zTop}
          fillTop={fillTop}
          fillSide={fillSide}
          stroke={stroke}
          strokeWidth={strokeWidth}
          theta={theta}
          zoom={zoom}
        />
      );
    }

    function ArchitecturalStudyPreview({ isThinking, query, height, zoom }) {
      const [time, setTime] = useState(0);
      const [variantIdx, setVariantIdx] = useState(0);

      useEffect(() => {
        if (!isThinking) return;
        let animId;
        const start = Date.now();
        const update = () => {
          setTime((Date.now() - start) / 1000);
          animId = requestAnimationFrame(update);
        };
        animId = requestAnimationFrame(update);
        return () => cancelAnimationFrame(animId);
      }, [isThinking]);

      useEffect(() => {
        if (!isThinking) return;
        const interval = setInterval(() => {
          setVariantIdx(prev => prev + 1);
        }, 220);
        return () => clearInterval(interval);
      }, [isThinking]);

      if (!isThinking) return null;

      const theta = -0.06 + Math.sin(time * 0.18) * 0.1;
      const liveZoom = zoom * (1 + Math.sin(time * 0.25) * 0.02);

              let stroke = C.green2;
              
              if (t.type === "ghost") {
                fillTop = "rgba(255, 255, 255, 0.12)";
                fillSide = "rgba(255, 255, 255, 0.06)";
                stroke = "rgba(255, 255, 255, 0.35)";
              } else if (t.type === "conflict") {
                fillTop = "rgba(255, 188, 0, 0.26)";
                fillSide = "rgba(255, 188, 0, 0.15)";
                stroke = C.yellow;
              }

              const b0 = project(t.x, t.y, 5, theta, liveZoom);
              const t0 = project(t.x, t.y, 5 + height, theta, liveZoom);
              const b2 = project(t.x + t.w, t.y + t.h, 5, theta, liveZoom);
              const t2 = project(t.x + t.w, t.y + t.h, 5 + height, theta, liveZoom);

              return (
                <g key={`t-${idx}`}>
                  <line x1={b0.x} y1={b0.y} x2={t0.x} y2={t0.y} stroke="rgba(255,255,255,0.18)" strokeWidth="0.6" strokeDasharray="1,2" />
                  <line x1={b2.x} y1={b2.y} x2={t2.x} y2={t2.y} stroke="rgba(255,255,255,0.18)" strokeWidth="0.6" strokeDasharray="1,2" />

                  <ExtrudedBox
                    x={t.x} y={t.y} w={t.w} h={t.h}
                    zBottom={5}
                    zTop={5 + height}
                    fillTop={fillTop}
                    fillSide={fillSide}
                    stroke={stroke}
                    strokeWidth={0.8}
                    theta={theta}
                    zoom={liveZoom}
                  />

                  <text x={t0.x + 8} y={t0.y - 6} fill="rgba(255,255,255,0.6)" fontSize={7.5} fontFamily="monospace" fontWeight="500">
                    T{idx+1}: {t.floors}p ({Math.round(t.w * t.h / 1.5)}m²)
                  </text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    function ReasoningOverlay({ isThinking, query, hasAttachedFile, onComplete, viewportWidth }) {
      const [steps, setSteps] = useState([]);
      const [visibleCount, setVisibleCount] = useState(0);
      const onCompleteRef = useRef(onComplete);

      useEffect(() => {
        onCompleteRef.current = onComplete;
      });

      useEffect(() => {
        if (!isThinking) {
          setVisibleCount(0);
          return;
        }

        const generated = generateReasoningSteps(query, hasAttachedFile);
        setSteps(generated);
        setVisibleCount(1);

        const stepTime = 650; // ms per step
        const timers = [];

        for (let i = 1; i < generated.length; i++) {
          const t = setTimeout(() => {
            setVisibleCount(prev => prev + 1);
          }, i * stepTime);
          timers.push(t);
        }

        const completeTimer = setTimeout(() => {
          onCompleteRef.current();
        }, generated.length * stepTime + 500); // 500ms read buffer at the end
        timers.push(completeTimer);

        return () => timers.forEach(clearTimeout);
      }, [isThinking, query, hasAttachedFile]);

      return (
        <div style={{
          position: "absolute",
          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          zIndex: 100,
          background: "rgba(10, 13, 20, 0.15)", // subtle dimming of canvas context
          display: "flex",
          alignItems: "flex-end",
          justifyContent: "flex-end",
          padding: 12,
          opacity: isThinking ? 1 : 0,
          visibility: isThinking ? "visible" : "hidden",
          transition: "opacity 0.45s ease, visibility 0.45s ease",
          pointerEvents: isThinking ? "auto" : "none", // Prevent clicks on canvas during simulation
        }}>
          <div style={{
            display: "flex",
            flexDirection: "column",
            width: "min(320px, calc(100vw - 24px))",
            background: "rgba(30, 36, 45, 0.88)",
            backdropFilter: "blur(24px)",
            border: "1px solid rgba(255, 255, 255, 0.08)",
            borderRadius: 16,
            padding: 16,
            boxShadow: "0 12px 32px rgba(0, 0, 0, 0.5)",
            gap: 14,
            transition: "all 0.3s ease",
            transform: isThinking ? "translateY(0)" : "translateY(8px)"
          }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {/* Pulsing Arqgen Logo */}
              <div className={isThinking ? "logo-pulse" : ""} style={{ transition: "all 0.3s ease" }}>
                <ArqgenLogo height={20} />
              </div>

              {/* Subtitle */}
              <div style={{
                fontFamily: "'Sora',sans-serif",
                fontSize: 12,
                fontWeight: 600,
                color: "#fff",
                marginTop: 2,
                letterSpacing: "-0.01em",
                opacity: 0.95
              }}>
                Teodora está trabalhando...
              </div>
            </div>

            {/* Steps List */}
            <div style={{
              display: "flex",
              flexDirection: "column",
              gap: 8,
              width: "100%",
              padding: "12px 14px",
              background: "rgba(255,255,255,0.02)",
              border: "1px solid rgba(255,255,255,0.05)",
              borderRadius: 10,
            }}>
              {steps.map((step, idx) => {
                const isCurrent = idx === visibleCount - 1;
                const isPast = idx < visibleCount - 1;
                const isFuture = idx > visibleCount - 1;

                return (
                  <div key={idx} style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 8,
                    fontSize: 11,
                    fontFamily: "'Inter',sans-serif",
                    color: isPast ? "rgba(255,255,255,0.38)" : isCurrent ? "#fff" : "transparent",
                    transition: "all 0.3s ease",
                    opacity: isFuture ? 0 : 1,
                    height: 18,
                    lineHeight: 1
                  }}>
                    <div style={{
                      width: 12,
                      height: 12,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      flexShrink: 0
                    }}>
                      {isPast && (
                        <svg width="8" height="6" viewBox="0 0 10 8" fill="none">
                          <path d="M1 4L3.5 6.5L9 1" stroke={C.green2} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      )}
                      {isCurrent && (

                    </div>
                    <span style={{
                      fontWeight: isCurrent ? 500 : 400,
                      letterSpacing: "-0.01em"
                    }}>
                      {step}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );

          if(!panelRef.current)return;
          const rect=panelRef.current.getBoundingClientRect();
          setPosition(prev=>{
            if(!prev)return prev;
            const next=clampFloatingPosition(prev,rect,{width:window.innerWidth,height:window.innerHeight},chatMargins);
            return next.x===prev.x&&next.y===prev.y?prev:next;
          });
        }
        const frame=requestAnimationFrame(clampPosition);
        window.addEventListener("resize",clampPosition);
        return()=>{cancelAnimationFrame(frame);window.removeEventListener("resize",clampPosition);};
      },[size,msgs.length,typing,Boolean(attachedFile)]);
      useEffect(()=>{
        function moveDrag(e){
          const drag=dragRef.current;
          if(!drag||drag.pointerId!==e.pointerId||!panelRef.current)return;
          const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;
          if(!drag.moved&&Math.hypot(dx,dy)>3)drag.moved=true;
          const rect=panelRef.current.getBoundingClientRect();
          setPosition(clampFloatingPosition(
            {x:drag.originX+dx,y:drag.originY+dy},
            rect,
            {width:window.innerWidth,height:window.innerHeight},
            chatMargins
          ));
          if(e.cancelable)e.preventDefault();
        }
        function endDrag(e){
          const drag=dragRef.current;
          if(!drag||drag.pointerId!==e.pointerId)return;
          suppressClickRef.current=drag.moved;
          dragRef.current=null;
          clearTimeout(suppressClickTimerRef.current);
          suppressClickTimerRef.current=setTimeout(()=>{suppressClickRef.current=false;},0);
        }
        function cancelDrag(){dragRef.current=null;}
        window.addEventListener("pointermove",moveDrag,{passive:false});
        window.addEventListener("pointerup",endDrag);
        window.addEventListener("pointercancel",endDrag);
        window.addEventListener("blur",cancelDrag);
        return()=>{
          window.removeEventListener("pointermove",moveDrag);
          window.removeEventListener("pointerup",endDrag);
          window.removeEventListener("pointercancel",endDrag);
          window.removeEventListener("blur",cancelDrag);
          clearTimeout(suppressClickTimerRef.current);
        };
      },[]);

          }}>
            {enterprises.map((ent, idx) => {
              const pts = ent.terrainPoints.split(" ").map(p => p.split(",").map(Number));
              const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
              const minX = Math.min(...xs), maxX = Math.max(...xs);
              const minY = Math.min(...ys), maxY = Math.max(...ys);
              const w = maxX - minX, h = maxY - minY;
              const padding = 10;
              const scale = Math.min((120 - padding * 2) / w, (85 - padding * 2) / h);
              const scaledPts = pts.map(p => [
                padding + (p[0] - minX) * scale,
                padding + (p[1] - minY) * scale
              ]);
              const pointsStr = scaledPts.map(p => p.join(",")).join(" ");

              return (

                    cursor: "pointer",
                    transition: "all 0.25s cubic-bezier(0.16, 1, 0.3, 1)",

                    flexDirection: "column",
                    justifyContent: "space-between",

                    boxShadow: "0 4px 24px rgba(0, 0, 0, 0.2)"

                  onMouseLeave={e => {
                    e.currentTarget.style.transform = "translateY(0)";
                    e.currentTarget.style.borderColor = "rgba(255, 255, 255, 0.08)";
                    e.currentTarget.style.boxShadow = "0 4px 24px rgba(0, 0, 0, 0.2)";
                  }}

    function EnterpriseDashboard({
      enterprise,
      activeTab,
      setActiveTab,
      onBackToHome,
      onOpenStudy,
      onOpenQuantities,
      onCreateStudy,
      onAddDataFile,
      onAddKnowledge
    }) {
      const [showNewStudyModal, setShowNewStudyModal] = useState(false);
      const [newStudyName, setNewStudyName] = useState("");
      const [showAddFileModal, setShowAddFileModal] = useState(false);
      const [newFileName, setNewFileName] = useState("");
      const [newFileExt, setNewFileExt] = useState("dwg");
      const [newFileSize, setNewFileSize] = useState("150 KB");
      const [showAddKnowledgeModal, setShowAddKnowledgeModal] = useState(false);
      const [newKCategory, setNewKCategory] = useState("Premissas");
      const [newKValue, setNewKValue] = useState("");

      const handleAddFileSubmit = (e) => {
        e.preventDefault();
        if (!newFileName.trim()) return;
        const completeName = newFileName.includes(".") ? newFileName : `${newFileName}.${newFileExt}`;
        onAddDataFile({
          name: completeName,
          ext: newFileExt,
          size: newFileSize,
          date: new Date().toLocaleDateString("pt-BR"),
          source: "Upload do Usuário"
        });
        setShowAddFileModal(false);
        setNewFileName("");
      };

      const handleAddKnowledgeSubmit = (e) => {
        e.preventDefault();
        if (!newKValue.trim()) return;
        onAddKnowledge({ category: newKCategory, value: newKValue });
        setShowAddKnowledgeModal(false);
        setNewKValue("");
      };

      const handleCreateStudySubmit = (e) => {
        e.preventDefault();
        if (!newStudyName.trim()) return;
        onCreateStudy(newStudyName);
        setShowNewStudyModal(false);
        setNewStudyName("");
      };

      const tabs = [
        { id: "estudos", label: "📈 Estudos" },
        { id: "dados", label: "📁 Dados de Entrada" },
        { id: "conhecimento", label: "🧠 Conhecimento" },
        { id: "artefatos", label: "📊 Artefatos & Linhagem" },
        { id: "historico", label: "🕒 Histórico" }
      ];

      return (
        <div style={{ minHeight: "100vh", backgroundColor: "#0b0d14", color: "#eceef4", fontFamily: "'Inter', sans-serif", display: "flex", flexDirection: "column" }}>

              <span onClick={onBackToHome} style={{ fontSize: 12, color: C.gray, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                🏠 Empreendimentos
              </span>
              <span style={{ fontSize: 12, color: "rgba(255,255,255,0.2)" }}>/</span>
              <span style={{ fontSize: 12, color: "#fff", fontWeight: 600 }}>
                🏗️ {enterprise.name}
              </span>
            </div>

      const activeEnterprise = useMemo(() => {
        return enterprises.find(e => e.id === activeEnterpriseId) || null;
      }, [enterprises, activeEnterpriseId]);

      const activeStudy = useMemo(() => {
        if (!activeEnterprise || !activeStudyId) return null;

      const versions = useMemo(() => {
        return activeStudy?.versions || {};

      const scenarioName = useCallback((key) => {

        return activeStudy?.scenarioMeta?.[key]?.intent || SCENARIO_META[key]?.intent || "";
      }, [activeStudy]);

      const scenarioTradeoff = useCallback((key) => {
        return activeStudy?.scenarioMeta?.[key]?.tradeoff || SCENARIO_META[key]?.tradeoff || "";
      }, [activeStudy]);

      const currentLotArea = activeEnterprise ? activeEnterprise.area : LOT;
      const currentTerrainPoints = useMemo(() => {
        return parsePoly(activeEnterprise ? activeEnterprise.terrainPoints : TERRAIN);
      }, [activeEnterprise]);

      const calcMetrics = useCallback((towersList) => {

      }, [currentLotArea, currentTerrainPoints]);

      // State synchronizers
      useEffect(() => {
        if (!activeEnterpriseId || !activeStudyId) return;
        const ent = enterprises.find(e => e.id === activeEnterpriseId);
        if (!ent) return;
        const study = ent.estudos.find(s => s.id === activeStudyId);

          setTowers(sanitizeTowers(verTowers));

          setMsgs(ent.msgs || []);
